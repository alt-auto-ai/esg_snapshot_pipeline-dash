bers announced","URL":"https://www.premier.tas.gov.au/latest-news/2026/june/inaugural-disability-inclusion-advisory-council-members-announced","Story_Type":"Ministerial, Diplomatic, and International Engagements","Jurisdiction":"Tasmania","ESG_Relevance":"High","Out1":"Tasmania appoints inaugural Disability Inclusion Advisory Council members to embed lived experience into disability policy, reform and safeguarding.","Out2":"The Council, a statutory body under the Disability Rights, Inclusion and Safeguarding Act 2024, advises on systemic issues, contributes to the Tasmanian Disability Inclusion Plan and supports inclusion and safeguarding across government and community sectors.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Disability council formed","OneLiner":"Tasmania names the inaugural Disability Inclusion Advisory Council, expected to meet by end-June to shape inclusion plans."},{"id":174,"Date":"2026-06-04","Title":"Place-based youth justice approach expands in Glenorchy","URL":"https://www.premier.tas.gov.au/latest-news/2026/june/place-based-youth-justice-approach-expands-in-glenorchy","Story_Type":"Community, First Nations, and Social Licence Initiatives","Jurisdiction":"Tasmania","ESG_Relevance":"Medium","Out1":"Tasmania expands a place-based youth justice diversion model through the Glenorchy Youth Hub to address root causes and reduce reoffending risk.","Out2":"The Tasmanian Government is funding a $2.3 million local initiative in partnership with Glenorchy City Council, linking youth to education, training, employment, sport and arts, with a soft launch in April and an opening on 1 July 2026.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Place-based justice shift","OneLiner":"Tasmania funds $2.3m Glenorchy Youth Hub, launching 1 July 2026 to divert youth offending risk."},{"id":175,"Date":"2026-06-04","Title":"Tasmania strengthens fertiliser supply partnership with Indonesia","URL":"https://www.premier.tas.gov.au/latest-news/2026/june/tasmania-strengthens-fertiliser-supply-partnership-with-indonesia","Story_Type":"Ministerial, Diplomatic, and International Engagements","Jurisdiction":"Tasmania","ESG_Relevance":"Low","Out1":"Tasmania strengthens nitrogen fertiliser supply via an Incitec Pivot deal linked to PT Pupuk Indonesia, supporting agricultural productivity and food security.","Out2":"Government secured additional urea volumes expected to enter Tasmania between now and year end, improving certainty ahead of peak seasonal demand amid global supply challenges.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Fertiliser supply secured","OneLiner":"Tasmania backs Incitec Pivot to import 20,000–25,000 tonnes of urea between now and year-end."},{"id":176,"Date":"2026-06-04","Title":"Audit backs TasTAFE’s role in building Tasmania’s skilled workforce","URL":"https://www.premier.tas.gov.au/latest-news/2026/june/audit-backs-tastafes-role-in-building-tasmanias-skilled-workforce","Story_Type":"Compliance, Oversight, and Enforcement Actions","Jurisdiction":"Tasmania","ESG_Relevance":"Low","Out1":"ASQA audit re-registration confirms TasTAFE as a trusted Registered Training Organisation for another seven years in Tasmania.","Out2":"TasTAFE was re-registered by ASQA for seven years, evidencing high-quality, nationally recognised vocational education aligned with government, industry and community expectations for workforce skills.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"VET re-registration confirmed","OneLiner":"ASQA audit re-registers TasTAFE for seven years, signalling job-ready training to employers."},{"id":177,"Date":"2026-06-04","Title":"Launching into Tasmania's Health Revolution","URL":"https://www.premier.tas.gov.au/latest-news/2026/june/launching-into-tasmanias-health-revolution","Story_Type":"Reports, Data Releases, and Analytical Insights","Jurisdiction":"Tasmania","ESG_Relevance":"Medium","Out1":"Tasmania launches its 20-year Health Revolution preventive strategy to place prevention at the heart of the health system.","Out2":"The long-term framework guides coordinated action across government, services, communities and partners, supported by a first Action Plan and $20 million over four years.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Health Revolution rollout","OneLiner":"Tasmania launches 20-year preventive program, funding $20m over four years and issuing Action Plan 1."},{"id":178,"Date":"2026-06-04","Title":"Grant program to help tourism businesses power Tasmania’s EV future","URL":"https://www.premier.tas.gov.au/latest-news/2026/june/grant-program-to-help-tourism-businesses-power-tasmanias-ev-future","Story_Type":"Funding and Grant Announcements","Jurisdiction":"Tasmania","ESG_Relevance":"High","Out1":"Tasmania launches a $250,000 EV destination charging grant to help tourism businesses install chargers and prepare for climate-conscious travel.","Out2":"The Electric Vehicle Destination Charging Grant Program supports small-to-medium overnight tourism businesses with destination chargers, delivered in two rounds, with grants up to $2,500 per charger and applications opening 3 July 2026 to 31 August 2026.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"EV charging grants expand","OneLiner":"Tasmania offers $125,000 in Round 1 from 3 July to 31 August, helping overnight tourism firms install up to four chargers."},{"id":179,"Date":"2026-06-05","Title":"Securing our future: $221 million to deliver a new era of threatened species protection | Media release","URL":"https://www.environment.nsw.gov.au/news/securing-our-future-221-million-deliver-new-era-threatened-species-protection","Story_Type":"Funding and Grant Announcements","Jurisdiction":"NSW","ESG_Relevance":"High","Out1":"NSW will invest $221 million in a whole-of-ecosystem threatened species conservation model, reforming the Saving our Species program.","Out2":"The 2026 Budget funding over three years includes $195.2 million for targeted ecosystem recovery actions and $26 million for Nature Strategy targets, integrating habitat protection, restoration, and Aboriginal cultural knowledge.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Ecosystem conservation $221m","OneLiner":"NSW’s 2026 budget funds a three-year Saving our Species overhaul, using feral control and restoration."},{"id":180,"Date":"2026-06-05","Title":"Blooming lovely bonanza at Sydney’s secret garden | Media release","URL":"https://www.environment.nsw.gov.au/news/blooming-lovely-bonanza-sydneys-secret-garden","Story_Type":"Environmental Protection, Biodiversity, and Nature Policy","Jurisdiction":"NSW","ESG_Relevance":"Low","Out1":"Muogamarra Nature Reserve opens limited wildflower bookings to protect biodiversity and fragile Aboriginal cultural heritage.","Out2":"Access is available for just six weeks north of Sydney, aligned with peak flowering of more than 900 native plant species, with guided and self-guided options that safeguard vulnerable ecosystems and cultural sites.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Six-week wildflower window","OneLiner":"Bookings open now for tours at Muogamarra from 15 August to 20 September, after demand."},{"id":181,"Date":"2026-06-05","Title":"World Environment Day: launch of Australia’s first greenhouse gas monitoring network | Media release","URL":"https://www.environment.nsw.gov.au/news/world-environment-day-launch-first-greenhouse-gas-monitoring-network","Story_Type":"Infrastructure, Project Approvals, and EPBC Developments","Jurisdiction":"NSW","ESG_Relevance":"High","Out1":"NSW launches Australia’s first dedicated regional greenhouse gas monitoring network in the Upper Hunter to improve net zero emissions evidence.","Out2":"A pilot network delivers independent monitoring of industry-related emissions using cavity ring-down spectrometers, guided by a scientific advisory committee with NSW EPA partnership and potential statewide expansion.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Cavity ring-down network","OneLiner":"June’s Upper Hunter pilot begins independent methane and CO2 monitoring, informing future regulation and mitigation."},{"id":182,"Date":"2026-06-04","Title":"NSW releases its first Cultural Fire Strategy | Media release","URL":"https://www.environment.nsw.gov.au/news/nsw-releases-its-first-cultural-fire-strategy","Story_Type":"Environmental Protection, Biodiversity, and Nature Policy","Jurisdiction":"NSW","ESG_Relevance":"High","Out1":"NSW’s first Cultural Fire Strategy recognises Aboriginal-led cultural burning as a distinct, governance-enabled practice for caring for Country.","Out2":"The Strategy, developed with Aboriginal groups and agencies, clarifies responsibilities, simplifies processes and removes regulatory barriers, supporting healthier ecosystems and community economic, spiritual, social and health outcomes.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Cultural fire recognised","OneLiner":"NSW releases its first Cultural Fire Strategy, easing regulatory barriers as Aboriginal-led burning scales statewide."},{"id":183,"Date":"2026-06-02","Title":"Celebrating 20 years of joint management at Biamanga and Gulaga national parks | Media release","URL":"https://www.environment.nsw.gov.au/news/celebrating-20-years-joint-management-biamanga-gulaga-national-parks","Story_Type":"Community, First Nations, and Social Licence Initiatives","Jurisdiction":"NSW","ESG_Relevance":"Medium","Out1":"NSW marks 20 years of Aboriginal ownership and joint management for Biamanga and Gulaga National Parks led by Yuin people.","Out2":"Since May 2006, joint Boards of Management and NPWS manage 18,000+ hectares, strengthening decision-making, protecting cultural sites and natural values, maintaining cultural fire practices, and creating Aboriginal ranger employment, training and leadership opportunities.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Twenty years together","OneLiner":"Since May 2006, Boards and NPWS have jointly managed 18,000 hectares, strengthening Yuin cultural authority."},{"id":184,"Date":"2026-06-01","Title":"Time to hit the trails for the 2026 Tour de Gorge | Media release","URL":"https://www.environment.nsw.gov.au/news/time-hit-trails-2026-tour-de-gorge","Story_Type":"Community, First Nations, and Social Licence Initiatives","Jurisdiction":"NSW","ESG_Relevance":"Low","Out1":"NSW’s Tour de Gorge returns in September 2026, offering community-led access to the Pilliga through multiple unsealed trail cycling options.","Out2":"The annual Tour de Gorge invites families and adventurers to ride rarely accessed areas of the Pilliga Forest and Pilliga Nature Reserve near Baradine, with exclusive public-closed trail access and community atmosphere at Pilliga Pottery.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Tour de Gorge returns","OneLiner":"On 5 September 2026, $30 entries send riders through usually closed Pilliga trails."},{"id":185,"Date":"2026-06-01","Title":"Saving our Species explains: field work | News","URL":"https://www.environment.nsw.gov.au/news/saving-our-species-explains-field-work","Story_Type":"Environmental Protection, Biodiversity, and Nature Policy","Jurisdiction":"NSW","ESG_Relevance":"Medium","Out1":"NSW fieldwork under Saving our Species supports threatened plants and animals through monitoring, habitat restoration, and threat management.","Out2":"The approach addresses declines driven by habitat loss, invasive species, climate change and other pressures, including mapping populations, removing weeds, managing feral animals, and collecting evidence to guide tailored actions.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Field work survival","OneLiner":"Since 1 June 2026, NSW boosts threatened species with monitoring and reintroducing 500 nursery plants."},{"id":186,"Date":"2026-06-05","Title":"Tech reuse for good — supporting Australians with access to digital devices","URL":"https://www.minister.industry.gov.au/ministers/charlton/media-releases/tech-reuse-good-supporting-australians-access-digital-devices","Story_Type":"Funding and Grant Announcements","Jurisdiction":"Australian National Scope","ESG_Relevance":"High","Out1":"Government backs Tech Reuse for Good Charter to advance digital inclusion by redirecting surplus devices to Australians without appropriate access.","Out2":"Telstra Foundation commits almost $3 million to support a national device bank, building a cross-sector, outcome-focused charter to expand access for priority groups and extend technology life.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Digital divide funding","OneLiner":"On 5 June 2026, Telstra Foundation pledges $3m for a device bank to equip children."},{"id":187,"Date":"2026-06-04","Title":"Commissioner Roswall and youth discuss nature-based future","URL":"https://environment.ec.europa.eu/news/commissioner-roswall-and-youth-discuss-nature-based-future-2026-06-04_en","Story_Type":"Community, First Nations, and Social Licence Initiatives","Jurisdiction":"International","ESG_Relevance":"High","Out1":"Youth dialogue with Commissioner Roswall links nature investment to biodiversity protection, economic resilience, and better policy and market scaling.","Out2":"Thirteen EU youth leaders discussed biodiversity, rural jobs, trust across urban-rural divides, scaling nature-based and circular bioeconomy initiatives, and using public and private investment tools including nature credits.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Biodiversity funding","OneLiner":"June 3 youth dialogue feeds Nature Restoration and Circular Economy proposals, using nature credits."},{"id":188,"Date":"2026-06-04","Title":"Amazonian Indigenous women win 2026 #ForOurPlanet prize","URL":"https://environment.ec.europa.eu/news/amazonian-indigenous-women-win-2026-forourplanet-prize-2026-06-04_en","Story_Type":"Funding and Grant Announcements","Jurisdiction":"International","ESG_Relevance":"Medium","Out1":"Amazonia Indigenous Women’s Fellowship wins the 2026 #ForOurPlanet Prize for Indigenous women-led leadership protecting rainforest and climate stability.","Out2":"The European Commission selected the programme for nature restoration focus and rights-based approach, including €1.36m in direct grants since 2021, over 115 projects, and benefits for more than 4,200 people.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Amazon Indigenous leadership","OneLiner":"Commission backs a €1.36m grants network, selected on 4 June, to restore rainforest via women-led conservation."},{"id":189,"Date":"2026-06-03","Title":"Wins for nature and clean environment at 2026 LIFE Awards","URL":"https://cinea.ec.europa.eu/news-events/news/celebrating-wins-nature-clean-environment-and-climate-2026-life-awards-2026-06-03_en","Story_Type":"Corporate and Institutional ESG Actions","Jurisdiction":"International","ESG_Relevance":"Medium","Out1":"LIFE Awards 2026 spotlighted excellence across nature, circular economy and climate action, with jury criteria linking impact, innovation and policy relevance.","Out2":"Nine finalists competed across three categories and also won Citizens’ and Special Awards, recognising projects that protect biodiversity, support circular household electronics and Mediterranean wetlands climate mitigation.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Nature-positive winners","OneLiner":"EU’s 2025–2027 LIFE work programme steers €2.3bn toward circular, zero-pollution and climate projects."},{"id":190,"Date":"2026-06-03","Title":"EU Green Week 2026 opens with focus on nature investment","URL":"https://environment.ec.europa.eu/news/eu-green-week-2026-opens-focus-nature-investment-2026-06-03_en","Story_Type":"Misc","Jurisdiction":"International","ESG_Relevance":"High","Out1":"EU Green Week 2026 puts nature at the centre of Europe’s competitiveness, resilience and security through a nature-positive economy agenda.","Out2":"Hosted by the European Commission in Brussels, the two-day focus links biodiversity, water stress and ecosystem degradation to economic and security risks, convening stakeholders to discuss regenerative farming, financing tools and large-scale restoration.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Nature-positive investment push","OneLiner":"EU Green Week starts today in Brussels to scale nature restoration, mobilising 70 startups and financing tools for resilient growth."},{"id":191,"Date":"2026-06-03","Title":"The 8th Natura 2000 Award edition is launched!","URL":"https://environment.ec.europa.eu/news/8th-natura-2000-award-edition-launched-2026-06-03_en","Story_Type":"Funding and Grant Announcements","Jurisdiction":"International","ESG_Relevance":"Medium","Out1":"European Commission opens applications for the 8th EU Natura 2000 Award, expanding recognition for marine, land, community and urban conservation.","Out2":"Applications are open across categories, including new Towns & cities for urban/peri-urban sites linked to Natura 2000; finalists gain visibility, training and entry to the Citizens’ vote, with applications closing 30 September 2026.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Natura 2000 awards open","OneLiner":"EU opens applications for protected-area conservation prizes, with deadline 30 September 2026."},{"id":192,"Date":"2026-06-01","Title":"How to make energy-intensive industries more sustainable","URL":"https://joint-research-centre.ec.europa.eu/jrc-news-and-updates/innovative-techniques-what-works-best-making-energy-intensive-industries-more-sustainable-2026-06-01_en","Story_Type":"Reports, Data Releases, and Analytical Insights","Jurisdiction":"International","ESG_Relevance":"High","Out1":"EU maps 563 near-market demonstrator projects for energy-intensive industry decarbonisation, depollution and circularity, prioritising iron and steel and cement.","Out2":"INCITE/JRC analysis finds hydrogen use, circularity and energy efficiency as key priorities; 40% show TRL 8–9 maturity, with permit-condition BREFs for these sectors due for revision.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Permit rules revision","OneLiner":"A 1 June 2026 report maps 563 projects and flags limits for steel and cement."},{"id":193,"Date":"2026-06-01","Title":"How green roofs improve urban life & boost climate resilience","URL":"https://environment.ec.europa.eu/news/how-green-roofs-improve-urban-life-boost-climate-resilience-2026-06-01_en","Story_Type":"Reports, Data Releases, and Analytical Insights","Jurisdiction":"International","ESG_Relevance":"High","Out1":"Green roofs using integrated vegetation are shown to strengthen climate resilience, biodiversity and energy performance in dense European cities.","Out2":"An EU JRC report links green roofs to measurable climate resilience, energy efficiency and urban biodiversity; a LIFE project found lower cooling electricity and reduced stormwater runoff.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Green roofs shift","OneLiner":"From 2026, verified cooling and biodiversity gains—from 4°C drops to 11% less cooling—scale through EU LIFE projects."},{"id":194,"Date":"2026-06-05","Title":"IMF Executive Board Concludes 2026 Article IV Consultation with Kyrgyz Republic","URL":"https://www.imf.org/en/news/articles/2026/06/04/pr26185-kyrgyz-republic-imf-executive-board-concludes-2026-article-iv-consultation","Story_Type":"Reports, Data Releases, and Analytical Insights","Jurisdiction":"International","ESG_Relevance":"Medium","Out1":"IMF concludes Kyrgyz Republic Article IV, highlighting strong growth but inflation above target and emerging overheating risks requiring policy recalibration.","Out2":"Directors welcome declining poverty and advise tighter, data-dependent monetary policy, fiscal buffer strengthening, improved public financial and debt management, and tighter financial supervision amid high NPLs and SOE quasi-fiscal risks.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Inflation squeezes buffers","OneLiner":"IMF tells Kyrgyz authorities to tighten policy through 2027, fund wages and improve SOE reporting."},{"id":195,"Date":"2026-06-05","Title":"Press Briefing Transcript: Julie Kozack, Director, Communications Department, June 4, 2026","URL":"https://www.imf.org/en/news/articles/2026/06/04/tr-06042026-imf-regular-briefing-june-4-2026","Story_Type":"Ministerial, Diplomatic, and International Engagements","Jurisdiction":"International","ESG_Relevance":"Low","Out1":"IMF briefed on energy-driven inflation pressures, WTO tariff consultation roles, and targeted fiscal responses alongside multiple country program discussions and AI risk work.","Out2":"IMF expects US inflation to return to target with delay to mid-2027, flags upside risks, and says it will provide WTO balance-of-payments statements. It urges targeted fiscal support in limited-space economies, covers Bangladesh, Argentina, Egypt, Ethiopia, Senegal, and notes preliminary work on financial stability risks from new AI models.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Strait of Hormuz pressure","OneLiner":"IMF flags inventory drawdowns and delayed returns to 2% inflation, urging calibrated policy through mid-2027."},{"id":196,"Date":"2026-06-03","Title":"Interview with Méabh McMahon, Euronews","URL":"https://www.trademinister.gov.au/minister/don-farrell/transcript/interview-meabh-mcmahon-euronews","Story_Type":"Ministerial, Diplomatic, and International Engagements","Jurisdiction":"International","ESG_Relevance":"Low","Out1":"Australia’s trade diversification strategy deepens EU engagement amid global instability, supporting resilient market access through new free trade agreements.","Out2":"Don Farrell says Australia signed a Free Trade Agreement with the EU and expanded ties via agreements with the UK, India and UAE, aiming to reduce exposure to US and China uncertainty.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Diversified trade routes","OneLiner":"Farrell says petrol, diesel and fertiliser supplies must be secured amid Middle East instability."},{"id":197,"Date":"2026-06-04","Title":"New D-Day weather reconstruction highlights key driver of military success and security","URL":"https://climate.copernicus.eu/new-d-day-weather-reconstruction-highlights-key-driver-military-success-and-security","Story_Type":"Reports, Data Releases, and Analytical Insights","Jurisdiction":"International","ESG_Relevance":"Low","Out1":"Copernicus Weather Replay reconstructs D-Day weather to highlight how forecasting underpins safety, health, military success and security.","Out2":"Using ERA5 reanalysis, the app replicates conditions and supports analysis of storm risks, tide and wind requirements, and decision timing around Operation Overlord.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Forecasting under pressure","OneLiner":"Copernicus Weather Replay replays D-Day weather, showing how 72-hour accuracy underpins safety and security."},{"id":198,"Date":"2026-06-05","Title":"Secretary-General Honours Recipients of UN Military Gender Advocate, Woman Police Officer of the Year, Captain Mbaye Diagne Medal, at Awards Ceremony","URL":"https://press.un.org/en/2026/sgsm23162.doc.htm","Story_Type":"Misc","Jurisdiction":"International","ESG_Relevance":"Low","Out1":"UN honours fallen and courageous peacekeepers, highlighting expanded gender-responsive protection roles, civilian safeguarding, and risk in peacekeeping operations.","Out2":"Guterres marks Peacekeepers Day, citing 50,000+ deployed personnel, 71 missions and awards including posthumous Dag Hammarskjöld Medal, Diagne Medal acts of evacuation and rescue, and women leaders’ gender and policing roles.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Helmets face risk","OneLiner":"UN says over 50,000 deployed, while 68 medals honour 59 killed last year, pushing lessons."},{"id":199,"Date":"2026-06-02","Title":"Activities of Secretary-General in Japan, 17-20 May","URL":"https://press.un.org/en/2026/sgt3465.doc.htm","Story_Type":"Ministerial, Diplomatic, and International Engagements","Jurisdiction":"International","ESG_Relevance":"Low","Out1":"UN Secretary-General’s Japan visit highlighted UN–Japan partnership, human rights coordination and UN reforms amid regional peace and security concerns.","Out2":"Meetings with Japanese leadership covered Korean Peninsula, Middle East, UN reforms and UN80; CEB deliberations launched a UN Human Rights Group to strengthen system-wide human rights promotion and coordination.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"System-wide coordination","OneLiner":"On 19 May, UN launched a Human Rights Group to strengthen promotion across the system."},{"id":200,"Date":"2026-06-02","Title":"Changes to doing business from July 2026","URL":"https://business.vic.gov.au/news-and-updates/2026/changes-to-doing-business-from-july-2026","Story_Type":"Legislative and Statutory Developments","Jurisdiction":"Victoria","ESG_Relevance":"Low","Out1":"Victoria’s 1 July 2026 regulatory changes affect small-business super, leave, payments, payroll systems and compliance for updated settings.","Out2":"Payday super moves employer payments to coincide with wages, while the super guarantee rate is set at 12%. Paid parental leave expands to 26 weeks, requiring leave planning.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"July 2026 compliance shake-up","OneLiner":"From 1 July, payday super and SMS sender ID registration tighten duties, forcing small firms to act fast."},{"id":201,"Date":"2026-06-05","Title":"Want to help revise the EU Ecolabel criteria? Join the SME Working Group!","URL":"https://circulareconomy.europa.eu/platform/en/news-and-events/all-news/want-help-revise-eu-ecolabel-criteria-join-sme-working-group","Story_Type":"Consultation and Policy Design Opportunities","Jurisdiction":"International","ESG_Relevance":"High","Out1":"EU Ecolabel representatives launch an SME working group to give small businesses a voice in revising EU Ecolabel criteria.","Out2":"SMEs can share experience, feedback on proposed changes, propose improvements, and identify administrative barriers for product group revisions covering detergents, tourist accommodation, indoor cleaning, and textiles, furniture and mattresses.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Get in early","OneLiner":"SMEs can join a working group to influence EU Ecolabel revisions, starting end-2026 for detergents."},{"id":202,"Date":"2026-06-05","Title":"Call to include nutrients in the EU Circular Economy Act","URL":"https://circulareconomy.europa.eu/platform/en/news-and-events/all-news/call-include-nutrients-eu-circular-economy-act","Story_Type":"Consultation and Policy Design Opportunities","Jurisdiction":"International","ESG_Relevance":"Medium","Out1":"European Sustainable Phosphorus Platform launches joint call to include nutrients in the EU Circular Economy Act before 10 June.","Out2":"Political inclusion of phosphorus appears confirmed, but technical scope risks excluding organic and biological secondary nutrients, raising fit-for-purpose food safety concerns; over 40 organisations have signed 20 proposed policy measures.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Nutrients in limbo","OneLiner":"Phosphorus inclusion is set, but organic wastes are excluded; sign the call before 10 June."},{"id":203,"Date":"2026-06-05","Title":"WENUS project launches pilot e-Learning platform for sustainable wood and timber construction","URL":"https://circulareconomy.europa.eu/platform/en/news-and-events/all-news/wenus-project-launches-pilot-e-learning-platform-sustainable-wood-and-timber-construction","Story_Type":"Consultation and Policy Design Opportunities","Jurisdiction":"International","ESG_Relevance":"Medium","Out1":"WENUS pilots an e-learning platform for vocational training in sustainable wood and timber construction.","Out2":"The pilot integrates circular economy principles and 3D printing into VET learning resources, practical digital training content, and sustainability modules; participants are invited to test and provide feedback until 10 July.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Timber skills pilot","OneLiner":"WENUS invites VET educators to test its 3D-enabled circular wood courses by 10 July."},{"id":204,"Date":"2026-06-04","Title":"Funding: Calls for projects and proposals","URL":"https://circulareconomy.europa.eu/platform/en/news-and-events/all-news/funding-calls-projects-and-proposals","Story_Type":"Funding and Grant Announcements","Jurisdiction":"International","ESG_Relevance":"High","Out1":"Belgium, the Netherlands and the EU are issuing major circular economy calls, spanning IPCEI materials, circular biorefineries and regional innovation.","Out2":"Expressions of interest seek Flanders and Wallonia companies for an IPCEI on circular advanced materials, while NWO and FAPESP back circular biobased chemical alternatives; EIT RIS, RIVCircular and Circular Bio-based Europe fund projects on sustainable mining, processing, circularity, recycling and scale-up.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Europe's circular cash","OneLiner":"€170.7m for bio-based industries is up for grabs by 22 September 2026."},{"id":205,"Date":"2026-06-03","Title":"National Accounts – March quarter 2026","URL":"https://ministers.treasury.gov.au/ministers/jim-chalmers-2022/media-releases/national-accounts-march-quarter-2026","Story_Type":"Reports, Data Releases, and Analytical Insights","Jurisdiction":"Australian National Scope","ESG_Relevance":"Low","Out1":"March quarter growth was driven by booming private investment, signalling resilience amid global volatility and supporting economic outperformance.","Out2":"Australian GDP grew 0.3% in March quarter and 2.5% over year; growth came from private demand as business investment accelerated, dwelling investment resumed, and public demand nearly stalled.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Private demand leads","OneLiner":"March quarter GDP rose 0.3%, driven by machinery spend up 5.7% and renewables."},{"id":206,"Date":"2026-06-02","Title":"Review of tax and corporate whistleblowing","URL":"https://ministers.treasury.gov.au/ministers/daniel-mulino-2025/media-releases/review-tax-and-corporate-whistleblowing","Story_Type":"Consultation and Policy Design Opportunities","Jurisdiction":"Australian National Scope","ESG_Relevance":"Medium","Out1":"Government consults on reviewing Australia’s tax and corporate whistleblowing laws to strengthen whistleblower protection and regime effectiveness.","Out2":"The consultation examines whether the Corporations Act 2001 and Taxation Administration Act 1953 whistleblowing regimes work as intended, including access to justice, incentives, misconduct deterrence, and protection from personal and financial risk.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Whistleblower laws reviewed","OneLiner":"Consultation opened 2 June; submissions close 29 July on whether tax and corporate reporting protections work."},{"id":207,"Date":"2026-06-04","Title":"New podcast episode explores how energy crisis is shaping investment trends","URL":"https://www.iea.org/news/new-podcast-episode-explores-how-energy-crisis-is-shaping-investment-trends","Story_Type":"Reports, Data Releases, and Analytical Insights","Jurisdiction":"International","ESG_Relevance":"Medium","Out1":"IEA podcast highlights how a renewed global energy security crisis is reshaping energy investment trends and strategies.","Out2":"IEA experts discuss findings from World Energy Investment 2026 on shifting demand to domestic sources, impacts across oil, gas, coal, nuclear, renewables and electricity, evolving energy-efficiency investment, and possible cost-of-capital changes.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Crisis reshapes capital","OneLiner":"IEA’s Everything Energy links World Energy Investment 2026 findings to sector shifts and cost-of-capital effects."},{"id":208,"Date":"2026-06-03","Title":"India’s electricity demand grows at night: Managing rising cooling demand","URL":"https://www.iea.org/commentaries/india-s-electricity-demand-gro const JOBS_BY_ID = new Map(JOBS_DATA.map((j) => [j.id, j]));

/* ====== Type colors ====== */
const TYPE_COLORS = {
  "Community, First Nations, and Social Licence Initiatives": "#FFE0B2",
  "Compliance, Oversight, and Enforcement Actions": "#FFCDD2",
  "Consultation and Policy Design Opportunities": "#E1BEE7",
  "Corporate and Institutional ESG Actions": "#BBDEFB",
  "Environmental Protection, Biodiversity, and Nature Policy": "#C8E6C9",
  "Funding and Grant Announcements": "#FFF9C4",
  "Infrastructure, Project Approvals, and EPBC Developments": "#D7CCC8",
  "Legislative and Statutory Developments": "#B2DFDB",
  "Ministerial, Diplomatic, and International Engagements": "#F0F4C3",
  "Misc": "#CFD8DC",
  "Parliamentary and Political Proceedings": "#D1C4E9",
  "Reports, Data Releases, and Analytical Insights": "#B3E5FC",
  "State and Local Government Programs": "#F8BBD0",
};
function typeColor(st) { return TYPE_COLORS[st] || "#E0E0E0"; }
function darkenColor(hex, factor) {
  const f = factor || 0.65;
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return '#' + [Math.round(r*f),Math.round(g*f),Math.round(b*f)].map(c => c.toString(16).padStart(2,'0')).join('');
}

/* ====== Ordering ====== */
const JURIS_ORDER = [
  "Australian National Scope","Australian Capital Territory","NSW","Northern Territory",
  "Queensland","South Australia","Tasmania","Victoria","Western Australia","International"
];
const JURIS_SHORT = {
  "Australian National Scope": "Australian National",
  "Australian Capital Territory": "ACT",
  "Northern Territory": "NT",
  "South Australia": "SA",
  "Tasmania": "TAS",
  "Victoria": "VIC",
  "Western Australia": "WA",
};
const TYPE_ORDER = [
  "Legislative and Statutory Developments","Parliamentary and Political Proceedings",
  "Compliance, Oversight, and Enforcement Actions","Consultation and Policy Design Opportunities",
  "Funding and Grant Announcements","Corporate and Institutional ESG Actions",
  "State and Local Government Programs","Infrastructure, Project Approvals, and EPBC Developments",
  "Reports, Data Releases, and Analytical Insights","Ministerial, Diplomatic, and International Engagements",
  "Environmental Protection, Biodiversity, and Nature Policy",
  "Community, First Nations, and Social Licence Initiatives","Misc",
];
const TYPE_RANK = {}; TYPE_ORDER.forEach((t,i) => TYPE_RANK[t] = i);
const REL_PRIORITY = { High: 0, Medium: 1, Low: 2 };

/* ====== State ====== */
let leftStories = [];   // IDs in left panel
let rightStories = [];  // IDs in right panel (selected)
let leftEvents = [];
let rightEvents = [];
let leftJobs = [];
let rightJobs = [];
let selectedEl = null;
let draggedEl = null;
let draggedData = null;

function initData() {
  // Sort stories by jurisdiction > type > relevance
  const grouped = {};
  for (const s of RAW_DATA) {
    const j = s.Jurisdiction || "Other";
    const st = s.Story_Type || "Other";
    if (!grouped[j]) grouped[j] = {};
    if (!grouped[j][st]) grouped[j][st] = [];
    grouped[j][st].push(s);
  }
  for (const j of Object.keys(grouped)) {
    for (const st of Object.keys(grouped[j])) {
      grouped[j][st].sort((a,b) => (REL_PRIORITY[a.ESG_Relevance]??3) - (REL_PRIORITY[b.ESG_Relevance]??3));
    }
  }
  leftStories = [];
  for (const jur of JURIS_ORDER) {
    if (!grouped[jur]) continue;
    const types = Object.keys(grouped[jur]).sort((a,b) => (TYPE_RANK[a]??999) - (TYPE_RANK[b]??999));
    for (const st of types) {
      for (const s of grouped[jur][st]) leftStories.push(s.id);
    }
    delete grouped[jur];
  }
  for (const jur of Object.keys(grouped).sort()) {
    const types = Object.keys(grouped[jur]).sort((a,b) => (TYPE_RANK[a]??999) - (TYPE_RANK[b]??999));
    for (const st of types) {
      for (const s of grouped[jur][st]) leftStories.push(s.id);
    }
  }
  leftEvents = EVENTS_DATA.map(e => e.id);
  leftJobs = JOBS_DATA.map(j => j.id);
  rightStories = [];
  rightEvents = [];
  rightJobs = [];
}
initData();

/* ====== Helpers ====== */
function esc(s) {
  return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}
function hasLeadingBullet(line) { return /^\s*[\u2022*\-\u2013\u2014]/.test(line || ""); }
function stripBullet(line) { return String(line || "").replace(/^\s*[\u2022*\-\u2013\u2014]\s*/, "").trim(); }
function pHtml(text) { return '<p>' + esc(text) + '</p>'; }
function bulletHtml(text) { return '<p class="bullet"><span>&bull;</span><span>' + esc(text) + '</span></p>'; }
function narrativeHtml(parts) { return '<p>' + parts.filter(Boolean).join(' ') + '</p>'; }

function buildCardBody(s) {
  const outputs = [s.Out1, s.Out2, s.Out3, s.Out4, s.Out5, s.Out6]
    .map(value => String(value || "").trim())
    .filter(Boolean);
  const hook = (s.Hook || "").trim();
  const oneLiner = (s.OneLiner || "").trim();
  if (![...outputs, hook, oneLiner].some(Boolean)) return "";
  let h = "";
  if (outputs.length) {
    const narrative = outputs.map((text, index) => {
      if (outputs.length === 1 && s.URL) return esc(text);
      if (index === 0) return '<strong>' + esc(text) + '</strong>';
      return esc(text);
    });
    if (s.URL) narrative.push('<a href="' + esc(s.URL) + '" target="_blank">More</a>');
    h = narrativeHtml(narrative);
  }
  if (hook || oneLiner) {
    const hookPart = hook ? '<strong>' + esc(hook) + '</strong>' : '';
    const oneLinerPart = oneLiner ? esc(oneLiner) : '';
    h += '<p>' + [hookPart, oneLinerPart].filter(Boolean).join(' ') + '</p>';
  }
  return h;
}

function renderStoryCard(s, panel) {
  const bg = typeColor(s.Story_Type);
  const pillBg = darkenColor(bg, 0.65);
  const relClass = s.ESG_Relevance === 'High' ? 'rel-high' : s.ESG_Relevance === 'Medium' ? 'rel-medium' : 'rel-low';
  return '<div class="card" draggable="true" data-type="story" data-id="' + s.id + '" data-panel="' + panel + '" style="background:' + bg + ';">' +
    '<div class="card-header">' +
    '<span class="story-type-pill" style="background:' + pillBg + ';color:#fff;">' + esc(s.Story_Type) + '</span>' +
    '<span class="relevance-badge ' + relClass + '">' + esc(s.ESG_Relevance) + '</span>' +
    '</div>' +
    '<div class="card-title">' + esc(s.Title) + '</div>' +
    '<div class="card-body">' + buildCardBody(s) + '</div>' +
    '</div>';
}

function renderAuxCard(item, type, panel) {
  const descKey = type === 'event' ? 'Event_Description' : 'Job_Description';
  return '<div class="aux-card" draggable="true" data-type="' + type + '" data-id="' + item.id + '" data-panel="' + panel + '">' +
    '<div class="aux-date">' + esc(item.Date) + '</div>' +
    '<div class="aux-title">' + esc(item.Title) + '</div>' +
    '<div class="aux-url"><a href="' + esc(item.URL) + '" target="_blank">' + esc(item.URL) + '</a></div>' +
    '<div class="aux-desc">' + esc(item[descKey] || '') + '</div>' +
    '</div>';
}

function renderLeftPanel() {
  const root = document.getElementById('leftPanel');
  let html = '';
  
  // Stories grouped by jurisdiction
  const grouped = {};
  for (const id of leftStories) {
    const s = STORY_BY_ID.get(id);
    if (!s) continue;
    const j = s.Jurisdiction || "Other";
    if (!grouped[j]) grouped[j] = [];
    grouped[j].push(s);
  }
  
  for (const jur of JURIS_ORDER) {
    if (!grouped[jur] || grouped[jur].length === 0) continue;
    html += '<h2 class="section-header">' + esc(jur) + ' <span class="section-count">(' + grouped[jur].length + ')</span></h2>';
    for (const s of grouped[jur]) {
      html += renderStoryCard(s, 'left');
    }
    delete grouped[jur];
  }
  for (const jur of Object.keys(grouped).sort()) {
    html += '<h2 class="section-header">' + esc(jur) + ' <span class="section-count">(' + grouped[jur].length + ')</span></h2>';
    for (const s of grouped[jur]) {
      html += renderStoryCard(s, 'left');
    }
  }
  
  // Events
  if (leftEvents.length > 0) {
    html += '<h2 class="section-header">Events <span class="section-count">(' + leftEvents.length + ')</span></h2>';
    for (const id of leftEvents) {
      const e = EVENTS_BY_ID.get(id);
      if (e) html += renderAuxCard(e, 'event', 'left');
    }
  }
  
  // Jobs
  if (leftJobs.length > 0) {
    html += '<h2 class="section-header">Jobs <span class="section-count">(' + leftJobs.length + ')</span></h2>';
    for (const id of leftJobs) {
      const j = JOBS_BY_ID.get(id);
      if (j) html += renderAuxCard(j, 'job', 'left');
    }
  }
  
  if (!html) html = '<div class="empty-state">All items have been selected</div>';
  root.innerHTML = html;
  document.getElementById('leftCount').textContent = (leftStories.length + leftEvents.length + leftJobs.length) + ' items';
}

function renderRightPanel() {
  const root = document.getElementById('rightPanel');
  const total = rightStories.length + rightEvents.length + rightJobs.length;
  
  let html = '';
  if (total === 0) {
    html = '<div class="drop-zone" id="dropZone">Drag items here to include</div>';
  } else {
    // Stories grouped by jurisdiction
    const grouped = {};
    for (const id of rightStories) {
      const s = STORY_BY_ID.get(id);
      if (!s) continue;
      const j = s.Jurisdiction || "Other";
      if (!grouped[j]) grouped[j] = [];
      grouped[j].push(s);
    }
    
    let hasStories = false;
    for (const jur of JURIS_ORDER) {
      if (!grouped[jur] || grouped[jur].length === 0) continue;
      hasStories = true;
      html += '<h2 class="section-header">' + esc(jur) + ' <span class="section-count">(' + grouped[jur].length + ')</span></h2>';
      for (const s of grouped[jur]) {
        html += renderStoryCard(s, 'right');
      }
      delete grouped[jur];
    }
    for (const jur of Object.keys(grouped).sort()) {
      hasStories = true;
      html += '<h2 class="section-header">' + esc(jur) + ' <span class="section-count">(' + grouped[jur].length + ')</span></h2>';
      for (const s of grouped[jur]) {
        html += renderStoryCard(s, 'right');
      }
    }
    
    if (rightEvents.length > 0) {
      html += '<h2 class="section-header">Events <span class="section-count">(' + rightEvents.length + ')</span></h2>';
      for (const id of rightEvents) {
        const e = EVENTS_BY_ID.get(id);
        if (e) html += renderAuxCard(e, 'event', 'right');
      }
    }
    
    if (rightJobs.length > 0) {
      html += '<h2 class="section-header">Jobs <span class="section-count">(' + rightJobs.length + ')</span></h2>';
      for (const id of rightJobs) {
        const j = JOBS_BY_ID.get(id);
        if (j) html += renderAuxCard(j, 'job', 'right');
      }
    }
  }
  
  root.innerHTML = html;
  let countText = total + ' items';
  if (total > 0) {
    const parts = [];
    if (rightStories.length > 0) parts.push('Stories: ' + rightStories.length);
    if (rightEvents.length > 0) parts.push('Events: ' + rightEvents.length);
    if (rightJobs.length > 0) parts.push('Jobs: ' + rightJobs.length);
    countText += ' (' + parts.join(', ') + ')';
  }
  document.getElementById('rightCount').textContent = countText;
  document.getElementById('genBtn').disabled = total === 0;
  document.getElementById('clearBtn').disabled = total === 0;
}

function render() {
  renderLeftPanel();
  renderRightPanel();
}

function clearAll() {
  leftStories = leftStories.concat(rightStories);
  leftEvents = leftEvents.concat(rightEvents);
  leftJobs = leftJobs.concat(rightJobs);
  rightStories = [];
  rightEvents = [];
  rightJobs = [];
  render();
}

/* ====== Selection ====== */
function selectCard(el) {
  if (selectedEl) selectedEl.classList.remove('selected');
  selectedEl = el;
  if (el) el.classList.add('selected');
}

document.addEventListener('click', (e) => {
  const card = e.target.closest('.card, .aux-card');
  if (card) {
    selectCard(card);
    e.stopPropagation();
  } else if (!e.target.closest('.ctx-menu')) {
    selectCard(null);
  }
});

/* ====== Drag and Drop ====== */
document.addEventListener('dragstart', (e) => {
  const card = e.target.closest('.card, .aux-card');
  if (!card) return;
  draggedEl = card;
  draggedData = {
    type: card.dataset.type,
    id: parseInt(card.dataset.id),
    panel: card.dataset.panel
  };
  card.classList.add('dragging');
  selectCard(card);
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', JSON.stringify(draggedData));
});

document.addEventListener('dragend', (e) => {
  if (draggedEl) draggedEl.classList.remove('dragging');
  draggedEl = null;
  draggedData = null;
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
  document.querySelectorAll('.drag-active').forEach(el => el.classList.remove('drag-active'));
});

document.addEventListener('dragover', (e) => {
  e.preventDefault();
  const rightPanel = document.getElementById('rightPanel');
  const dropZone = document.getElementById('dropZone');
  
  if (rightPanel.contains(e.target)) {
    e.dataTransfer.dropEffect = 'move';
    if (dropZone) dropZone.classList.add('drag-active');
    
    // Reorder within right panel
    const card = e.target.closest('.card, .aux-card');
    if (card && draggedEl && card !== draggedEl && card.dataset.panel === 'right') {
      document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
      card.classList.add('drag-over');
    }
  } else {
    if (dropZone) dropZone.classList.remove('drag-active');
  }
});

document.addEventListener('dragleave', (e) => {
  const dropZone = document.getElementById('dropZone');
  if (dropZone && !document.getElementById('rightPanel').contains(e.relatedTarget)) {
    dropZone.classList.remove('drag-active');
  }
});

document.addEventListener('drop', (e) => {
  e.preventDefault();
  const rightPanel = document.getElementById('rightPanel');
  const dropZone = document.getElementById('dropZone');
  if (dropZone) dropZone.classList.remove('drag-active');
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
  
  if (!draggedData) return;
  
  // Dropping on right panel = include
  if (rightPanel.contains(e.target)) {
    if (draggedData.panel === 'left') {
      moveToRight(draggedData.type, draggedData.id);
    } else {
      // Reorder within right
      const targetCard = e.target.closest('.card, .aux-card');
      if (targetCard && targetCard !== draggedEl) {
        reorderInRight(draggedData.type, draggedData.id, parseInt(targetCard.dataset.id), targetCard.dataset.type);
      }
    }
  }
  // Dropping on left panel = exclude
  else if (document.getElementById('leftPanel').contains(e.target)) {
    if (draggedData.panel === 'right') {
      moveToLeft(draggedData.type, draggedData.id);
    }
  }
});

/* ====== Move Functions ====== */
function moveToRight(type, id) {
  if (type === 'story') {
    const idx = leftStories.indexOf(id);
    if (idx > -1) { leftStories.splice(idx, 1); rightStories.push(id); }
  } else if (type === 'event') {
    const idx = leftEvents.indexOf(id);
    if (idx > -1) { leftEvents.splice(idx, 1); rightEvents.push(id); }
  } else if (type === 'job') {
    const idx = leftJobs.indexOf(id);
    if (idx > -1) { leftJobs.splice(idx, 1); rightJobs.push(id); }
  }
  render();
}

function moveToLeft(type, id) {
  if (type === 'story') {
    const idx = rightStories.indexOf(id);
    if (idx > -1) { rightStories.splice(idx, 1); leftStories.push(id); }
  } else if (type === 'event') {
    const idx = rightEvents.indexOf(id);
    if (idx > -1) { rightEvents.splice(idx, 1); leftEvents.push(id); }
  } else if (type === 'job') {
    const idx = rightJobs.indexOf(id);
    if (idx > -1) { rightJobs.splice(idx, 1); leftJobs.push(id); }
  }
  render();
}

function reorderInRight(type, id, targetId, targetType) {
  let arr;
  if (type === 'story') arr = rightStories;
  else if (type === 'event') arr = rightEvents;
  else arr = rightJobs;
  
  const fromIdx = arr.indexOf(id);
  if (fromIdx === -1) return;
  
  // For same type, move to target position
  if (type === targetType) {
    const toIdx = arr.indexOf(targetId);
    if (toIdx === -1) return;
    arr.splice(fromIdx, 1);
    arr.splice(toIdx, 0, id);
    render();
  }
}

function moveUp(type, id) {
  let arr;
  if (type === 'story') arr = rightStories;
  else if (type === 'event') arr = rightEvents;
  else arr = rightJobs;
  
  const idx = arr.indexOf(id);
  if (idx > 0) {
    [arr[idx], arr[idx-1]] = [arr[idx-1], arr[idx]];
    render();
    setTimeout(() => {
      const el = document.querySelector('[data-panel="right"][data-type="' + type + '"][data-id="' + id + '"]');
      if (el) selectCard(el);
    }, 10);
  }
}

function moveDown(type, id) {
  let arr;
  if (type === 'story') arr = rightStories;
  else if (type === 'event') arr = rightEvents;
  else arr = rightJobs;
  
  const idx = arr.indexOf(id);
  if (idx < arr.length - 1 && idx > -1) {
    [arr[idx], arr[idx+1]] = [arr[idx+1], arr[idx]];
    render();
    setTimeout(() => {
      const el = document.querySelector('[data-panel="right"][data-type="' + type + '"][data-id="' + id + '"]');
      if (el) selectCard(el);
    }, 10);
  }
}

/* ====== Context Menu ====== */
const ctxMenu = document.getElementById('ctxMenu');
let ctxData = null;

document.addEventListener('contextmenu', (e) => {
  const card = e.target.closest('.card, .aux-card');
  if (!card) { ctxMenu.style.display = 'none'; return; }
  
  e.preventDefault();
  selectCard(card);
  
  ctxData = {
    type: card.dataset.type,
    id: parseInt(card.dataset.id),
    panel: card.dataset.panel
  };
  
  // Show/hide relevant options
  const isLeft = ctxData.panel === 'left';
  document.getElementById('ctxInclude').style.display = isLeft ? 'block' : 'none';
  document.getElementById('ctxExclude').style.display = isLeft ? 'none' : 'block';
  document.getElementById('ctxMoveUp').style.display = isLeft ? 'none' : 'block';
  document.getElementById('ctxMoveDown').style.display = isLeft ? 'none' : 'block';
  
  ctxMenu.style.left = e.clientX + 'px';
  ctxMenu.style.top = e.clientY + 'px';
  ctxMenu.style.display = 'block';
});

document.addEventListener('click', () => { ctxMenu.style.display = 'none'; });

document.getElementById('ctxInclude').addEventListener('click', () => {
  if (ctxData) moveToRight(ctxData.type, ctxData.id);
  ctxMenu.style.display = 'none';
});

document.getElementById('ctxExclude').addEventListener('click', () => {
  if (ctxData) moveToLeft(ctxData.type, ctxData.id);
  ctxMenu.style.display = 'none';
});

document.getElementById('ctxMoveUp').addEventListener('click', () => {
  if (ctxData) moveUp(ctxData.type, ctxData.id);
  ctxMenu.style.display = 'none';
});

document.getElementById('ctxMoveDown').addEventListener('click', () => {
  if (ctxData) moveDown(ctxData.type, ctxData.id);
  ctxMenu.style.display = 'none';
});

/* ====== Keyboard Navigation ====== */
document.addEventListener('keydown', (e) => {
  if (!selectedEl) return;
  
  const type = selectedEl.dataset.type;
  const id = parseInt(selectedEl.dataset.id);
  const panel = selectedEl.dataset.panel;
  
  switch (e.key) {
    case 'ArrowRight':
      if (panel === 'left') {
        moveToRight(type, id);
        setTimeout(() => {
          const el = document.querySelector('[data-panel="right"][data-type="' + type + '"][data-id="' + id + '"]');
          if (el) selectCard(el);
        }, 10);
      }
      e.preventDefault();
      break;
    case 'ArrowLeft':
      if (panel === 'right') {
        moveToLeft(type, id);
        setTimeout(() => {
          const el = document.querySelector('[data-panel="left"][data-type="' + type + '"][data-id="' + id + '"]');
          if (el) selectCard(el);
        }, 10);
      }
      e.preventDefault();
      break;
    case 'ArrowUp':
      if (panel === 'right') {
        moveUp(type, id);
        e.preventDefault();
      }
      break;
    case 'ArrowDown':
      if (panel === 'right') {
        moveDown(type, id);
        e.preventDefault();
      }
      break;
  }
});

/* ====== Markdown Generation ====== */
function buildMdBody(s) {
  const outputs = [s.Out1, s.Out2, s.Out3, s.Out4, s.Out5, s.Out6]
    .map(value => String(value || '').trim())
    .filter(Boolean);
  if (!outputs.length) return '';
  const body = outputs.map((text, index) => {
    if (outputs.length === 1 && s.URL) return text;
    if (index === 0) return '**' + text + '**';
    return text;
  }).join(' ');
  return body + (s.URL ? ' [**More**](' + s.URL + ')' : '');
}

function generateDoc() {
  const total = rightStories.length + rightEvents.length + rightJobs.length;
  if (total === 0) { alert('No items selected for export.'); return; }
  
  let md = '';
  
  // Stories grouped by jurisdiction
  const grouped = {};
  for (const id of rightStories) {
    const s = STORY_BY_ID.get(id);
    if (!s) continue;
    const j = s.Jurisdiction || "Other";
    if (!grouped[j]) grouped[j] = [];
    grouped[j].push(s);
  }
  
  // === HIGHLIGHTS SECTION (Hook + One Liner at top) ===
  let highlights = '';
  for (const jur of JURIS_ORDER) {
    if (!grouped[jur] || grouped[jur].length === 0) continue;
    let jurHighlights = '';
    for (const s of grouped[jur]) {
      if (s.Hook || s.OneLiner) {
        if (s.Hook) jurHighlights += '**' + s.Hook + '** ';
        if (s.OneLiner) jurHighlights += s.OneLiner;
        jurHighlights += '\n\n';
      }
    }
    if (jurHighlights) {
      highlights += '## ' + (JURIS_SHORT[jur] || jur) + '\n\n' + jurHighlights;
    }
  }
  for (const jur of Object.keys(grouped).sort()) {
    if (JURIS_ORDER.includes(jur)) continue;
    let jurHighlights = '';
    for (const s of grouped[jur]) {
      if (s.Hook || s.OneLiner) {
        if (s.Hook) jurHighlights += '**' + s.Hook + '** ';
        if (s.OneLiner) jurHighlights += s.OneLiner;
        jurHighlights += '\n\n';
      }
    }
    if (jurHighlights) {
      highlights += '## ' + (JURIS_SHORT[jur] || jur) + '\n\n' + jurHighlights;
    }
  }
  if (highlights) {
    md += '# Highlights\n\n' + highlights + '---\n\n';
  }
  
  // === MAIN CONTENT (without Hook + One Liner) ===
  for (const jur of JURIS_ORDER) {
    if (!grouped[jur] || grouped[jur].length === 0) continue;
    md += '# ' + (JURIS_SHORT[jur] || jur) + '\n\n';
    for (const s of grouped[jur]) {
      const body = buildMdBody(s);
      if (body) md += body + '\n\n';
      md += '---\n\n';
    }
    delete grouped[jur];
  }
  for (const jur of Object.keys(grouped).sort()) {
    md += '# ' + (JURIS_SHORT[jur] || jur) + '\n\n';
    for (const s of grouped[jur]) {
      const body = buildMdBody(s);
      if (body) md += body + '\n\n';
      md += '---\n\n';
    }
  }
  
  // Events
  if (rightEvents.length > 0) {
    md += '# Events\n\n';
    for (const id of rightEvents) {
      const ev = EVENTS_BY_ID.get(id);
      if (!ev) continue;
      if (ev.Event_Description) md += ev.Event_Description + '\n\n';
      md += '---\n\n';
    }
  }
  
  // Jobs
  if (rightJobs.length > 0) {
    md += '# Jobs\n\n';
    for (const id of rightJobs) {
      const jb = JOBS_BY_ID.get(id);
      if (!jb) continue;
      if (jb.Job_Description) md += jb.Job_Description + '\n\n';
      md += '---\n\n';
    }
  }
  
  const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
  saveAs(blob, 'selected_stories.md');
}

/* ====== Init ====== */
render();
</script>
