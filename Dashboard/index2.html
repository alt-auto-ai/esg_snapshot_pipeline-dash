ucture, Project Approvals, and EPBC Developments","Jurisdiction":"Victoria","ESG_Relevance":"Medium","Out1":"Yarraville’s Anderson Street level crossing will be removed and replaced with pedestrian underpasses to cut safety risks.","Out2":"Early designs propose two accessible underpasses with stairs, lifts and ramps, a pedestrian plaza, retained vehicle access via the bus interchange, and community-shaped outcomes from surveys and workshops.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Yarraville underpass push","OneLiner":"Residents have until 11.59pm on 21 June to review designs replacing Anderson Street’s level crossing."},{"id":156,"Date":"2026-05-17","Title":"First look at designs for the new Spotswood Station","URL":"https://bigbuild.vic.gov.au/news/level-crossing-removal-project/first-look-at-designs-for-the-new-spotswood-station","Story_Type":"Infrastructure, Project Approvals, and EPBC Developments","Jurisdiction":"Victoria","ESG_Relevance":"Low","Out1":"Early designs for a new elevated Spotswood Station and rail bridge aim to replace the Hudsons Road level crossing.","Out2":"The project responds to community feedback, preserves heritage look and feel, improves walking and cycling links, and removes the crossing to reduce delays and congestion.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Rail bridge designs","OneLiner":"Early designs show elevated bridge and station removing Hudsons Road level crossing by 2028."},{"id":157,"Date":"2026-05-21","Title":"Work Together to Uphold Rules of War, Sow Seeds of Peace, Secretary-General Urges in Video Message for Protection of Civilians Week Event","URL":"https://press.un.org/en/2026/sgsm23142.doc.htm","Story_Type":"Ministerial, Diplomatic, and International Engagements","Jurisdiction":"International","ESG_Relevance":"Low","Out1":"UN urges recommitment to humanitarian law principles of distinction and precautions amid threats to civilians from explosive weapons and new technologies.","Out2":"Secretary-General Guterres warns combat in cities using wide-area explosive weapons and potential autonomous systems could breach rules, damaging hospitals, schools, water and power; calls for compliance with prohibitions on attacks on civilians and civilian objects.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Rules of war","OneLiner":"Secretary-General urges parties to recommit to distinction and precautions as new weapons raise civilian risk."},{"id":158,"Date":"2026-05-20","Title":"Secretary-General Welcomes General Assembly Resolution on International Court of Justice Advisory Opinion concerning States’ Climate Change Obligations","URL":"https://press.un.org/en/2026/sgsm23140.doc.htm","Story_Type":"Environmental Protection, Biodiversity, and Nature Policy","Jurisdiction":"International","ESG_Relevance":"High","Out1":"UN General Assembly adopts a resolution affirming states’ climate obligations following the International Court of Justice advisory opinion on climate change.","Out2":"Secretary-General António Guterres frames the adoption as a boost to international law and climate justice, calling for a rapid, just transition away from fossil fuels towards renewable energy.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"ICJ climate obligations","OneLiner":"On 20 May 2026, UN-backed resolution tightens states’ duties, accelerating just fossil-fuel transition planning."},{"id":159,"Date":"2026-05-18","Title":"Activities of Secretary-General in Kenya, 10-12 May","URL":"https://press.un.org/en/2026/sgt3463.doc.htm","Story_Type":"Infrastructure, Project Approvals, and EPBC Developments","Jurisdiction":"International","ESG_Relevance":"Medium","Out1":"UN opens net-zero Nairobi office complex with solar power, linking multilateral reform and regional representation to energy-neutrality goals.","Out2":"Secretary-General Guterres marked ground-breaking and inauguration of new UN Nairobi facilities, first net-zero buildings using on-site solar; complex targets energy neutrality by 2030 while calling for Security Council and financial architecture reforms.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Net-zero Nairobi push","OneLiner":"Solar upgrades aim for energy neutrality by 2030, setting a climate standard for UN offices."},{"id":160,"Date":"2026-05-22","Title":"Endangered turtles remain resilient one year on from Manning River flood","URL":"https://www.environment.nsw.gov.au/news/endangered-turtles-remain-resilient-one-year-manning-river-flood","Story_Type":"Reports, Data Releases, and Analytical Insights","Jurisdiction":"NSW","ESG_Relevance":"Medium","Out1":"NSW monitoring shows endangered Manning River turtle and key fish species persisting after the historic 2025 flood event.","Out2":"One year after Manning River flooding peaked at 6.5 metres, turtles remain in pre-flood sites across monitored rivers and fish juveniles boosted, underscoring real-time monitoring and environmental flows for threatened habitat recovery.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"River resilience returns","OneLiner":"Since 21 May 2025’s 6.5m flood peak, surveys show turtles back and juvenile fish rebounding."},{"id":161,"Date":"2026-05-22","Title":"Kosciuszko wild horse survey shows more work needed to protect national park","URL":"https://www.environment.nsw.gov.au/news/kosciuszko-wild-horse-survey-shows-work-needed-protect-national-park","Story_Type":"Environmental Protection, Biodiversity, and Nature Policy","Jurisdiction":"NSW","ESG_Relevance":"Medium","Out1":"NSW releases 2025 Kosciuszko wild horse survey, showing populations remain above the mid-2027 retention target of 3,000.","Out2":"Independent peer-reviewed estimates place horses between 6,476 and 16,411; aerial shooting removed 6,686 since late 2023 as early vegetation recovery continues and further controls, closures, and trials are planned.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Legal horse target","OneLiner":"NSW’s 2025 count finds 6,476–16,411 animals, pushing June aerial control to reach mid-2027 cap."},{"id":162,"Date":"2026-05-20","Title":"Biamanga and Gulaga National Parks Cultural Festival celebrates milestone anniversary","URL":"https://www.environment.nsw.gov.au/news/biamanga-and-gulaga-national-parks-cultural-festival-celebrates-milestone-anniversary","Story_Type":"Community, First Nations, and Social Licence Initiatives","Jurisdiction":"NSW","ESG_Relevance":"Low","Out1":"NSW will host a free cultural festival marking 20 years since Biamanga and Gulaga National Parks were handed back.","Out2":"The event on 30 May at Tilba Oval during National Reconciliation Week celebrates 20 years of joint management by Biamanga and Gulaga Boards of Management and NPWS, supporting cultural knowledge, conservation, and community connection.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Stewardship anniversary","OneLiner":"On 30 May, a festival at Tilba Oval marks 20 years of Yuin joint management."},{"id":163,"Date":"2026-05-18","Title":"Teamwork saves entangled humpback whale near Forster","URL":"https://www.environment.nsw.gov.au/news/teamwork-saves-entangled-humpback-whale-near-forster","Story_Type":"Compliance, Oversight, and Enforcement Actions","Jurisdiction":"NSW","ESG_Relevance":"Low","Out1":"NSW coordinated a multi-agency response to disentangle an 8-metre humpback whale from fishing gear off the Mid North Coast.","Out2":"NPWS led a three-day tracking and rescue, involving Sea World Foundation, Marine Rescue NSW and other agencies, removing extensive rope and hooks and attaching a satellite tracker.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Disentanglement saves whale","OneLiner":"A three-day NSW rescue freed an 8-metre humpback off the Mid North Coast on 16 May."},{"id":164,"Date":"2026-05-18","Title":"Coffs Coast set for major tourism boost as work begins on Dorrigo Great Escarpment Walk","URL":"https://www.environment.nsw.gov.au/news/coffs-coast-set-major-tourism-boost-work-begins-dorrigo-great-escarpment-walk","Story_Type":"Infrastructure, Project Approvals, and EPBC Developments","Jurisdiction":"NSW","ESG_Relevance":"Medium","Out1":"NSW has begun construction of the Dorrigo Escarpment Great Walk, expanding tourism capacity around Dorrigo Rainforest Centre.","Out2":"A $56.4 million state investment redevelops the Rainforest Centre and delivers a four-day, 46-kilometre multi-day walk with new camps, targeting major tourism, jobs and protected environmental outcomes.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Great Walk ramps up","OneLiner":"NSW starts $56.4m Dorrigo upgrades, aiming for 200,000 annual visitors and 270 jobs."},{"id":165,"Date":"2026-05-21","Title":"Maximum interest rate payable on overdue water bills from 1 July 2026","URL":"https://www.esc.vic.gov.au/media-centre/maximum-interest-rate-payable-overdue-water-bills-1-july-2026","Story_Type":"Compliance, Oversight, and Enforcement Actions","Jurisdiction":"Victoria","ESG_Relevance":"Low","Out1":"Victoria sets maximum interest on overdue water bills at 6.0% from 1 July 2026 to 30 June 2027.","Out2":"Essential Services Commission sets the rate to keep late-payment charges fair, slightly higher than 5.7% in 2025–26, reflecting economy-wide interest changes while safeguards limit charges for eligible customers.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Late charges revised","OneLiner":"From 1 July 2026, unpaid water bills face a 6.0% cap, up from 5.7%."},{"id":166,"Date":"2026-05-18","Title":"Glen Eira City Council’s request for higher rate cap approved","URL":"https://www.esc.vic.gov.au/media-centre/glen-eira-city-councils-request-higher-rate-cap-approved","Story_Type":"Infrastructure, Project Approvals, and EPBC Developments","Jurisdiction":"Victoria","ESG_Relevance":"Low","Out1":"Essential Services Commission approves Glen Eira’s higher 2026-27 rate cap of 5%, exceeding the Minister’s 2.75% cap.","Out2":"Decision under Fair Go Rates criteria supports long-term ratepayer interests and council service and infrastructure capacity, citing improved financial measures, efficiency efforts, alternative revenue options, and community engagement.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Rate cap boost","OneLiner":"For 2026-27, ESC lets Glen Eira apply a 5% rate cap, 2.25 points higher."},{"id":167,"Date":"2026-05-23","Title":"Joint media release: Renewables to power 4 million households, backed by Albanese Government","URL":"https://minister.dcceew.gov.au/bowen/media-releases/joint-media-release-renewables-power-4-million-households-backed-albanese-government","Story_Type":"Funding and Grant Announcements","Jurisdiction":"Australian National Scope","ESG_Relevance":"High","Out1":"Albanese Government backs Tender 7 renewable and battery projects, boosting grid supply for four million households by 2030.","Out2":"Nineteen hybrid wind, solar and storage projects across NSW, Queensland, Tasmania, Victoria and South Australia total 7.8GW and 7.9GWh, attracting $17b private investment and 19,000 construction jobs.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Grid boost for millions","OneLiner":"Nineteen projects deliver 7.8GW and 7.9GWh storage for 4m households by 2030."},{"id":168,"Date":"2026-05-20","Title":"Joint media release: Braidwood microgrid to strengthen regional energy resilience","URL":"https://minister.dcceew.gov.au/bowen/media-releases/joint-media-release-braidwood-microgrid-strengthen-regional-energy-resilience","Story_Type":"Funding and Grant Announcements","Jurisdiction":"NSW","ESG_Relevance":"High","Out1":"Albanese Government backs an islandable solar-plus-battery microgrid for Braidwood to strengthen resilience in NSW’s bushfire-prone, grid-constrained region.","Out2":"Braidwood Renewable Energy Project delivers 5MW solar and 5MW/10MWh storage to operate independently during outages, reducing diesel reliance and lowering outage risks, with $3 million from ARENA.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Islandable microgrid builds","OneLiner":"Town will run off 5MW solar plus 5MW/10MWh batteries, backed by $3m via ARENA."},{"id":169,"Date":"2026-05-18","Title":"Denmark visit to bolster energy security with international partners","URL":"https://minister.dcceew.gov.au/bowen/media-releases/denmark-visit-bolster-energy-security-international-partners","Story_Type":"Ministerial, Diplomatic, and International Engagements","Jurisdiction":"International","ESG_Relevance":"Medium","Out1":"Chris Bowen to visit Denmark to strengthen climate and energy partnerships focused on global energy security and clean investment.","Out2":"At the Copenhagen Climate Ministerial, he will discuss energy security and accelerate clean energy investment, inspect Copenhagen Malmö Port fuel terminals, and meet regional renewable and liquid fuel businesses.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Copenhagen clean investment","OneLiner":"Bowen will meet climate ministers this week and inspect terminals to speed Australia’s renewables security."},{"id":170,"Date":"2026-05-22","Title":"2026 Street Count highlights progress in Sydney CBD and Byron through targeted support","URL":"https://www.nsw.gov.au/ministerial-releases/2026-street-count","Story_Type":"Reports, Data Releases, and Analytical Insights","Jurisdiction":"NSW","ESG_Relevance":"High","Out1":"NSW 2026 Street Count shows fewer rough sleepers in targeted inner-city locations but a statewide 5% year-on-year rise.","Out2":"Rough sleeping fell in Inner-city Sydney and Byron Shire, yet increased in Coffs Harbour, Port Macquarie, the Hunter and Central Coast, informing homelessness investment and service planning.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Street count signals","OneLiner":"NSW reports 5% rise to 2,308 rough sleepers, despite local drops as strategy spending ramps."},{"id":171,"Date":"2026-05-22","Title":"Hub for girls makes career in sport a reality","URL":"https://www.nsw.gov.au/ministerial-releases/hub-for-girls-makes-career-sport-a-reality","Story_Type":"Community, First Nations, and Social Licence Initiatives","Jurisdiction":"NSW","ESG_Relevance":"Low","Out1":"NSW launches Her Future in Sport Hub to expand career pathways for women and girls, supporting the Play Her Way strategy.","Out2":"The careers hub, developed by the Office of Sport with Teenage Advisory Committee guidance, provides teen-friendly sports career resources, stories, and a quiz.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Future careers hub","OneLiner":"On 22 May 2026, NSW launches Sport Hub to steer women into sport careers."},{"id":172,"Date":"2026-05-22","Title":"More than $11 million awarded to improve cancer outcomes across NSW","URL":"https://www.nsw.gov.au/ministerial-releases/more-than-11-million-awarded-to-improve-cancer-outcomes-across-nsw","Story_Type":"Funding and Grant Announcements","Jurisdiction":"NSW","ESG_Relevance":"Low","Out1":"NSW funds over $11 million for cancer research fellowships, supporting 18 metro and regional researchers across AI and childhood brain cancer.","Out2":"Cancer Institute NSW’s Research Fellowships program backs 12 early career and six career development projects, including AI-personalised breast treatment and DIPG developmental origins research.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Cancer research funding","OneLiner":"NSW awards over $11m 21 May 2026 to 18 fellows, accelerating AI and DIPG studies."},{"id":173,"Date":"2026-05-21","Title":"SBTi’s 2026-2030 strategy: From ambition-setter to transformation partner","URL":"https://sciencebasedtargets.org/blog/sbtis-2026-2030-strategy-from-ambition-setter-to-transformation-partner","Story_Type":"Corporate and Institutional ESG Actions","Jurisdiction":"International","ESG_Relevance":"High","Out1":"SBTi shifts from setting ambition to enabling delivery, offering standards, data and partners to turn targets into real-world action.","Out2":"New 2026–2030 strategy expands action-focused, interoperable standards and implementation support, improving transparency and system-level progress assessment while addressing fragmentation and expanding high-emitting coverage.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"From targets to delivery","OneLiner":"May 21, SBTi shifts 2026-30 work to implementation standards and data to cut transition risk."},{"id":174,"Date":"2026-05-22","Title":"CBD COP17: Addressing the biodiversity financing gap","URL":"https://environment.ec.europa.eu/news/cbd-cop17-addressing-biodiversity-financing-gap-2026-05-22_en","Story_Type":"Reports, Data Releases, and Analytical Insights","Jurisdiction":"International","ESG_Relevance":"High","Out1":"EU convenes biodiversity finance talks ahead of CBD COP17 to close a reported €37 billion annual funding gap.","Out2":"The meeting focused on scaling innovative mechanisms, notably nature credits, and converting ecosystem dependencies into usable portfolio metrics, linking private capital with domestic and international public funds for Kunming–Montreal GBF targets.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"COP17 funding cliff?","OneLiner":"Ahead of COP17 in October, EU urges finance via nature-credits metrics to close €37bn gap."},{"id":175,"Date":"2026-05-22","Title":"EU delivering on biodiversity ahead of CBD COP17","URL":"https://environment.ec.europa.eu/news/eu-delivering-biodiversity-ahead-cbd-cop17-2026-05-22_en","Story_Type":"Environmental Protection, Biodiversity, and Nature Policy","Jurisdiction":"International","ESG_Relevance":"High","Out1":"EU spotlights local biodiversity action ahead of COP17, linking implementation of restoration rules with economic and security benefits.","Out2":"The EU highlights restoring wetlands and forests, greening cities and supporting pollinators, backed by National Restoration Plans under the Nature Restoration Regulation, Natura 2000 protections and Nature Credits to scale private investment.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Nature credits push","OneLiner":"EU details COP17 plans and Nature Credits workshop as Member States draft restoration plans this October."},{"id":176,"Date":"2026-05-21","Title":"New Waste Shipment Regulation and DIWASS platform go live","URL":"https://environment.ec.europa.eu/news/new-waste-shipment-regulation-and-diwass-platform-go-live-2026-05-21_en","Story_Type":"Environmental Protection, Biodiversity, and Nature Policy","Jurisdiction":"International","ESG_Relevance":"High","Out1":"EU Waste Shipment Regulation enters into application with DIWASS launching to digitise cross-border waste tracking, consent and documentation.","Out2":"DIWASS mandates electronic PIC for notified waste and enables real-time secure documentation exchange, improving traceability, compliance and enforcement, while cutting administrative costs and tightening plastic export controls.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"DIWASS goes live","OneLiner":"From 21 May, DIWASS makes PIC waste tracking electronic, cutting €1.4m annual admin costs while tightening plastic exports."},{"id":177,"Date":"2026-05-20","Title":"Multi-hazard floods in Europe tripled over 30 years","URL":"https://joint-research-centre.ec.europa.eu/jrc-news-and-updates/floods-compounding-hazards-increased-almost-threefold-30-years-2026-05-20_en","Story_Type":"Reports, Data Releases, and Analytical Insights","Jurisdiction":"International","ESG_Relevance":"High","Out1":"JRC-led study finds most European flood losses stem from compound multi-hazard events, not standalone flooding.","Out2":"Analysing 1,349 flood events (1981–2020), researchers found over 70% involved prior or concurrent drought, heatwave, cold spells or windstorms; compound events rose 186% and averaged 2.8x higher losses.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Compound hazards surge","OneLiner":"Study of 1,349 events shows 70% compound hazards, with losses 2.8 times higher than floods."},{"id":178,"Date":"2026-05-18","Title":"Commission seeks feedback on industrial biotechnology and biomanufacturing","URL":"https://single-market-economy.ec.europa.eu/news/commission-seeks-feedback-industrial-biotechnology-and-biomanufacturing-2026-05-18_en","Story_Type":"Consultation and Policy Design Opportunities","Jurisdiction":"International","ESG_Relevance":"High","Out1":"European Commission consults on industrial biotechnology and biomanufacturing, informing Biotech Act II to build an enabling EU business environment.","Out2":"Participants are invited to identify key challenges and bottlenecks and suggest solutions, with input feeding the Biotech Act II proposal to improve investor predictability, stimulate demand, and advance fossil feedstock transition.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Have Your Say deadline","OneLiner":"Submissions shape Act II, boosting demand and investor certainty by 10 June 2026."},{"id":179,"Date":"2026-05-18","Title":"Meet Ernesto Montoya - Natural and historical heritage communicator","URL":"https://environment.ec.europa.eu/news/meet-ernesto-montoya-natural-and-historical-heritage-communicator-2026-05-18_en","Story_Type":"Community, First Nations, and Social Licence Initiatives","Jurisdiction":"International","ESG_Relevance":"Low","Out1":"Heritage communicator Ernesto Montoya uses natural and historical storytelling to build rural understanding and support conservation outcomes.","Out2":"Through Vieja Tierra outreach, he emphasises rural complexity shaped by history, biodiversity and social change, highlighting Extremadura’s species-rich habitats and the need to balance human activity with the environment.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Rural heritage outreach","OneLiner":"A project in Extremadura uses scientific storytelling to spur conservation of refuge ecosystems and species."},{"id":180,"Date":"2026-05-18","Title":"Meet Catarina Barreiros - zero waste brand co-founder","URL":"https://environment.ec.europa.eu/news/meet-catarina-barreiros-zero-waste-brand-co-founder-2026-05-18_en","Story_Type":"Misc","Jurisdiction":"International","ESG_Relevance":"Low","Out1":"Sustainability communicator Catarina Barreiros advances zero-waste education and reuse initiatives to promote environmental responsibility and social impact in Portugal.","Out2":"Barreiros founded Do Zero in 2019 and developed Cidade Do Zero, Zeroo Cups and Norm., while advocating protected areas and accessible education on energy transition and conscious consumption.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Waste education surge","OneLiner":"On 18 May 2026, EC spotlights Do Zero founder behind 150 workshops and 20,000 attendees."},{"id":181,"Date":"2026-05-18","Title":"Meet Alex Megos - climber","URL":"https://environment.ec.europa.eu/news/meet-alex-megos-climber-2026-05-18_en","Story_Type":"Environmental Protection, Biodiversity, and Nature Policy","Jurisdiction":"International","ESG_Relevance":"Medium","Out1":"Professional climber Alex Megos backs Natura 2000, highlighting biodiversity protection for iconic limestone crags and responsible outdoor access.","Out2":"Megos says Natura 2000 preserves the biodiversity of protected limestone areas, citing environmental stress from high foot traffic, and sharing reduced travel and vegan habits to cut his footprint.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Climbing meets conservation","OneLiner":"Rising foot traffic on cliffs prompts a climber to back Natura 2000 and cut footprints."},{"id":182,"Date":"2026-05-21","Title":"Supporting the Budget delivery","URL":"https://www.finance.gov.au/about-us/news/2026/supporting-budget-delivery","Story_Type":"Infrastructure, Project Approvals, and EPBC Developments","Jurisdiction":"Australian National Scope","ESG_Relevance":"Low","Out1":"Finance highlights Budget delivery roles while outlining reforms on regulation, fuel security, defence costing, digital capability, and assurance processes.","Out2":"Finance links delivery of the 2026–27 Budget to professionalism and IT system adjustments, while citing regulatory burden reduction, fuel security reserves, independent defence cost assurance, and transitions to in-house claims, Digital ID, and secure cloud platforms.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Budget delivery agenda","OneLiner":"Finance outlines 2026–27 reforms, from regulatory cuts to Digital ID and cloud migration, tightening accountability."},{"id":183,"Date":"2026-05-22","Title":"IMF Executive Board Concludes 2026 Article IV Consultation Discussions with the People’s Republic of China—Hong Kong Special Administrative Region","URL":"https://www.imf.org/en/news/articles/2026/05/22/pr26168-hong-kong-sar-imf-executive-board-concludes-2026-article-iv-consultation-discussions","Story_Type":"Reports, Data Releases, and Analytical Insights","Jurisdiction":"International","ESG_Relevance":"Medium","Out1":"IMF endorses Hong Kong SAR’s Article IV appraisal, noting uneven recovery, resilient banks, and key risks in CRE and external shocks.","Out2":"Growth is expected to moderate as geopolitical tensions and tighter conditions weigh, while ageing and lower labour participation challenge medium-term potential; CRE underwriting, SME liquidity targeting, and expanded stress testing are urged.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Sustainable finance push","OneLiner":"IMF urges stronger climate-disclosure rules and private capital mobilisation as CRE risks persist in banks."},{"id":184,"Date":"2026-05-22","Title":"IMF Executive Board Concludes 2026 Article IV Consultation with Spain","URL":"https://www.imf.org/en/news/articles/2026/05/22/pr26163-spain-imf-executive-board-concludes-2026-article-iv-consultation","Story_Type":"Reports, Data Releases, and Analytical Insights","Jurisdiction":"International","ESG_Relevance":"Low","Out1":"IMF concludes Spain’s robust growth outlook is slowing amid demographic pressures, with downside risks and sticky inflation still tied to geopolitics.","Out2":"Directors urged faster discretionary fiscal consolidation, including phasing out energy support and strengthening medium-term strategy, while targeting housing supply and mortgage risk measures.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Fiscal buffer urgency","OneLiner":"IMF urges Spain to phase energy support and tighten housing and mortgage rules amid fast aging pressures."},{"id":185,"Date":"2026-05-21","Title":"IMF Reaches Staff-Level Agreement with Togo on the Combined Third and Fourth Reviews under the Extended Credit Facility Arrangement","URL":"https://www.imf.org/en/news/articles/2026/05/21/pr26167-togo-imf-reaches-sla-with-togo-on-the-combined-3rd-and-4th-reviews-under-ecf-arrangement","Story_Type":"Reports, Data Releases, and Analytical Insights","Jurisdiction":"International","ESG_Relevance":"Low","Out1":"IMF staff-level agreement enables Togo to complete ECF third and fourth reviews, subject to Executive Board approval.","Out2":"Program performance was broadly satisfactory, with most quantitative criteria met and structural benchmarks advancing, supporting debt sustainability; energy shock raises fiscal risk needing targeted protection.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"IMF unlocks Togo cash","OneLiner":"Executive Board approval would release SDR 80.74 million, completing combined third and fourth ECF reviews."},{"id":186,"Date":"2026-05-21","Title":"IMF Executive Board Completes Second Review of the Extended Arrangement Under the Extended Fund Facility and Concludes 2026 Article IV Consultation with Argentina","URL":"https://www.imf.org/en/news/articles/2026/05/21/pr26165-argentina-imf-completes-2nd-rev-of-extended-arr-under-eff-concludes-2026-aiv-consultation","Story_Type":"Reports, Data Releases, and Analytical Insights","Jurisdiction":"International","ESG_Relevance":"Medium","Out1":"IMF completes second Argentina Extended Fund Facility review, supporting disinflation, external stability, and private-sector growth through continued reforms.","Out2":"IMF approved the second EFF review and concluded the 2026 Article IV consultation, unlocking about US$1bn; it cites missed NIR targets, reserve rebuild efforts, fiscal subsidy and social-transfer targeting, FX flexibility, and governance and capital-market risk controls.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"IMF unlocks cash","OneLiner":"IMF board approves Argentina review, releasing about US$1bn and urging tighter fiscal, FX and reserve targets."},{"id":187,"Date":"2026-05-21","Title":"IMF Management Approves the Third Review and Extends the Staff-Monitored Program with Haiti","URL":"https://www.imf.org/en/news/articles/2026/05/21/pr26164-haiti-imf-management-approves-3rd-review-and-extends-smp","Story_Type":"Ministerial, Diplomatic, and International Engagements","Jurisdiction":"International","ESG_Relevance":"Low","Out1":"IMF management approved Haiti’s third Staff-Monitored Program review and extended it to June 2027 as reforms progress amid security risks.","Out2":"All end-December 2025 targets were met, but reforms slowed due to insecurity, capacity constraints and political uncertainty; SMP extension aims to anchor stability, governance, anticorruption and social safety-net delivery under dire humanitarian and oil-price pressures.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Haiti SMP extended","OneLiner":"IMF management approved Haiti’s third review and extended its staff-monitored program to June 19, 2027."},{"id":188,"Date":"2026-05-21","Title":"France: Staff Concluding Statement of the 2026 Article IV Mission","URL":"https://www.imf.org/en/news/articles/2026/05/21/mcs-052126-france-staff-concluding-statement-of-the-2026-article-iv-mission","Story_Type":"Reports, Data Releases, and Analytical Insights","Jurisdiction":"International","ESG_Relevance":"Medium","Out1":"IMF Article IV for France highlights moderate 2025 growth, Middle East-driven headwinds, and policy priorities for inclusive, durable recovery.","Out2":"Staff urges targeted energy-shock response, faster fiscal consolidation aligned to EU rules, and structural reforms covering spending efficiency, labour supply, financial stability, and deeper EU single-market integration amid downside risks.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Medium-term fiscal anchor","OneLiner":"IMF urges France to frontload 0.8% GDP effort 2027-29 to reach 3% deficit by 2029."},{"id":189,"Date":"2026-05-19","Title":"Interview with Kieran Gilbert, Sky News","URL":"https://www.trademinister.gov.au/minister/don-farrell/transcript/interview-kieran-gilbert-sky-news-4","Story_Type":"Ministerial, Diplomatic, and International Engagements","Jurisdiction":"International","ESG_Relevance":"Low","Out1":"Australia emphasises reliable fossil fuel supply to Japan and China, linking energy security and trade talks in Tokyo.","Out2":"The Trade Minister said weekly increases in petrol, diesel and airline fuel supply follow Middle East disruption; Japan’s gas use remains crucial, with minister urging greater support for Australia’s domestic gas.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Supply reliability","OneLiner":"Farrell says Australia’s fuel flows rise weekly, keeping Japan contracts steady amid 26% Singapore dependence."},{"id":190,"Date":"2026-05-19","Title":"Japan-Australia Ministerial Economic Dialogue Joint Ministerial Statement","URL":"https://www.trademinister.gov.au/minister/don-farrell/statements/japan-australia-ministerial-economic-dialogue-joint-ministerial-statement","Story_Type":"Ministerial, Diplomatic, and International Engagements","Jurisdiction":"International","ESG_Relevance":"Medium","Out1":"Japan and Australia deepen economic security, energy cooperation and critical minerals collaboration through a sixth ministerial dialogue in Tokyo.","Out2":"Ministers co-chaired the sixth dialogue, reaffirming Special Strategic Partner commitments, launching a Working Group on Economic Security and Comprehensive Supply Chain Cooperation, and addressing CPTPP rules, NMPPs, export restrictions and energy market reforms.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Critical minerals supply squeeze","OneLiner":"On 19 May 2026, ministers set working group talks to expand economic security and CPTPP-linked trade cooperation."},{"id":191,"Date":"2026-05-18","Title":"Swap your shop to Aussie-made during Australian Made Week 2026","URL":"https://business.vic.gov.au/news-and-updates/2026/swap-your-shop-to-aussie-made-during-australian-made-week-2026","Story_Type":"Community, First Nations, and Social Licence Initiatives","Jurisdiction":"Victoria","ESG_Relevance":"Low","Out1":"Australian Made Week in Victoria promotes Australian Made certification to help small businesses meet strict criteria and build trust with consumers.","Out2":"Running 18–24 May 2026, the initiative encourages use of the green-and-gold kangaroo logo, citing high customer trust and stronger purchase intent, while offering marketing access, directories, and potential pricing premiums.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Australian Made push","OneLiner":"During 18–24 May, Victorian firms can win certification, boosting visibility, marketing assets and directory listings."},{"id":192,"Date":"2026-05-20","Title":"ALGA Alert – Legal Opinion on the Fair Work Commission’s Road Transport Contractual Chain Order","URL":"https://alga.com.au/alga-alert-legal-opinion-on-the-fair-work-commissions-road-transport-contractual-chain-order/","Story_Type":"Consultation and Policy Design Opportunities","Jurisdiction":"Australian National Scope","ESG_Relevance":"Low","Out1":"ALGA supports councils responding to the Fair Work Commission’s Road Transport Contractual Chain Order on fuel cost recovery.","Out2":"Councils report financial pressure, administrative burden and implementation uncertainty; ALGA coordinates a national response, shares legal advice, and prepares submissions for the one-month review hearing.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"RTCCO implementation stress","OneLiner":"ALGA seeks submissions by 25 May 2026 to ease councils’ compliance pressures on cost recovery."},{"id":193,"Date":"2026-05-22","Title":"Methane Abatement  Regulators from around the world convene in Paris as new network aims to tackle methane emissions","URL":"https://www.iea.org/news/regulators-from-around-the-world-convene-in-paris-as-new-network-aims-to-tackle-methane-emissions","Story_Type":"Ministerial, Diplomatic, and International Engagements","Jurisdiction":"International","ESG_Relevance":"High","Out1":"IEA and CCAC co-host inaugural MR2R Network plenary to strengthen regulator cooperation on methane abatement.","Out2":"Regulators from nearly 30 countries exchanged approaches to translating methane commitments into action, focusing on regulatory design, enforcement, data availability and market, trade and finance impacts, with capacity-building and best-practice sharing planned.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Methane regulator-to-regulator","OneLiner":"Next plenary in 2027 pushes nearly 30 jurisdictions to turn commitments into enforceable emissions rules."},{"id":194,"Date":"2026-05-21","Title":"The Middle East and Global Energy Markets  IEA releases major update to tracker of government responses to energy impacts of Middle East conflict","URL":"https://www.iea.org/news/iea-releases-major-update-to-tracker-of-government-responses-to-energy-impacts-of-middle-east-conflict","Story_Type":"Reports, Data Releases, and Analytical Insights","Jurisdiction":"International","ESG_Relevance":"Medium","Out1":"IEA expands its Energy Crisis Policy Response Tracker to map demand-side and structural measures addressing Middle East conflict energy impacts.","Out2":"Updated tool monitors government actions after trade disruptions, highlighting energy conservation and consumer support plus longer-term resilience policies like efficiency, electrification, building retrofits and electric vehicles.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Demand-side resilience","OneLiner":"IEA’s 21 May update maps government responses across 109 countries, adding efficiency and EV retrofits."},{"id":195,"Date":"2026-05-21","Title":"News  New podcast episode examines hydropower’s major role in electricity systems around the world","URL":"https://www.iea.org/news/new-podcast-episode-examines-hydropower-s-major-role-in-electricity-systems-around-the-world","Story_Type":"Reports, Data Releases, and Analytical Insights","Jurisdiction":"International","ESG_Relevance":"Low","Out1":"IEA podcast highlights hydropower’s major global role, analysing how its system value has evolved with rising electricity demand.","Out2":"Renewable analyst Yasmina Abdelilah explains hydropower’s benefits for advanced and emerging economies and discusses key barriers to integrating it more fully into energy conversations.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Electricity system missing","OneLiner":"IEA podcast explains hydropower’s evolving role and outlines barriers to use as demand surges globally."},{"id":196,"Date":"2026-05-20","Title":"Electric Vehicles  Close to 30% of cars sold this year are set to be electric as countries and consumers respond to energy crisis","URL":"https://www.iea.org/news/close-to-30-of-cars-sold-this-year-are-set-to-be-electric-as-countries-and-consumers-respond-to-energy-crisis","Story_Type":"Reports, Data Releases, and Analytical Insights","Jurisdiction":"International","ESG_Relevance":"High","Out1":"IEA projects EV sales nearing 30% of global car purchases in 2026 amid cost competitiveness and energy-crisis-driven policy shifts.","Out2":"Global EV outlook forecasts 23 million sales in 2026 and up to 510 million EVs by 2035; 2025 growth hit 20%, with mixed Q1 2026 declines offset by strong gains.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"EV surge amid crisis","OneLiner":"IEA projects 23 million battery-powered car sales in 2026, near 30% share, after Q1 fall."}];

/* ====== Type colors ====== */
const TYPE_COLORS = {
  "Community, First Nations, and Social Licence Initiatives": "#FFE0B2",
  "Compliance, Oversight, and Enforcement Actions": "#FFCDD2",
  "Consultation and Policy Design Opportunities": "#E1BEE7",
  "Corporate and Institutional ESG Actions": "#BBDEFB",
  "Environmental Protection, Biodiversity, and Nature Policy": "#C8E6C9",
  "Funding and Grant Announcements": "#FFF9C4",
  "Infrastructure, Project Approvals, and EPBC Developments": "#D7CCC8",
  "Legislative and Statutory Developments": "#B2DFDB",
  "Ministerial, Diplomatic, and International Engagements": "#F0F4C3",
  "Misc": "#CFD8DC",
  "Parliamentary and Political Proceedings": "#D1C4E9",
  "Reports, Data Releases, and Analytical Insights": "#B3E5FC",
  "State and Local Government Programs": "#F8BBD0",
};
function typeColor(st) { return TYPE_COLORS[st] || "#E0E0E0"; }
function darkenColor(hex, factor) {
  const f = factor || 0.65;
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return '#' + [Math.round(r*f),Math.round(g*f),Math.round(b*f)].map(c => c.toString(16).padStart(2,'0')).join('');
}

/* ====== Ordering ====== */
const JURIS_ORDER = [
  "Australian National Scope","Australian Capital Territory","NSW","Northern Territory",
  "Queensland","South Australia","Tasmania","Victoria","Western Australia","International"
];
const JURIS_SHORT = {
  "Australian National Scope": "Australian National",

};
const TYPE_ORDER = [
  "Legislative and Statutory Developments","Parliamentary and Political Proceedings",
  "Compliance, Oversight, and Enforcement Actions","Consultation and Policy Design Opportunities",
  "Funding and Grant Announcements","Corporate and Institutional ESG Actions",
  "State and Local Government Programs","Infrastructure, Project Approvals, and EPBC Developments",
  "Reports, Data Releases, and Analytical Insights","Ministerial, Diplomatic, and International Engagements",
  "Environmental Protection, Biodiversity, and Nature Policy",
  "Community, First Nations, and Social Licence Initiatives","Misc",
];
const TYPE_RANK = {}; TYPE_ORDER.forEach((t,i) => TYPE_RANK[t] = i);
const REL_PRIORITY = { High: 0, Medium: 1, Low: 2 };

function initData() {
  // Sort stories by jurisdiction > type > relevance
  const grouped = {};
  for (const s of RAW_DATA) {
    const j = s.Jurisdiction || "Other";
    const st = s.Story_Type || "Other";
    if (!grouped[j]) grouped[j] = {};
    if (!grouped[j][st]) grouped[j][st] = [];
    grouped[j][st].push(s);
  }
  for (const j of Object.keys(grouped)) {
    for (const st of Object.keys(grouped[j])) {
      grouped[j][st].sort((a,b) => (REL_PRIORITY[a.ESG_Relevance]??3) - (REL_PRIORITY[b.ESG_Relevance]??3));
    }
  }
  leftStories = [];
  for (const jur of JURIS_ORDER) {
    if (!grouped[jur]) continue;
    const types = Object.keys(grouped[jur]).sort((a,b) => (TYPE_RANK[a]??999) - (TYPE_RANK[b]??999));
    for (const st of types) {
      for (const s of grouped[jur][st]) leftStories.push(s.id);
    }
    delete grouped[jur];
  }
  for (const jur of Object.keys(grouped).sort()) {
    const types = Object.keys(grouped[jur]).sort((a,b) => (TYPE_RANK[a]??999) - (TYPE_RANK[b]??999));
    for (const st of types) {
      for (const s of grouped[jur][st]) leftStories.push(s.id);
    }
  }
  leftEvents = EVENTS_DATA.map(e => e.id);
  leftJobs = JOBS_DATA.map(j => j.id);
  rightStories = [];
  rightEvents = [];
  rightJobs = [];
}
initData();

/* ====== Helpers ====== */
function esc(s) {
  return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}
function hasLeadingBullet(line) { return /^\s*[\u2022*\-\u2013\u2014]/.test(line || ""); }
function stripBullet(line) { return String(line || "").replace(/^\s*[\u2022*\-\u2013\u2014]\s*/, "").trim(); }
function pHtml(text) { return '<p>' + esc(text) + '</p>'; }
function bulletHtml(text) { return '<p class="bullet"><span>&bull;</span><span>' + esc(text) + '</span></p>'; }
function narrativeHtml(parts) { return '<p>' + parts.filter(Boolean).join(' ') + '</p>'; }

function buildCardBody(s) {
  const outputs = [s.Out1, s.Out2, s.Out3, s.Out4, s.Out5, s.Out6]
    .map(value => String(value || "").trim())
    .filter(Boolean);
  const hook = (s.Hook || "").trim();
  const oneLiner = (s.OneLiner || "").trim();
  if (![...outputs, hook, oneLiner].some(Boolean)) return "";
  let h = "";
  if (outputs.length) {
    const narrative = outputs.map((text, index) => {
      if (outputs.length === 1 && s.URL) return esc(text);
      if (index === 0) return '<strong>' + esc(text) + '</strong>';
      return esc(text);
    });
    if (s.URL) narrative.push('<a href="' + esc(s.URL) + '" target="_blank">Read more</a>');
    h = narrativeHtml(narrative);
  }
  if (hook || oneLiner) {
    const hookPart = hook ? '<strong>' + esc(hook) + '</strong>' : '';
    const oneLinerPart = oneLiner ? esc(oneLiner) : '';
    h += '<p>' + [hookPart, oneLinerPart].filter(Boolean).join(' ') + '</p>';
  }
  return h;
}

function renderStoryCard(s, panel) {
  const bg = typeColor(s.Story_Type);
  const pillBg = darkenColor(bg, 0.65);
  const relClass = s.ESG_Relevance === 'High' ? 'rel-high' : s.ESG_Relevance === 'Medium' ? 'rel-medium' : 'rel-low';
  return '<div class="card" draggable="true" data-type="story" data-id="' + s.id + '" data-panel="' + panel + '" style="background:' + bg + ';">' +
    '<div class="card-header">' +
    '<span class="story-type-pill" style="background:' + pillBg + ';color:#fff;">' + esc(s.Story_Type) + '</span>' +
    '<span class="relevance-badge ' + relClass + '">' + esc(s.ESG_Relevance) + '</span>' +
    '</div>' +
    '<div class="card-title">' + esc(s.Title) + '</div>' +
    '<div class="card-body">' + buildCardBody(s) + '</div>' +
    '</div>';
}

function renderAuxCard(item, type, panel) {
  const descKey = type === 'event' ? 'Event_Description' : 'Job_Description';
  return '<div class="aux-card" draggable="true" data-type="' + type + '" data-id="' + item.id + '" data-panel="' + panel + '">' +
    '<div class="aux-date">' + esc(item.Date) + '</div>' +
    '<div class="aux-title">' + esc(item.Title) + '</div>' +
    '<div class="aux-url"><a href="' + esc(item.URL) + '" target="_blank">' + esc(item.URL) + '</a></div>' +
    '<div class="aux-desc">' + esc(item[descKey] || '') + '</div>' +
    '</div>';
}

function renderLeftPanel() {
  const root = document.getElementById('leftPanel');
  let html = '';
  
  // Stories grouped by jurisdiction
  const grouped = {};
  for (const id of leftStories) {
    const s = STORY_BY_ID.get(id);

    const j = s.Jurisdiction || "Other";

    grouped[j].push(s);
  }
  
  for (const jur of JURIS_ORDER) {

      html += renderStoryCard(s, 'left');

    delete grouped[jur];

  for (const jur of Object.keys(grouped).sort()) {

      html += renderStoryCard(s, 'left');

  // Events
  if (leftEvents.length > 0) {
    html += '<h2 class="section-header">Events <span class="section-count">(' + leftEvents.length + ')</span></h2>';

      const e = EVENTS_BY_ID.get(id);
      if (e) html += renderAuxCard(e, 'event', 'left');

  // Jobs
  if (leftJobs.length > 0) {
    html += '<h2 class="section-header">Jobs <span class="section-count">(' + leftJobs.length + ')</span></h2>';
    for (const id of leftJobs) {
      const j = JOBS_BY_ID.get(id);
      if (j) html += renderAuxCard(j, 'job', 'left');
    }
  }
  
  if (!html) html = '<div class="empty-state">All items have been selected</div>';
  root.innerHTML = html;

}

    if (rightStories.length > 0) parts.push('Stories: ' + rightStories.length);
    if (rightEvents.length > 0) parts.push('Events: ' + rightEvents.length);
    if (rightJobs.length > 0) parts.push('Jobs: ' + rightJobs.length);
    countText += ' (' + parts.join(', ') + ')';
  }
  document.getElementById('rightCount').textContent = countText;
  document.getElementById('genBtn').disabled = total === 0;
  document.getElementById('clearBtn').disabled = total === 0;
}

function render() {
  renderLeftPanel();
  renderRightPanel();
}

function clearAll() {
  leftStories = leftStories.concat(rightStories);
  leftEvents = leftEvents.concat(rightEvents);
  leftJobs = leftJobs.concat(rightJobs);
  rightStories = [];
  rightEvents = [];
  rightJobs = [];
  render();
}

/* ====== Selection ====== */
function selectCard(el) {
  if (selectedEl) selectedEl.classList.remove('selected');
  selectedEl = el;
  if (el) el.classList.add('selected');
}

document.addEventListener('click', (e) => {
  const card = e.target.closest('.card, .aux-card');
  if (card) {
    selectCard(card);
    e.stopPropagation();
  } else if (!e.target.closest('.ctx-menu')) {
    selectCard(null);
  }
});

/* ====== Drag and Drop ====== */
document.addEventListener('dragstart', (e) => {
  const card = e.target.closest('.card, .aux-card');
  if (!card) return;
  draggedEl = card;
  draggedData = {
    type: card.dataset.type,
    id: parseInt(card.dataset.id),
    panel: card.dataset.panel
  };
  card.classList.add('dragging');
  selectCard(card);
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', JSON.stringify(draggedData));
});

document.addEventListener('dragend', (e) => {
  if (draggedEl) draggedEl.classList.remove('dragging');
  draggedEl = null;
  draggedData = null;
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
  document.querySelectorAll('.drag-active').forEach(el => el.classList.remove('drag-active'));
});

document.addEventListener('dragover', (e) => {
  e.preventDefault();
  const rightPanel = document.getElementById('rightPanel');
  const dropZone = document.getElementById('dropZone');
  
  if (rightPanel.contains(e.target)) {
    e.dataTransfer.dropEffect = 'move';
    if (dropZone) dropZone.classList.add('drag-active');
    
    // Reorder within right panel
    const card = e.target.closest('.card, .aux-card');
    if (card && draggedEl && card !== draggedEl && card.dataset.panel === 'right') {
      document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
      card.classList.add('drag-over');
    }
  } else {
    if (dropZone) dropZone.classList.remove('drag-active');
  }
});

document.addEventListener('dragleave', (e) => {
  const dropZone = document.getElementById('dropZone');
  if (dropZone && !document.getElementById('rightPanel').contains(e.relatedTarget)) {
    dropZone.classList.remove('drag-active');
  }
});

document.addEventListener('drop', (e) => {
  e.preventDefault();
  const rightPanel = document.getElementById('rightPanel');
  const dropZone = document.getElementById('dropZone');
  if (dropZone) dropZone.classList.remove('drag-active');
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
  
  if (!draggedData) return;
  
  // Dropping on right panel = include
  if (rightPanel.contains(e.target)) {
    if (draggedData.panel === 'left') {
      moveToRight(draggedData.type, draggedData.id);
    } else {
      // Reorder within right
      const targetCard = e.target.closest('.card, .aux-card');
      if (targetCard && targetCard !== draggedEl) {
        reorderInRight(draggedData.type, draggedData.id, parseInt(targetCard.dataset.id), targetCard.dataset.type);
      }
    }
  }
  // Dropping on left panel = exclude
  else if (document.getElementById('leftPanel').contains(e.target)) {
    if (draggedData.panel === 'right') {
      moveToLeft(draggedData.type, draggedData.id);
    }
  }
});

/* ====== Move Functions ====== */
function moveToRight(type, id) {
  if (type === 'story') {
    const idx = leftStories.indexOf(id);
    if (idx > -1) { leftStories.splice(idx, 1); rightStories.push(id); }
  } else if (type === 'event') {
    const idx = leftEvents.indexOf(id);
    if (idx > -1) { leftEvents.splice(idx, 1); rightEvents.push(id); }
  } else if (type === 'job') {
    const idx = leftJobs.indexOf(id);
    if (idx > -1) { leftJobs.splice(idx, 1); rightJobs.push(id); }
  }
  render();
}

function moveToLeft(type, id) {
  if (type === 'story') {
    const idx = rightStories.indexOf(id);
    if (idx > -1) { rightStories.splice(idx, 1); leftStories.push(id); }
  } else if (type === 'event') {
    const idx = rightEvents.indexOf(id);
    if (idx > -1) { rightEvents.splice(idx, 1); leftEvents.push(id); }
  } else if (type === 'job') {
    const idx = rightJobs.indexOf(id);
    if (idx > -1) { rightJobs.splice(idx, 1); leftJobs.push(id); }
  }
  render();
}

function reorderInRight(type, id, targetId, targetType) {
  let arr;
  if (type === 'story') arr = rightStories;
  else if (type === 'event') arr = rightEvents;
  else arr = rightJobs;
  
  const fromIdx = arr.indexOf(id);
  if (fromIdx === -1) return;
  
  // For same type, move to target position
  if (type === targetType) {
    const toIdx = arr.indexOf(targetId);
    if (toIdx === -1) return;
    arr.splice(fromIdx, 1);
    arr.splice(toIdx, 0, id);
    render();
  }
}

function moveUp(type, id) {
  let arr;
  if (type === 'story') arr = rightStories;
  else if (type === 'event') arr = rightEvents;
  else arr = rightJobs;
  
  const idx = arr.indexOf(id);
  if (idx > 0) {
    [arr[idx], arr[idx-1]] = [arr[idx-1], arr[idx]];
    render();
    setTimeout(() => {
      const el = document.querySelector('[data-panel="right"][data-type="' + type + '"][data-id="' + id + '"]');
      if (el) selectCard(el);
    }, 10);
  }
}

function moveDown(type, id) {
  let arr;
  if (type === 'story') arr = rightStories;
  else if (type === 'event') arr = rightEvents;
  else arr = rightJobs;
  
  const idx = arr.indexOf(id);
  if (idx < arr.length - 1 && idx > -1) {
    [arr[idx], arr[idx+1]] = [arr[idx+1], arr[idx]];
    render();
    setTimeout(() => {
      const el = document.querySelector('[data-panel="right"][data-type="' + type + '"][data-id="' + id + '"]');
      if (el) selectCard(el);
    }, 10);
  }
}

/* ====== Context Menu ====== */
const ctxMenu = document.getElementById('ctxMenu');
let ctxData = null;

document.addEventListener('contextmenu', (e) => {
  const card = e.target.closest('.card, .aux-card');
  if (!card) { ctxMenu.style.display = 'none'; return; }
  
  e.preventDefault();
  selectCard(card);
  
  ctxData = {
    type: card.dataset.type,
    id: parseInt(card.dataset.id),
    panel: card.dataset.panel
  };
  
  // Show/hide relevant options
  const isLeft = ctxData.panel === 'left';
  document.getElementById('ctxInclude').style.display = isLeft ? 'block' : 'none';
  document.getElementById('ctxExclude').style.display = isLeft ? 'none' : 'block';
  document.getElementById('ctxMoveUp').style.display = isLeft ? 'none' : 'block';
  document.getElementById('ctxMoveDown').style.display = isLeft ? 'none' : 'block';
  
  ctxMenu.style.left = e.clientX + 'px';
  ctxMenu.style.top = e.clientY + 'px';
  ctxMenu.style.display = 'block';
});

document.addEventListener('click', () => { ctxMenu.style.display = 'none'; });

document.getElementById('ctxInclude').addEventListener('click', () => {
  if (ctxData) moveToRight(ctxData.type, ctxData.id);
  ctxMenu.style.display = 'none';
});

document.getElementById('ctxExclude').addEventListener('click', () => {
  if (ctxData) moveToLeft(ctxData.type, ctxData.id);
  ctxMenu.style.display = 'none';
});

document.getElementById('ctxMoveUp').addEventListener('click', () => {
  if (ctxData) moveUp(ctxData.type, ctxData.id);
  ctxMenu.style.display = 'none';
});

document.getElementById('ctxMoveDown').addEventListener('click', () => {
  if (ctxData) moveDown(ctxData.type, ctxData.id);
  ctxMenu.style.display = 'none';
});

/* ====== Keyboard Navigation ====== */
document.addEventListener('keydown', (e) => {
  if (!selectedEl) return;
  
  const type = selectedEl.dataset.type;
  const id = parseInt(selectedEl.dataset.id);
  const panel = selectedEl.dataset.panel;
  
  switch (e.key) {
    case 'ArrowRight':
      if (panel === 'left') {
        moveToRight(type, id);
        setTimeout(() => {
          const el = document.querySelector('[data-panel="right"][data-type="' + type + '"][data-id="' + id + '"]');
          if (el) selectCard(el);
        }, 10);
      }
      e.preventDefault();
      break;
    case 'ArrowLeft':
      if (panel === 'right') {
        moveToLeft(type, id);
        setTimeout(() => {
          const el = document.querySelector('[data-panel="left"][data-type="' + type + '"][data-id="' + id + '"]');
          if (el) selectCard(el);
        }, 10);
      }
      e.preventDefault();
      break;
    case 'ArrowUp':
      if (panel === 'right') {
        moveUp(type, id);
        e.preventDefault();
      }
      break;
    case 'ArrowDown':
      if (panel === 'right') {
        moveDown(type, id);
        e.preventDefault();
      }
      break;
  }
});

/* ====== Markdown Generation ====== */
function buildMdBody(s) {
  const outputs = [s.Out1, s.Out2, s.Out3, s.Out4, s.Out5, s.Out6]
    .map(value => String(value || '').trim())
    .filter(Boolean);
  if (!outputs.length) return '';
  const body = outputs.map((text, index) => {
    if (outputs.length === 1 && s.URL) return text;
    if (index === 0) return '**' + text + '**';
    return text;
  }).join(' ');
  return body + (s.URL ? ' [**Read more**](' + s.URL + ')' : '');
}

function generateDoc() {
  const total = rightStories.length + rightEvents.length + rightJobs.length;
  if (total === 0) { alert('No items selected for export.'); return; }
  
  let md = '';
  
  // Stories grouped by jurisdiction
  const grouped = {};
  for (const id of rightStories) {
    const s = STORY_BY_ID.get(id);
    if (!s) continue;
    const j = s.Jurisdiction || "Other";
    if (!grouped[j]) grouped[j] = [];
    grouped[j].push(s);
  }
  
  // === HIGHLIGHTS SECTION (Hook + One Liner at top) ===
  let highlights = '';
  for (const jur of JURIS_ORDER) {
    if (!grouped[jur] || grouped[jur].length === 0) continue;
    let jurHighlights = '';
    for (const s of grouped[jur]) {
      if (s.Hook || s.OneLiner) {
        if (s.Hook) jurHighlights += '**' + s.Hook + '** ';
        if (s.OneLiner) jurHighlights += s.OneLiner;
        jurHighlights += '\n\n';
      }
    }
    if (jurHighlights) {
      highlights += '## ' + (JURIS_SHORT[jur] || jur) + '\n\n' + jurHighlights;
    }
  }
  for (const jur of Object.keys(grouped).sort()) {
    if (JURIS_ORDER.includes(jur)) continue;
    let jurHighlights = '';
    for (const s of grouped[jur]) {
      if (s.Hook || s.OneLiner) {
        if (s.Hook) jurHighlights += '**' + s.Hook + '** ';
        if (s.OneLiner) jurHighlights += s.OneLiner;
        jurHighlights += '\n\n';
      }
    }
    if (jurHighlights) {
      highlights += '## ' + (JURIS_SHORT[jur] || jur) + '\n\n' + jurHighlights;
    }
  }
  if (highlights) {
    md += '# Highlights\n\n' + highlights + '---\n\n';
  }
  
  // === MAIN CONTENT (without Hook + One Liner) ===
  for (const jur of JURIS_ORDER) {
    if (!grouped[jur] || grouped[jur].length === 0) continue;
    md += '# ' + (JURIS_SHORT[jur] || jur) + '\n\n';
    for (const s of grouped[jur]) {
      const body = buildMdBody(s);
      if (body) md += body + '\n\n';
      md += '---\n\n';
    }
    delete grouped[jur];
  }
  for (const jur of Object.keys(grouped).sort()) {
    md += '# ' + (JURIS_SHORT[jur] || jur) + '\n\n';
    for (const s of grouped[jur]) {
      const body = buildMdBody(s);
      if (body) md += body + '\n\n';
      md += '---\n\n';
    }
  }
  
  // Events
  if (rightEvents.length > 0) {
    md += '# Events\n\n';
    for (const id of rightEvents) {
      const ev = EVENTS_BY_ID.get(id);
      if (!ev) continue;
      if (ev.Event_Description) md += ev.Event_Description + '\n\n';
      md += '---\n\n';
    }
  }
  
  // Jobs
  if (rightJobs.length > 0) {
    md += '# Jobs\n\n';
    for (const id of rightJobs) {
      const jb = JOBS_BY_ID.get(id);
      if (!jb) continue;
      if (jb.Job_Description) md += jb.Job_Description + '\n\n';
      md += '---\n\n';
    }
  }
  
  const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
  saveAs(blob, 'selected_stories.md');
}

/* ====== Init ====== */
render();
</script>
