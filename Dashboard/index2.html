e":"2026-05-29","Title":"Work to deliver safer rentals continues","URL":"https://www.premier.tas.gov.au/latest-news/2026/may/work-to-deliver-safer-rentals-safer-continues","Story_Type":"Legislative and Statutory Developments","Jurisdiction":"Tasmania","ESG_Relevance":"Medium","Out1":"Tasmania advances safer rental reforms via amendments to the Residential Tenancy Act to manage tenant furniture safety risks.","Out2":"The Bill passed the House of Assembly, easing tenant ability to affix non-permanently damaging furniture without owner consent; permanent-damage cases require consent response within 14 days and commissioner review if refused.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Safer rentals rules","OneLiner":"Tenants may affix non-damaging furniture without consent; owners respond within 14 days as bill advances."},{"id":417,"Date":"2026-05-29","Title":"Delivering high-quality ADHD care through general practice","URL":"https://www.premier.tas.gov.au/latest-news/2026/may/delivering-high-quality-adhd-care-through-general-practice","Story_Type":"State and Local Government Programs","Jurisdiction":"Tasmania","ESG_Relevance":"Low","Out1":"Tasmania trains GPs to expand scope for ADHD assessment, diagnosis and initiating medication to improve timely access.","Out2":"GP training begins statewide to enable prescribing Schedule 8 ADHD medications after assessment and diagnosis, supported by stakeholders and an online module to reach more GPs.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"GP ADHD access","OneLiner":"Training starts 29 May, enabling GPs to apply for Schedule 8 ADHD prescribing next month."},{"id":418,"Date":"2026-05-29","Title":"Progressing our commitment to expand the Launceston General Hospital ED","URL":"https://www.premier.tas.gov.au/latest-news/2026/may/progressing-our-commitment-to-expand-the-launceston-general-hospital-ed","Story_Type":"Infrastructure, Project Approvals, and EPBC Developments","Jurisdiction":"Tasmania","ESG_Relevance":"Low","Out1":"Tasmania advances a $53.5 million Launceston General Hospital emergency department expansion, progressing concept design and development approval steps.","Out2":"The project will nearly double ED size with new entrance, reception, triage, administration, larger waiting areas and improved patient flow, supported by engagement with clinical and consumer representatives.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"ED expansion unlocks capacity","OneLiner":"Tasmania releases concept design for a $53.5m Launceston General Hospital upgrade, near-doubling ED size for 2028-2029 construction."},{"id":419,"Date":"2026-05-28","Title":"Tasmanians to pay the price for Labor’s red tape","URL":"https://www.premier.tas.gov.au/latest-news/2026/may/tasmanians-to-pay-the-price-for-labors-red-tape","Story_Type":"Parliamentary and Political Proceedings","Jurisdiction":"Tasmania","ESG_Relevance":"Low","Out1":"Tasmania’s Building Amendment Bill 2026 grants builders and home buyers a 12-month reprieve from National Construction Code red tape.","Out2":"The Parliament passed a temporary National Construction Code freeze extension, amid claims that ongoing Code changes raise housing costs; Minister Guy Barnett criticises Labor for blocking a full freeze.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Red-tape pause","OneLiner":"Bill 2026 grants 12-month NCC reprieve, but next-year changes may raise home costs."},{"id":420,"Date":"2026-05-28","Title":"Strengthening our responses to family violence","URL":"https://www.premier.tas.gov.au/latest-news/2026/may/strengthening-our-responses-to-family-violence","Story_Type":"Legislative and Statutory Developments","Jurisdiction":"Tasmania","ESG_Relevance":"Medium","Out1":"Tasmania advances family violence reforms, strengthening coercive control offences, reporting protections, and criminal justice responses.","Out2":"The government released consultation on Family Violence Act changes and will modernise economic and emotional abuse, extend limitation and reporting protections, improve rental protections, offender levy funding support, and refine offences including strangulation.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Family violence reform wave","OneLiner":"Tasmania opens draft bill talks late July on offence modernisation, a two-year limit, and an offender levy."},{"id":421,"Date":"2026-05-29","Title":"Funding: Calls for projects and proposals","URL":"https://circulareconomy.europa.eu/platform/en/news-and-events/all-news/funding-calls-projects-and-proposals","Story_Type":"Funding and Grant Announcements","Jurisdiction":"International","ESG_Relevance":"High","Out1":"Belgium explores an IPCEI for circular advanced materials while EU and research programmes back circular biobased and raw-material projects.","Out2":"Flanders and Wallonia companies are sought for circular and advanced materials partnerships; NWO–FAPESP fund research on fossil substitutes; EIT RIS supports raw-material value-chain circularity; Circular Bio-based Europe allocates €170.7m across 13 topics.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Circular funding sprint","OneLiner":"€170.7m call and Belgium/NWO/FAPESP deadlines spur materials and biorefineries submissions by June–September 2026."},{"id":422,"Date":"2026-05-29","Title":"Do you know about the revised Waste Shipment Regulation?","URL":"https://circulareconomy.europa.eu/platform/en/news-and-events/all-news/do-you-know-about-revised-waste-shipment-regulation","Story_Type":"Infrastructure, Project Approvals, and EPBC Developments","Jurisdiction":"International","ESG_Relevance":"High","Out1":"EU waste shipment rules take effect, strengthening transparency and enforcement while enabling efficient intra-EU recycling logistics.","Out2":"Revised Waste Shipment Regulation became effective 21 May, launching DIWASS to track all waste shipments digitally, reducing red tape and improving enforcement; paper remains until 31 Dec 2026 and stricter plastic export controls apply, including a ban to non-OECD from 21 Nov 2026.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"DIWASS reshapes compliance","OneLiner":"Revised EU waste rules and DIWASS go live 21 May; businesses get automated reporting, while paper ends 31 Dec 2026."},{"id":423,"Date":"2026-05-29","Title":"Business statement calling for coordinated policy action to enable a more circular fashion industry","URL":"https://circulareconomy.europa.eu/platform/en/news-and-events/all-news/business-statement-calling-coordinated-policy-action-enable-more-circular-fashion-industry-0","Story_Type":"Legislative and Statutory Developments","Jurisdiction":"International","ESG_Relevance":"High","Out1":"Ellen MacArthur Foundation urges coordinated policy to scale fashion resale and repair through targeted fiscal and EPR incentives.","Out2":"Report and business statement call for VAT or sales-tax reductions on secondhand goods and repair, lower labour taxes for related jobs, and Extended Producer Responsibility to shift economics toward resource-sparing, lower-emissions, job-creating models.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Policy levers coalition","OneLiner":"Statement urges VAT cuts, labour-tax relief and EPR to lift resale to 55% and repair 41%."},{"id":424,"Date":"2026-05-27","Title":"RTSI 2026: call for contributions!","URL":"https://circulareconomy.europa.eu/platform/en/news-and-events/all-news/rtsi-2026-call-contributions","Story_Type":"Consultation and Policy Design Opportunities","Jurisdiction":"International","ESG_Relevance":"Medium","Out1":"RTSI 2026 invites academia and industry contributions on AI-powered innovations for circular economy and sustainable recycling, including robotics and analytics.","Out2":"Special session will examine AI, robotics and data-driven technologies for efficient waste management, material recovery and circular economy solutions at Aalto University, Espoo.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"RTSI 2026 submissions","OneLiner":"Special session invites academia and industry papers on circular recycling; submission deadline is 5 June."},{"id":425,"Date":"2026-05-28","Title":"Submission on National Guideline for Lithium-ion Battery Waste Management","URL":"https://alga.com.au/submission-on-national-guideline-for-lithium-ion-battery-waste-management/","Story_Type":"Consultation and Policy Design Opportunities","Jurisdiction":"Australian National Scope","ESG_Relevance":"High","Out1":"ALGA urges HEPA to strengthen Australia’s national guideline for lithium-ion battery waste management with stewardship, safe design, and funding.","Out2":"Councils have firsthand experience with unsafe lithium-ion disposal risks, and ALGA says any guideline must include product stewardship, safe design obligations, and implementation support for collectors to avoid shifting burdens onto councils.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Burden shifts back?","OneLiner":"ALGA urges HEPA to pair the plan with product stewardship and funding for councils."},{"id":426,"Date":"2026-05-26","Title":"President’s Update – May 2026","URL":"https://alga.com.au/presidents-update-may-2026/","Story_Type":"Infrastructure, Project Approvals, and EPBC Developments","Jurisdiction":"Australian National Scope","ESG_Relevance":"Low","Out1":"ALGA says the Federal Budget’s $2 billion enabling infrastructure commitment validates councils’ advocacy linking housing growth to essential services.","Out2":"ALGA attributes the outcome to united local government engagement with Canberra, highlighting infrastructure needs for roads, water, sewerage, power and community facilities, and urges practical program design and sustained financial sustainability advocacy amid rising costs.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Infrastructure push for housing","OneLiner":"ALGA credits a $2 billion enabling infrastructure commitment as councils press Canberra to align program design and delivery."},{"id":427,"Date":"2026-05-28","Title":" a.org/news/impacts-of-middle-east-conflict-set-to-reshape-energy-investment-plans-as-disruptions-put-focus-on-security","Story_Type":"Reports, Data Releases, and Analytical Insights","Jurisdiction":"International","ESG_Relevance":"Medium","Out1":"Middle East disruptions to Strait of Hormuz are reshaping energy investment priorities toward security, diversification and more resilient supply routes.","Out2":"IEA’s World Energy Investment 2026 links the crisis to changing risk perceptions, higher financing costs and slower decisions, projecting $3.4tn global investment in 2026 and shifting funding to grids, storage, low-emissions fuels, LNG and efficiency.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Strait of Hormuz shock","OneLiner":"IEA flags $3.4tn investment in 2026 as security fears reroute capital and raise financing costs."}];

  "Reports, Data Releases, and Analytical Insights": "#B3E5FC",
  "State and Local Government Programs": "#F8BBD0",
};
function typeColor(st) { return TYPE_COLORS[st] || "#E0E0E0"; }
function darkenColor(hex, factor) {
  const f = factor || 0.65;
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return '#' + [Math.round(r*f),Math.round(g*f),Math.round(b*f)].map(c => c.toString(16).padStart(2,'0')).join('');
}

/* ====== Ordering ====== */
const JURIS_ORDER = [
  "Australian National Scope","Australian Capital Territory","NSW","Northern Territory",
  "Queensland","South Australia","Tasmania","Victoria","Western Australia","International"
];
const JURIS_SHORT = {
  "Australian National Scope": "Australian National",
  "Australian Capital Territory": "ACT",
  "Northern Territory": "NT",
  "South Australia": "SA",
  "Tasmania": "TAS",
  "Victoria": "VIC",
  "Western Australia": "WA",
};
const TYPE_ORDER = [
  "Legislative and Statutory Developments","Parliamentary and Political Proceedings",
  "Compliance, Oversight, and Enforcement Actions","Consultation and Policy Design Opportunities",
  "Funding and Grant Announcements","Corporate and Institutional ESG Actions",
  "State and Local Government Programs","Infrastructure, Project Approvals, and EPBC Developments",
  "Reports, Data Releases, and Analytical Insights","Ministerial, Diplomatic, and International Engagements",
  "Environmental Protection, Biodiversity, and Nature Policy",
  "Community, First Nations, and Social Licence Initiatives","Misc",
];
const TYPE_RANK = {}; TYPE_ORDER.forEach((t,i) => TYPE_RANK[t] = i);
const REL_PRIORITY = { High: 0, Medium: 1, Low: 2 };

/* ====== State ====== */
let leftStories = [];   // IDs in left panel
let rightStories = [];  // IDs in right panel (selected)
let leftEvents = [];
let rightEvents = [];
let leftJobs = [];
let rightJobs = [];
let selectedEl = null;
let draggedEl = null;
let draggedData = null;

function initData() {
  // Sort stories by jurisdiction > type > relevance
  const grouped = {};
  for (const s of RAW_DATA) {
    const j = s.Jurisdiction || "Other";
    const st = s.Story_Type || "Other";
    if (!grouped[j]) grouped[j] = {};
    if (!grouped[j][st]) grouped[j][st] = [];
    grouped[j][st].push(s);
  }
  for (const j of Object.keys(grouped)) {
    for (const st of Object.keys(grouped[j])) {
      grouped[j][st].sort((a,b) => (REL_PRIORITY[a.ESG_Relevance]??3) - (REL_PRIORITY[b.ESG_Relevance]??3));
    }
  }
  leftStories = [];
  for (const jur of JURIS_ORDER) {
    if (!grouped[jur]) continue;
    const types = Object.keys(grouped[jur]).sort((a,b) => (TYPE_RANK[a]??999) - (TYPE_RANK[b]??999));
    for (const st of types) {
      for (const s of grouped[jur][st]) leftStories.push(s.id);
    }
    delete grouped[jur];
  }
  for (const jur of Object.keys(grouped).sort()) {
    const types = Object.keys(grouped[jur]).sort((a,b) => (TYPE_RANK[a]??999) - (TYPE_RANK[b]??999));
    for (const st of types) {
      for (const s of grouped[jur][st]) leftStories.push(s.id);
    }
  }
  leftEvents = EVENTS_DATA.map(e => e.id);
  leftJobs = JOBS_DATA.map(j => j.id);
  rightStories = [];
  rightEvents = [];
  rightJobs = [];
}
initData();

/* ====== Helpers ====== */
function esc(s) {
  return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}
function hasLeadingBullet(line) { return /^\s*[\u2022*\-\u2013\u2014]/.test(line || ""); }
function stripBullet(line) { return String(line || "").replace(/^\s*[\u2022*\-\u2013\u2014]\s*/, "").trim(); }
function pHtml(text) { return '<p>' + esc(text) + '</p>'; }
function bulletHtml(text) { return '<p class="bullet"><span>&bull;</span><span>' + esc(text) + '</span></p>'; }
function narrativeHtml(parts) { return '<p>' + parts.filter(Boolean).join(' ') + '</p>'; }

function buildCardBody(s) {
  const outputs = [s.Out1, s.Out2, s.Out3, s.Out4, s.Out5, s.Out6]
    .map(value => String(value || "").trim())
    .filter(Boolean);
  const hook = (s.Hook || "").trim();
  const oneLiner = (s.OneLiner || "").trim();
  if (![...outputs, hook, oneLiner].some(Boolean)) return "";
  let h = "";
  if (outputs.length) {
    const narrative = outputs.map((text, index) => {
      if (outputs.length === 1 && s.URL) return esc(text);
      if (index === 0) return '<strong>' + esc(text) + '</strong>';
      return esc(text);
    });
    if (s.URL) narrative.push('<a href="' + esc(s.URL) + '" target="_blank">Read more</a>');
    h = narrativeHtml(narrative);
  }
  if (hook || oneLiner) {
    const hookPart = hook ? '<strong>' + esc(hook) + '</strong>' : '';
    const oneLinerPart = oneLiner ? esc(oneLiner) : '';
    h += '<p>' + [hookPart, oneLinerPart].filter(Boolean).join(' ') + '</p>';
  }
  return h;
}

function renderStoryCard(s, panel) {
  const bg = typeColor(s.Story_Type);
  const pillBg = darkenColor(bg, 0.65);
  const relClass = s.ESG_Relevance === 'High' ? 'rel-high' : s.ESG_Relevance === 'Medium' ? 'rel-medium' : 'rel-low';
  return '<div class="card" draggable="true" data-type="story" data-id="' + s.id + '" data-panel="' + panel + '" style="background:' + bg + ';">' +
    '<div class="card-header">' +
    '<span class="story-type-pill" style="background:' + pillBg + ';color:#fff;">' + esc(s.Story_Type) + '</span>' +
    '<span class="relevance-badge ' + relClass + '">' + esc(s.ESG_Relevance) + '</span>' +
    '</div>' +
    '<div class="card-title">' + esc(s.Title) + '</div>' +
    '<div class="card-body">' + buildCardBody(s) + '</div>' +
    '</div>';
}

function renderAuxCard(item, type, panel) {
  const descKey = type === 'event' ? 'Event_Description' : 'Job_Description';
  return '<div class="aux-card" draggable="true" data-type="' + type + '" data-id="' + item.id + '" data-panel="' + panel + '">' +
    '<div class="aux-date">' + esc(item.Date) + '</div>' +
    '<div class="aux-title">' + esc(item.Title) + '</div>' +
    '<div class="aux-url"><a href="' + esc(item.URL) + '" target="_blank">' + esc(item.URL) + '</a></div>' +
    '<div class="aux-desc">' + esc(item[descKey] || '') + '</div>' +
    '</div>';
}

function renderLeftPanel() {
  const root = document.getElementById('leftPanel');
  let html = '';
  
  // Stories grouped by jurisdiction
  const grouped = {};
  for (const id of leftStories) {
    const s = STORY_BY_ID.get(id);
    if (!s) continue;
    const j = s.Jurisdiction || "Other";
    if (!grouped[j]) grouped[j] = [];
    grouped[j].push(s);
  }
  
  for (const jur of JURIS_ORDER) {
    if (!grouped[jur] || grouped[jur].length === 0) continue;
    html += '<h2 class="section-header">' + esc(jur) + ' <span class="section-count">(' + grouped[jur].length + ')</span></h2>';
    for (const s of grouped[jur]) {
      html += renderStoryCard(s, 'left');
    }
    delete grouped[jur];
  }
  for (const jur of Object.keys(grouped).sort()) {
    html += '<h2 class="section-header">' + esc(jur) + ' <span class="section-count">(' + grouped[jur].length + ')</span></h2>';
    for (const s of grouped[jur]) {
      html += renderStoryCard(s, 'left');
    }
  }
  
  // Events
  if (leftEvents.length > 0) {
    html += '<h2 class="section-header">Events <span class="section-count">(' + leftEvents.length + ')</span></h2>';
    for (const id of leftEvents) {
      const e = EVENTS_BY_ID.get(id);
      if (e) html += renderAuxCard(e, 'event', 'left');
    }
  }
  
  // Jobs
  if (leftJobs.length > 0) {
    html += '<h2 class="section-header">Jobs <span class="section-count">(' + leftJobs.length + ')</span></h2>';
    for (const id of leftJobs) {
      const j = JOBS_BY_ID.get(id);
      if (j) html += renderAuxCard(j, 'job', 'left');
    }
  }
  
  if (!html) html = '<div class="empty-state">All items have been selected</div>';
  root.innerHTML = html;
  document.getElementById('leftCount').textContent = (leftStories.length + leftEvents.length + leftJobs.length) + ' items';
}

function renderRightPanel() {
  const root = document.getElementById('rightPanel');
  const total = rightStories.length + rightEvents.length + rightJobs.length;
  
  let html = '';
  if (total === 0) {
    html = '<div class="drop-zone" id="dropZone">Drag items here to include</div>';
  } else {
    // Stories grouped by jurisdiction
    const grouped = {};
    for (const id of rightStories) {
      const s = STORY_BY_ID.get(id);
      if (!s) continue;
      const j = s.Jurisdiction || "Other";
      if (!grouped[j]) grouped[j] = [];
      grouped[j].push(s);
    }
    
    let hasStories = false;
    for (const jur of JURIS_ORDER) {
      if (!grouped[jur] || grouped[jur].length === 0) continue;
      hasStories = true;
      html += '<h2 class="section-header">' + esc(jur) + ' <span class="section-count">(' + grouped[jur].length + ')</span></h2>';
      for (const s of grouped[jur]) {
        html += renderStoryCard(s, 'right');
      }
      delete grouped[jur];
    }
    for (const jur of Object.keys(grouped).sort()) {
      hasStories = true;
      html += '<h2 class="section-header">' + esc(jur) + ' <span class="section-count">(' + grouped[jur].length + ')</span></h2>';
      for (const s of grouped[jur]) {
        html += renderStoryCard(s, 'right');
      }
    }
    
    if (rightEvents.length > 0) {
      html += '<h2 class="section-header">Events <span class="section-count">(' + rightEvents.length + ')</span></h2>';
      for (const id of rightEvents) {
        const e = EVENTS_BY_ID.get(id);
        if (e) html += renderAuxCard(e, 'event', 'right');
      }
    }
    
    if (rightJobs.length > 0) {
      html += '<h2 class="section-header">Jobs <span class="section-count">(' + rightJobs.length + ')</span></h2>';
      for (const id of rightJobs) {
        const j = JOBS_BY_ID.get(id);
        if (j) html += renderAuxCard(j, 'job', 'right');
      }
    }
  }
  
  root.innerHTML = html;
  let countText = total + ' items';
  if (total > 0) {
    const parts = [];
    if (rightStories.length > 0) parts.push('Stories: ' + rightStories.length);
    if (rightEvents.length > 0) parts.push('Events: ' + rightEvents.length);
    if (rightJobs.length > 0) parts.push('Jobs: ' + rightJobs.length);
    countText += ' (' + parts.join(', ') + ')';
  }
  document.getElementById('rightCount').textContent = countText;
  document.getElementById('genBtn').disabled = total === 0;
  document.getElementById('clearBtn').disabled = total === 0;
}

function render() {
  renderLeftPanel();
  renderRightPanel();
}

function clearAll() {
  leftStories = leftStories.concat(rightStories);
  leftEvents = leftEvents.concat(rightEvents);
  leftJobs = leftJobs.concat(rightJobs);
  rightStories = [];
  rightEvents = [];
  rightJobs = [];
  render();
}

/* ====== Selection ====== */
function selectCard(el) {
  if (selectedEl) selectedEl.classList.remove('selected');
  selectedEl = el;
  if (el) el.classList.add('selected');
}

document.addEventListener('click', (e) => {
  const card = e.target.closest('.card, .aux-card');
  if (card) {
    selectCard(card);
    e.stopPropagation();
  } else if (!e.target.closest('.ctx-menu')) {
    selectCard(null);
  }
});

/* ====== Drag and Drop ====== */
document.addEventListener('dragstart', (e) => {
  const card = e.target.closest('.card, .aux-card');
  if (!card) return;
  draggedEl = card;
  draggedData = {
    type: card.dataset.type,
    id: parseInt(card.dataset.id),
    panel: card.dataset.panel
  };
  card.classList.add('dragging');
  selectCard(card);
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', JSON.stringify(draggedData));
});

document.addEventListener('dragend', (e) => {
  if (draggedEl) draggedEl.classList.remove('dragging');
  draggedEl = null;
  draggedData = null;
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
  document.querySelectorAll('.drag-active').forEach(el => el.classList.remove('drag-active'));
});

document.addEventListener('dragover', (e) => {
  e.preventDefault();
  const rightPanel = document.getElementById('rightPanel');
  const dropZone = document.getElementById('dropZone');
  
  if (rightPanel.contains(e.target)) {
    e.dataTransfer.dropEffect = 'move';
    if (dropZone) dropZone.classList.add('drag-active');
    
    // Reorder within right panel
    const card = e.target.closest('.card, .aux-card');
    if (card && draggedEl && card !== draggedEl && card.dataset.panel === 'right') {
      document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
      card.classList.add('drag-over');
    }
  } else {
    if (dropZone) dropZone.classList.remove('drag-active');
  }
});

document.addEventListener('dragleave', (e) => {
  const dropZone = document.getElementById('dropZone');
  if (dropZone && !document.getElementById('rightPanel').contains(e.relatedTarget)) {
    dropZone.classList.remove('drag-active');
  }
});

document.addEventListener('drop', (e) => {
  e.preventDefault();
  const rightPanel = document.getElementById('rightPanel');
  const dropZone = document.getElementById('dropZone');
  if (dropZone) dropZone.classList.remove('drag-active');
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
  
  if (!draggedData) return;
  
  // Dropping on right panel = include
  if (rightPanel.contains(e.target)) {
    if (draggedData.panel === 'left') {
      moveToRight(draggedData.type, draggedData.id);
    } else {
      // Reorder within right
      const targetCard = e.target.closest('.card, .aux-card');
      if (targetCard && targetCard !== draggedEl) {
        reorderInRight(draggedData.type, draggedData.id, parseInt(targetCard.dataset.id), targetCard.dataset.type);
      }
    }
  }
  // Dropping on left panel = exclude
  else if (document.getElementById('leftPanel').contains(e.target)) {
    if (draggedData.panel === 'right') {
      moveToLeft(draggedData.type, draggedData.id);
    }
  }
});

/* ====== Move Functions ====== */
function moveToRight(type, id) {
  if (type === 'story') {
    const idx = leftStories.indexOf(id);
    if (idx > -1) { leftStories.splice(idx, 1); rightStories.push(id); }
  } else if (type === 'event') {
    const idx = leftEvents.indexOf(id);
    if (idx > -1) { leftEvents.splice(idx, 1); rightEvents.push(id); }
  } else if (type === 'job') {
    const idx = leftJobs.indexOf(id);
    if (idx > -1) { leftJobs.splice(idx, 1); rightJobs.push(id); }
  }
  render();
}

function moveToLeft(type, id) {
  if (type === 'story') {
    const idx = rightStories.indexOf(id);
    if (idx > -1) { rightStories.splice(idx, 1); leftStories.push(id); }
  } else if (type === 'event') {
    const idx = rightEvents.indexOf(id);
    if (idx > -1) { rightEvents.splice(idx, 1); leftEvents.push(id); }
  } else if (type === 'job') {
    const idx = rightJobs.indexOf(id);
    if (idx > -1) { rightJobs.splice(idx, 1); leftJobs.push(id); }
  }
  render();
}

function reorderInRight(type, id, targetId, targetType) {
  let arr;
  if (type === 'story') arr = rightStories;
  else if (type === 'event') arr = rightEvents;
  else arr = rightJobs;
  
  const fromIdx = arr.indexOf(id);
  if (fromIdx === -1) return;
  
  // For same type, move to target position
  if (type === targetType) {
    const toIdx = arr.indexOf(targetId);
    if (toIdx === -1) return;
    arr.splice(fromIdx, 1);
    arr.splice(toIdx, 0, id);
    render();
  }
}

function moveUp(type, id) {
  let arr;
  if (type === 'story') arr = rightStories;
  else if (type === 'event') arr = rightEvents;
  else arr = rightJobs;
  
  const idx = arr.indexOf(id);
  if (idx > 0) {
    [arr[idx], arr[idx-1]] = [arr[idx-1], arr[idx]];
    render();
    setTimeout(() => {
      const el = document.querySelector('[data-panel="right"][data-type="' + type + '"][data-id="' + id + '"]');
      if (el) selectCard(el);
    }, 10);
  }
}

function moveDown(type, id) {
  let arr;
  if (type === 'story') arr = rightStories;
  else if (type === 'event') arr = rightEvents;
  else arr = rightJobs;
  
  const idx = arr.indexOf(id);
  if (idx < arr.length - 1 && idx > -1) {
    [arr[idx], arr[idx+1]] = [arr[idx+1], arr[idx]];
    render();
    setTimeout(() => {
      const el = document.querySelector('[data-panel="right"][data-type="' + type + '"][data-id="' + id + '"]');
      if (el) selectCard(el);
    }, 10);
  }
}

/* ====== Context Menu ====== */
const ctxMenu = document.getElementById('ctxMenu');
let ctxData = null;

document.addEventListener('contextmenu', (e) => {
  const card = e.target.closest('.card, .aux-card');
  if (!card) { ctxMenu.style.display = 'none'; return; }
  
  e.preventDefault();
  selectCard(card);
  
  ctxData = {
    type: card.dataset.type,
    id: parseInt(card.dataset.id),
    panel: card.dataset.panel
  };
  
  // Show/hide relevant options
  const isLeft = ctxData.panel === 'left';
  document.getElementById('ctxInclude').style.display = isLeft ? 'block' : 'none';
  document.getElementById('ctxExclude').style.display = isLeft ? 'none' : 'block';
  document.getElementById('ctxMoveUp').style.display = isLeft ? 'none' : 'block';
  document.getElementById('ctxMoveDown').style.display = isLeft ? 'none' : 'block';
  
  ctxMenu.style.left = e.clientX + 'px';
  ctxMenu.style.top = e.clientY + 'px';
  ctxMenu.style.display = 'block';
});

document.addEventListener('click', () => { ctxMenu.style.display = 'none'; });

document.getElementById('ctxInclude').addEventListener('click', () => {
  if (ctxData) moveToRight(ctxData.type, ctxData.id);
  ctxMenu.style.display = 'none';
});

document.getElementById('ctxExclude').addEventListener('click', () => {
  if (ctxData) moveToLeft(ctxData.type, ctxData.id);
  ctxMenu.style.display = 'none';
});

document.getElementById('ctxMoveUp').addEventListener('click', () => {
  if (ctxData) moveUp(ctxData.type, ctxData.id);
  ctxMenu.style.display = 'none';
});

document.getElementById('ctxMoveDown').addEventListener('click', () => {
  if (ctxData) moveDown(ctxData.type, ctxData.id);
  ctxMenu.style.display = 'none';
});

/* ====== Keyboard Navigation ====== */
document.addEventListener('keydown', (e) => {
  if (!selectedEl) return;
  
  const type = selectedEl.dataset.type;
  const id = parseInt(selectedEl.dataset.id);
  const panel = selectedEl.dataset.panel;
  
  switch (e.key) {
    case 'ArrowRight':
      if (panel === 'left') {
        moveToRight(type, id);
        setTimeout(() => {
          const el = document.querySelector('[data-panel="right"][data-type="' + type + '"][data-id="' + id + '"]');
          if (el) selectCard(el);
        }, 10);
      }
      e.preventDefault();
      break;
    case 'ArrowLeft':
      if (panel === 'right') {
        moveToLeft(type, id);
        setTimeout(() => {
          const el = document.querySelector('[data-panel="left"][data-type="' + type + '"][data-id="' + id + '"]');
          if (el) selectCard(el);
        }, 10);
      }
      e.preventDefault();
      break;
    case 'ArrowUp':
      if (panel === 'right') {
        moveUp(type, id);
        e.preventDefault();
      }
      break;
    case 'ArrowDown':
      if (panel === 'right') {
        moveDown(type, id);
        e.preventDefault();
      }
      break;
  }
});

/* ====== Markdown Generation ====== */
function buildMdBody(s) {
  const outputs = [s.Out1, s.Out2, s.Out3, s.Out4, s.Out5, s.Out6]
    .map(value => String(value || '').trim())
    .filter(Boolean);
  if (!outputs.length) return '';
  const body = outputs.map((text, index) => {
    if (outputs.length === 1 && s.URL) return text;
    if (index === 0) return '**' + text + '**';
    return text;
  }).join(' ');
  return body + (s.URL ? ' [**Read more**](' + s.URL + ')' : '');
}

function generateDoc() {
  const total = rightStories.length + rightEvents.length + rightJobs.length;
  if (total === 0) { alert('No items selected for export.'); return; }
  
  let md = '';
  
  // Stories grouped by jurisdiction
  const grouped = {};
  for (const id of rightStories) {
    const s = STORY_BY_ID.get(id);
    if (!s) continue;
    const j = s.Jurisdiction || "Other";
    if (!grouped[j]) grouped[j] = [];
    grouped[j].push(s);
  }
  
  // === HIGHLIGHTS SECTION (Hook + One Liner at top) ===
  let highlights = '';
  for (const jur of JURIS_ORDER) {
    if (!grouped[jur] || grouped[jur].length === 0) continue;
    let jurHighlights = '';
    for (const s of grouped[jur]) {
      if (s.Hook || s.OneLiner) {
        if (s.Hook) jurHighlights += '**' + s.Hook + '** ';
        if (s.OneLiner) jurHighlights += s.OneLiner;
        jurHighlights += '\n\n';
      }
    }
    if (jurHighlights) {
      highlights += '## ' + (JURIS_SHORT[jur] || jur) + '\n\n' + jurHighlights;
    }
  }
  for (const jur of Object.keys(grouped).sort()) {
    if (JURIS_ORDER.includes(jur)) continue;
    let jurHighlights = '';
    for (const s of grouped[jur]) {
      if (s.Hook || s.OneLiner) {
        if (s.Hook) jurHighlights += '**' + s.Hook + '** ';
        if (s.OneLiner) jurHighlights += s.OneLiner;
        jurHighlights += '\n\n';
      }
    }
    if (jurHighlights) {
      highlights += '## ' + (JURIS_SHORT[jur] || jur) + '\n\n' + jurHighlights;
    }
  }
  if (highlights) {
    md += '# Highlights\n\n' + highlights + '---\n\n';
  }
  
  // === MAIN CONTENT (without Hook + One Liner) ===
  for (const jur of JURIS_ORDER) {
    if (!grouped[jur] || grouped[jur].length === 0) continue;
    md += '# ' + (JURIS_SHORT[jur] || jur) + '\n\n';
    for (const s of grouped[jur]) {
      const body = buildMdBody(s);
      if (body) md += body + '\n\n';
      md += '---\n\n';
    }
    delete grouped[jur];
  }
  for (const jur of Object.keys(grouped).sort()) {
    md += '# ' + (JURIS_SHORT[jur] || jur) + '\n\n';
    for (const s of grouped[jur]) {
      const body = buildMdBody(s);
      if (body) md += body + '\n\n';
      md += '---\n\n';
    }
  }
  
  // Events
  if (rightEvents.length > 0) {
    md += '# Events\n\n';
    for (const id of rightEvents) {
      const ev = EVENTS_BY_ID.get(id);
      if (!ev) continue;
      if (ev.Event_Description) md += ev.Event_Description + '\n\n';
      md += '---\n\n';
    }
  }
  
  // Jobs
  if (rightJobs.length > 0) {
    md += '# Jobs\n\n';
    for (const id of rightJobs) {
      const jb = JOBS_BY_ID.get(id);
      if (!jb) continue;
      if (jb.Job_Description) md += jb.Job_Description + '\n\n';
      md += '---\n\n';
    }
  }
  
  const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
  saveAs(blob, 'selected_stories.md');
}

/* ====== Init ====== */
render();
</script>
</body>
