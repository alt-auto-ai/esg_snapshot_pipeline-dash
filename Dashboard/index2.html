,"Title":"Sydney Metro probity investigation referred to police and integrity agencies","URL":"https://www.nsw.gov.au/ministerial-releases/sydney-metro-probity-investigation-referred-to-police-and-integrity-agencies","Story_Type":"Compliance, Oversight, and Enforcement Actions","Jurisdiction":"NSW","ESG_Relevance":"High","Out1":"Probity concerns trigger enforcement.","Out2":"Investigation findings referred to NSW Police and integrity agencies.","Out3":"The report highlights Future Form Civil Pty Ltd and downstream contractors with suspected underpayment, inadequate insurance, and tax fraud.","Out4":"A Ministerial Direction requires strict pre-settlement subcontracting compliance by Sydney Metro on the $130 billion infrastructure program.","Out5":"","Out6":"","Hook":"Probity probe widens","OneLiner":"Investigation flags underpayment and fraud; agencies to compel witnesses as Minister orders strict subcontracting rules."},{"id":163,"Date":"2026-05-08","Title":"NSW Government initiates emergency response to address homelessness in Wagga Wagga","URL":"https://www.nsw.gov.au/ministerial-releases/emergency-homelessness-response-wagga-wagga","Story_Type":"State and Local Government Programs","Jurisdiction":"NSW","ESG_Relevance":"Medium","Out1":"Emergency homelessness response in Wagga.","Out2":"The NSW Government announced an emergency cross-agency working group to support rough sleepers in Wagga Wagga.","Out3":"Homes NSW, local providers, NSW Police, and City of Wagga Wagga will collaborate to move rough sleepers into safer, more permanent housing.","Out4":"This responds to homelessness as a local planning and community safety priority, aligning cross-agency and service delivery to improve housing access and wellbeing.","Out5":"","Out6":"","Hook":"Emergency housing push","OneLiner":"NSW forms cross-agency group to place rough sleepers into stable housing in Wagga Wagga."},{"id":164,"Date":"2026-05-08","Title":"$1.2 million grant program to support community-led resilience projects","URL":"https://www.nsw.gov.au/ministerial-releases/12-million-grant-program-to-support-community-led-resilience-projects","Story_Type":"Funding and Grant Announcements","Jurisdiction":"NSW","ESG_Relevance":"Medium","Out1":"NSW COMPACT grants open.","Out2":"The NSW Minister for Multiculturalism announced funding via the COMPACT program to support whole-of-community resilience projects.","Out3":"The program will deliver 1.2 million to community-led partnerships, with grants of 50,000 to 100,000 per year for up to two years, for not-for-profit organisations in NSW.","Out4":"The funding aims to strengthen social cohesion, youth leadership, and resilience by supporting cross-sector collaborations in communities across NSW.","Out5":"","Out6":"","Hook":"Public funding for resilience?","OneLiner":"NSW invites not-for-profits to apply for up to $100k annually for two years via COMPACT."},{"id":165,"Date":"2026-05-08","Title":"New recruitment rules in place for early learning providers offer better protection for children thanks to new laws","URL":"https://www.nsw.gov.au/ministerial-releases/new-recruitment-rulesl-early-learning","Story_Type":"Legislative and Statutory Developments","Jurisdiction":"NSW","ESG_Relevance":"Medium","Out1":"Child Safety Recruitment Reforms.","Out2":"New mandatory screening, suitability checks, and whistleblower policies are now in force for NSW early learning services.","Out3":"Approved providers must conduct rigorous pre-employment screening and verify staff suitability to work with children, with penalties for false information and new whistleblower protections and training.","Out4":"The reforms bolster governance and accountability in NSW early learning services, enhancing safety standards and regulatory oversight. They are likely to improve public trust and reduce compliance risk for providers.","Out5":"","Out6":"","Hook":"NSW recruits overhauled","OneLiner":"NSW imposes screening for early learning staff; appoints permanent Early Learning Commissioner to enforce oversight."},{"id":166,"Date":"2026-05-08","Title":"A better run home: M5 West upgrade begins","URL":"https://www.nsw.gov.au/ministerial-releases/m5-west-upgrade-begins","Story_Type":"Infrastructure, Project Approvals, and EPBC Developments","Jurisdiction":"NSW","ESG_Relevance":"Medium","Out1":"The NSW Government has begun the $380 million M5 Westbound upgrade between Moorebank Avenue and the Hume Highway, including a new 300m long three‑lane bridge over the Georges River.","Out2":"The project will provide extra lanes that will remove the need for around 2,600 vehicles per day to weave between lanes at the entry and exit points of the Hume Highway and Moorebank Avenue.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"M5 upgrade underway","OneLiner":"Joint $190m funds safer westbound route, easing congestion for Western Sydney motorists; completes 2029."},{"id":167,"Date":"2026-05-08","Title":"Two new services transforming mental healthcare in Kempsey","URL":"https://www.nsw.gov.au/ministerial-releases/transforming-mental-healthcare-kempsey","Story_Type":"State and Local Government Programs","Jurisdiction":"NSW","ESG_Relevance":"High","Out1":"Kempsey Mental Health Update.","Out2":"The Minns Government announced two new Kempsey mental health initiatives: a free walk-in service and an Aboriginal-led Safe Haven.","Out3":"Safe Haven on Wide Street is a free walk-in space staffed by Aboriginal peer workers; HiTH pilots hospital-level care at home, with Port Macquarie Hospital capacity increased and 6- and 12-month reviews.","Out4":"This expansion supports local access to early, community-based mental health care, reducing reliance on hospital ERs and aligning with the NSW government's broader investment in community services.","Out5":"","Out6":"","Hook":"Kempsey mental health shift","OneLiner":"Aboriginal-led Safe Haven and Hospital in the Home pilot expand access, backed by new funding."},{"id":168,"Date":"2026-05-07","Title":"Final plan for Moore Park South delivers new park and 12-hole golf course for Sydney","URL":"https://www.nsw.gov.au/ministerial-releases/final-plan-for-moore-park-south-delivers-new-park-and-12-hole-golf-course-for-sydney","Story_Type":"Infrastructure, Project Approvals, and EPBC Developments","Jurisdiction":"NSW","ESG_Relevance":"Medium","Out1":"The NSW Government has released the final plan for Moore Park South, delivering a 20-hectare park and a 12-hole public golf course at Moore Park South.","Out2":"The Minns Labor Government has funded $50 million to deliver the final plan, with access available immediately, nine holes available until the 12-hole course opens in 2027 and construction expected to be completed by 2028.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Moore Park South plan","OneLiner":"Joint plan unlocks $50m funding; construction runs 2026–28 for 20ha park and 12-hole golf."},{"id":169,"Date":"2026-05-08","Title":"Financial close milestone powers Tasmania’s energy future forward","URL":"https://www.premier.tas.gov.au/latest-news/2026/may/financial-close-milestone-powers-tasmanias-energy-future-forward","Story_Type":"Infrastructure, Project Approvals, and EPBC Developments","Jurisdiction":"Tasmania","ESG_Relevance":"High","Out1":"TasNetworks has reached financial close for the North West Transmission Developments, taking us another step closer to delivering Project Marinus and moving towards construction in Tasmania.","Out2":"Project Marinus will create more than 2,000 jobs in Tasmania and add an estimated $470 million to the State’s bottom line, with highly concessional arrangements protecting Tasmanian customer bills and shielding Major Industrial customers from the project costs.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Milestone reached","OneLiner":"TasNetworks closes funding for NW Transmission Developments, enabling Project Marinus construction in 2026."},{"id":170,"Date":"2026-05-08","Title":"New Storm Warning System delivers clearer advice for Tasmanians","URL":"https://www.premier.tas.gov.au/latest-news/2026/may/new-storm-warning-system-delivers-clearer-advice-for-tasmanians","Story_Type":"State and Local Government Programs","Jurisdiction":"Tasmania","ESG_Relevance":"Low","Out1":"Tasmanian Storm Warning System.","Out2":"Tasmanian Government announced the delivery of the new Tasmanian Storm Warning System aligned with the Australian Warning System.","Out3":"Warnings will use nationally consistent levels - Advice, Watch and Act, Emergency Warning - issued via TasALERT and shared across TasALERT website, social media, radio and other channels.","Out4":"This enhances community safety planning and emergency communication, improving resilience and consistency in local responses and informing residents to take timely actions during severe weather.","Out5":"","Out6":"","Hook":"New storm warning system","OneLiner":"Tasmania launches nationally aligned alert levels to guide action and safety."},{"id":171,"Date":"2026-05-07","Title":"Expanding vocational learning in Tasmanian schools","URL":"https://www.premier.tas.gov.au/latest-news/2026/may/expanding-vocational-learning-in-tasmanian-schools","Story_Type":"State and Local Government Programs","Jurisdiction":"Tasmania","ESG_Relevance":"Medium","Out1":"Tasmania expands vocational learning.","Out2":"Tasmanian Government announced the Youth Career Facilitator South to expand to Southern Tasmania under the Youth Jobs Strategy.","Out3":"Home Base will partner with Southern schools, students and employers to build career pathways in high demand industries, targeting a 50 per cent increase of senior secondary students undertaking VET by 2030.","Out4":"Expanding VET links will strengthen local industry connections, improve workforce readiness for southern Tasmanian communities, and contribute to a skills pipeline aligned with the state's future employment needs.","Out5":"","Out6":"","Hook":"South Tas VET push","OneLiner":"Government expands Youth Career Facilitator to south, aiming 50% of senior VET by 2030."},{"id":172,"Date":"2026-05-07","Title":"Mandatory Notifications Bill passes the House of Assembly","URL":"https://www.premier.tas.gov.au/latest-news/2026/may/mandatory-notifications-bill-passes-the-house-of-assembly","Story_Type":"Legislative and Statutory Developments","Jurisdiction":"Tasmania","ESG_Relevance":"Medium","Out1":"Mandatory Notifications Passed.","Out2":"The Integrity Commission Amendment (Mandatory Notifications) Bill 2025 has passed the Tasmanian House of Assembly.","Out3":"It requires principal officers of public authorities to notify the Integrity Commission of suspected misconduct or serious misconduct by public officers.","Out4":"It implements recommendations from the Commission of Inquiry and Cox Review, advancing governance reforms. By strengthening mandatory reporting, it supports governance, compliance and risk oversight in public authorities.","Out5":"","Out6":"","Hook":"Notification mandate passes","OneLiner":"Tasmanian parliament approves mandatory reporting by principal officers to the Integrity Commission."},{"id":173,"Date":"2026-05-07","Title":"Federal private health changes to hit older Tasmanians","URL":"https://www.premier.tas.gov.au/latest-news/2026/may/federal-private-health-changes-to-hit-older-tasmanians","Story_Type":"Legislative and Statutory Developments","Jurisdiction":"Tasmania","ESG_Relevance":"Low","Out1":"Private health rebates hit older Tasmanians.","Out2":"Tasmanian minister urges federal government to reconsider private health insurance rebate changes for older residents.","Out3":"Minister Archer warns the move could force older Tasmanians to downgrade or drop private cover, increasing demand on public hospitals and waitlists.","Out4":"It underlines a funding-shift dynamic between federal and state governments affecting public health capacity. For ESG readers, the move could strain emergency and elective services for an ageing population and raise equity concerns.","Out5":"","Out6":"","Hook":"Health rebates hit seniors","OneLiner":"Australian government rebate changes threaten higher private-system charges for Tasmanians, prompting calls for urgent reconsideration."},{"id":174,"Date":"2026-05-07","Title":"Short Stay Levy keeps more tourism dollars in Tasmania","URL":"https://www.premier.tas.gov.au/latest-news/2026/may/short-stay-levy-keeps-more-tourism-dollars-in-tasmania","Story_Type":"Legislative and Statutory Developments","Jurisdiction":"Tasmania","ESG_Relevance":"Medium","Out1":"Tasmanian short-stay levy.","Out2":"Tasmania introduces a 5% short-stay levy to keep revenue in-state and fund housing, while protecting local jobs and tourism.","Out3":"The levy targets global platforms that collect commissions, which Treasurer Eric Abetz says can reach up to 20% per stay, and aims to modestly divert funds to housing and local services.","Out4":"This reform seeks to balance tourism growth with housing affordability by retaining more tourism revenue in Tasmania and supporting workers. It signals a shift toward local-first fiscal policy and could influence investors’ views on regional resilience and governance.","Out5":"","Out6":"","Hook":"Dollars stay in Tassie","OneLiner":"Tasmanian 5% short-stay levy channels revenue to housing and services, safeguarding jobs."},{"id":175,"Date":"2026-05-06","Title":"Backing our Ambulance Tasmania clinicians","URL":"https://www.premier.tas.gov.au/latest-news/2026/may/backing-our-ambulance-tasmania-clinicians","Story_Type":"State and Local Government Programs","Jurisdiction":"Tasmania","ESG_Relevance":"Low","Out1":"Ambulance Triage Support.","Out2":"Tasmanian Government will support clinical decisions on non-emergency transports through Ambulance Tasmania's Secondary Triage service.","Out3":"When not assessing emergency need, the service considers alternative care pathways and transport options, with taxis used in under one percent of cases.","Out4":"This approach aims to preserve ambulance and emergency capacity, support patient-centred care, and improve efficiency of local health responses across Tasmania.","Out5":"","Out6":"","Hook":"Triage autonomy defended","OneLiner":"Tasmania backs clinicians’ decisions; uses non-emergency transport options when appropriate."},{"id":176,"Date":"2026-05-06","Title":"More than 300,000 healthy breakfasts served in Tasmanian schools","URL":"https://www.premier.tas.gov.au/latest-news/2026/may/more-than-300,000-healthy-breakfasts-served-in-tasmanian-schools","Story_Type":"Funding and Grant Announcements","Jurisdiction":"Tasmania","ESG_Relevance":"Low","Out1":"Breakfast funding to expand schools.","Out2":"Jo Palmer announced a $6.5 million investment to expand the School Breakfast Program to all Tasmanian Government schools by 2028.","Out3":"The program operates in 76 schools, serving up to 18,000 students, as part of the expansion effort.","Out4":"Expanding access to nutritious breakfasts is expected to improve attendance, concentration and educational outcomes, supporting student wellbeing and resilience in Tasmanian communities.","Out5":"","Out6":"","Hook":"Tasmanian meals push","OneLiner":"Public funds breakfasts for students in 76 schools, to all by 2028."},{"id":177,"Date":"2026-05-07","Title":"Fauna the focus of EPA assessment of proposed lithium expansion","URL":"https://www.epa.wa.gov.au/media-statements/fauna-focus-epa-assessment-proposed-lithium-expansion","Story_Type":"Environmental Protection, Biodiversity, and Nature Policy","Jurisdiction":"Western Australia","ESG_Relevance":"High","Out1":"EPA weighs lithium expansion.","Out2":"The EPA assessed the proposal and recommended conditions to protect malleefowl and chuditch habitats.","Out3":"It proposes pre-clearance fauna spotter inspections and exclusion zones, plus a predator-control offset program across Jilbadji Nature Reserve to mitigate feral cats and foxes.","Out4":"The decision highlights how biodiversity protection may shape expansion timelines and requires monitoring, with public appeals possible before final approval.","Out5":"","Out6":"","Hook":"Fauna under EPA review","OneLiner":"Environmental Authority recommends approval with predator-control offsets; appeals period to 28 May 2026."},{"id":178,"Date":"2026-05-07","Title":"Procurement and contract management resources at your fingertips","URL":"https://www.finance.gov.au/about-us/news/2026/procurement-and-contract-management-resources-your-fingertips","Story_Type":"Reports, Data Releases, and Analytical Insights","Jurisdiction":"Australian National Scope","ESG_Relevance":"Low","Out1":"The Australian Government Department of Finance says the Commonwealth Procurement and Contract Management Training Suite has implications for value-for-money outcomes in procurement.","Out2":"It standardises practices and builds capability across APS staff, improving consistency and early risk detection in procurement, says the Australian Government Department of Finance.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Procurement training rollout","OneLiner":"Australia unveils microlearning and a pathway to lift public-sector buying skills."},{"id":179,"Date":"2026-05-07","Title":"At Moment of Peril, Promise, Secretary-General Hails Parliamentary Assembly of the Mediterranean for Role in Advancing Peace, Sustainable Development","URL":"https://press.un.org/en/2026/sgsm23115.doc.htm","Story_Type":"Ministerial, Diplomatic, and International Engagements","Jurisdiction":"International","ESG_Relevance":"Medium","Out1":"UN Guterres in Budva.","Out2":"UN Secretary-General Guterres addressed the first Summit of Speakers and Presidents of the PAM in Budva on regional crises and climate action.","Out3":"He commended progress on peace, human rights, climate action, financial justice for developing nations, SDGs, and the Pact for the Future.","Out4":"The message reinforces multilateral engagement in a crisis-prone region, highlighting climate resilience, development financing, and adherence to global commitments, with potential implications for regional cooperation and international funding streams.","Out5":"","Out6":"","Hook":"Mediterranean reform outlook","OneLiner":"Parliamentarians to translate commitments into national action amid regional crises."},{"id":180,"Date":"2026-05-08","Title":"NSW Threatened Species Scientific Committee final determinations for May 2026 | News","URL":"https://www.environment.nsw.gov.au/news/nsw-threatened-species-scientific-committee-final-determinations-may-2026-news","Story_Type":"Environmental Protection, Biodiversity, and Nature Policy","Jurisdiction":"NSW","ESG_Relevance":"Low","Out1":"Threatened NSW plants listed.","Out2":"Nature policy development","Out3":"The species are Uromyrtus australis, Eidothea hardeniana, and Pherosphaera fitzgeraldii, all endemic to New South Wales, with determinations finalised by the Threatened Species Scientific Committee.","Out4":"The listing reinforces regulatory protections and informs land management, conservation planning, and funding priorities to safeguard these NSW-endemic habitats and associated biodiversity.","Out5":"","Out6":"","Hook":"Three plants listed","OneLiner":"NSW committee designates three species as critically endangered, elevating conservation urgency."},{"id":181,"Date":"2026-05-06","Title":"Feral animal control program targets pigs and deer in the Gwydir River Valley | Media release","URL":"https://www.environment.nsw.gov.au/news/feral-animal-control-program-targets-pigs-and-deer-gwydir-river-valley","Story_Type":"Environmental Protection, Biodiversity, and Nature Policy","Jurisdiction":"NSW","ESG_Relevance":"High","Out1":"Feral control in Gwydir Valley.","Out2":"Aerial shooting program targeting feral pigs and deer will operate across public and private land in the Gwydir River Valley.","Out3":"The operation runs May 11–15, covers Gwydir River National Park and surrounding areas east of Bingara, and is supported by $130,150 from the Good Neighbours Program.","Out4":"The effort aims to reduce invasive species numbers at scale to protect native habitats, water quality, biodiversity and agricultural productivity, while easing landholder management costs.","Out5":"","Out6":"","Hook":"Feral control push","OneLiner":"Aerial removal of pigs and deer May 11–15 Gwydir Valley to protect ecosystems and farms."},{"id":182,"Date":"2026-05-05","Title":"Applications open in a rare chance to reactivate Hill End’s historic heart | Media release","URL":"https://www.environment.nsw.gov.au/news/applications-open-reactivate-hill-ends-historic-heart","Story_Type":"Consultation and Policy Design Opportunities","Jurisdiction":"NSW","ESG_Relevance":"Medium","Out1":"Hill End Leasing Open.","Out2":"NPWS has opened an Expression of Interest to lease 16 Hill End Historic Site buildings.","Out3":"The EOI seeks heritage-focused lessees with hospitality or tourism experience to enliven the village while ensuring heritage protection through lease conditions and ongoing oversight.","Out4":"This process informs investment and community planning in a heritage precinct, with potential impacts on local economics, tourism sustainability, and governance of historic assets.","Out5":"","Out6":"","Hook":"Hill End leasing opens","OneLiner":"NPWS invites EOIs to lease 16 heritage buildings, boosting tourism and local benefit."},{"id":183,"Date":"2026-05-01","Title":"Whales are on the move as 2026 migration season starts in NSW | Media release","URL":"https://www.environment.nsw.gov.au/news/whales-are-move-2026-migration-season-starts-nsw","Story_Type":"Environmental Protection, Biodiversity, and Nature Policy","Jurisdiction":"NSW","ESG_Relevance":"Medium","Out1":"NSW Whale Watching Rules.","Out2":"Regulations require vessels and drones to stay clear of whales during peak migration.","Out3":"Vessels, drones and watercraft must remain 100 metres from whales, or 300 metres if a calf or jet ski use, with disentanglement teams ready to respond to entanglements.","Out4":"These measures support whale conservation, reduce collision risk, and bolster NSW’s capacity for rapid rescue and research under MEMS.","Out5":"","Out6":"","Hook":"Whale season opens","OneLiner":"NSW kicks off whale watching season; MEMS-backed response teams enhance disentanglement capacity amid near-misses."},{"id":184,"Date":"2026-05-01","Title":"Era Point whale carcass removed | Media release","URL":"https://www.environment.nsw.gov.au/news/era-point-whale-carcass-removed","Story_Type":"Environmental Protection, Biodiversity, and Nature Policy","Jurisdiction":"NSW","ESG_Relevance":"Low","Out1":"Era Point Sperm Whale Removal.","Out2":"NSW NPWS completed removal of the 20-tonne sperm whale and transported it to Whytes Gully waste facility.","Out3":"A 60-tonne tug assisted the removal from the rock platform, with the eight-metre carcass towed about 10 kilometres to Bellambi and then transported to the Whytes Gully waste facility.","Out4":"The operation demonstrates cross-agency cooperation and cultural values integration, while public safety measures require beaches to remain closed until formal reopening, reducing ecological disturbance and local risk during carcass removal.","Out5":"","Out6":"","Hook":"Era Point operation","OneLiner":"NSW NPWS completes the 20-tonne removal and transport to Whytes Gully facility, enabling beach reopenings."},{"id":185,"Date":"2026-05-07","Title":"A new call for the Circular City Centre - C3 advisory programmes is now open!","URL":"https://circulareconomy.europa.eu/platform/en/news-and-events/all-news/new-call-circular-city-centre-c3-advisory-programmes-now-open","Story_Type":"Funding and Grant Announcements","Jurisdiction":"International","ESG_Relevance":"High","Out1":"Circular City Centre advisory open.","Out2":"The European Investment Bank, co-funded by the European Commission, announced two advisory programmes to support cities' circular transition.","Out3":"Participation is free for municipalities, and programmes are delivered by EIB and Circle Economy, Arup, ICLEI and ECORYS; expression of interest due by 30 June.","Out4":"The initiative aims to strengthen city resilience, resource efficiency and climate neutrality through circular strategies and project pipelines, unlocking local economic opportunities and supporting housing, mobility, water, and public services.","Out5":"","Out6":"","Hook":"C3 advisory opens","OneLiner":"Cities can join free programmes; apply by 30 June."},{"id":186,"Date":"2026-05-07","Title":"The RELOOP project: designing a system that serves ready-made meals and collects the reusable packaging","URL":"https://circulareconomy.europa.eu/platform/en/news-and-events/all-news/reloop-project-designing-system-serves-ready-made-meals-and-collects-reusable-packaging","Story_Type":"Infrastructure, Project Approvals, and EPBC Developments","Jurisdiction":"International","ESG_Relevance":"High","Out1":"The RELOOP project has been funded by the Ministry of Science, Innovation and Universities through the State Research Agency’s AEI 2024 Public-Private Partnership call and co-funded by the European Union through the ERDF for catering in communal settings.","Out2":"The project commits to circulating reusable packaging that can withstand at least 40 uses and to developing a fully digital 24-hour canteen with automated dispensing and a container return system for subsequent cleaning and reuse.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Reusable packaging in action","OneLiner":"EU-funded RELOOP pilots 24/7 automated canteen with washable, 40-use containers in Spain."},{"id":187,"Date":"2026-05-07","Title":"European circular electronics kickstart acceleration programme: call for SMEs and mentors","URL":"https://circulareconomy.europa.eu/platform/en/news-and-events/all-news/european-circular-electronics-kickstart-acceleration-programme-call-smes-and-mentors","Story_Type":"Funding and Grant Announcements","Jurisdiction":"International","ESG_Relevance":"High","Out1":"Circular electronics accelerator opens.","Out2":"The European circular electronics kickstart acceleration programme announced to support SMEs and mentors in building a circular semiconductor future.","Out3":"It provides tailored coaching, help with EU funding applications, investor introductions, workshops and training from June to November 2026, and is free of charge with no equity.","Out4":"The initiative could accelerate materials recovery and circularity in electronics, strengthening resilience and sustainability across Europe by guiding SMEs toward scalable, low-carbon solutions.","Out5":"","Out6":"","Hook":"E-waste loop initiative","OneLiner":"EU launches equity-free accelerator for SMEs in electronics value chain; mentors sought; deadline May 29."},{"id":188,"Date":"2026-05-05","Title":"Public consultation on adding exemptions to the rule on portable batteries","URL":"https://circulareconomy.europa.eu/platform/en/news-and-events/all-news/public-consultation-adding-exemptions-rule-portable-batteries","Story_Type":"Consultation and Policy Design Opportunities","Jurisdiction":"International","ESG_Relevance":"Medium","Out1":"EU Battery Exemptions Opened.","Out2":"The European Commission has opened a public consultation on adding exemptions to portable battery removability rules.","Out3":"It proposes six new exemptions, including wearable devices, electronic toys, and ATEX-covered equipment, with input open to industry, NGOs, authorities, and the public, by 26 May.","Out4":"Feedback could influence product design, recycling collection, and compliance planning under EU batteries rules, affecting risk management, investor due diligence, and strategic sourcing for lengthened product lifecycles.","Out5":"","Out6":"","Hook":"EU battery exemptions expand","OneLiner":"Public consultation open to all on six new categories by 26 May."},{"id":189,"Date":"2026-05-05","Title":"EU must strengthen the circular economy transition with biodegradable materials","URL":"https://circulareconomy.europa.eu/platform/en/news-and-events/all-news/eu-must-strengthen-circular-economy-transition-biodegradable-materials","Story_Type":"Environmental Protection, Biodiversity, and Nature Policy","Jurisdiction":"International","ESG_Relevance":"High","Out1":"EU Biodegradable Materials Policy.","Out2":"The EU should adopt a lifecycle-based, outcome-oriented regulatory framework to support nature-based biodegradable materials.","Out3":"EESC calls for aligning regulation to boost circularity, use agricultural, forestry, and fishery residues, and balance biological and technical cycles.","Out4":"This policy shift could influence innovation, regulatory clarity, and investment in the EU bioeconomy, with implications for rural industry revitalisation and environmental benefits.","Out5":"","Out6":"","Hook":"Nature-based rise?","OneLiner":"EU to align regulation for nature-based biodegradable materials, boosting circularity and bioeconomy sectors."},{"id":190,"Date":"2026-05-05","Title":"EU Ecolabel surges ahead in 2026","URL":"https://circulareconomy.europa.eu/platform/en/news-and-events/all-news/eu-ecolabel-surges-ahead-2026","Story_Type":"Reports, Data Releases, and Analytical Insights","Jurisdiction":"International","ESG_Relevance":"High","Out1":"EU Ecolabel has implications for market uptake and environmental performance in the EU, says the European Commission's EU Ecolabel platform.","Out2":"The platform notes sustained growth across product groups and countries, anchoring sustainability in everyday market choices.","Out3":"The EU Ecolabel platform says 116,692 products have now been awarded, backed by 3,541 licences, with 97% rooted in the EEA.","Out4":"","Out5":"","Out6":"","Hook":"Ecolabel momentum","OneLiner":"March 2026 data show 116,692 products and 3,541 licences, boosting business sustainability and consumer clarity."},{"id":191,"Date":"2026-05-05","Title":"Better planning to reduce risks from bushfires","URL":"https://www.planning.vic.gov.au/news/articles/bushfire","Story_Type":"Legislative and Statutory Developments","Jurisdiction":"Victoria","ESG_Relevance":"High","Out1":"Victoria Updates Bushfire Provisions.","Out2":"Victoria's Department updates bushfire provisions across planning schemes with Amendment VC248.","Out3":"Amendment VC248 refines definitions and guidance, clarifies decision-making, requires protection for homes in low to moderate risk areas, protects vulnerable uses, enables radiant heat protection in subdivisions, and expands exemptions.","Out4":"The updates advance risk reduction by strengthening planning controls and resilience for new communities and vulnerable groups. They also streamline permitting and guidance, aiding councils and landowners in meeting bushfire risk requirements.","Out5":"","Out6":"","Hook":"Bushfire rules shift","OneLiner":"Victoria tightens provisions (VC248) to clarify rules, protect vulnerable uses, and streamline permits."},{"id":192,"Date":"2026-05-08","Title":"IMF Staff Completes Governance and Corruption Diagnostic Mission to Nepal","URL":"https://www.imf.org/en/news/articles/2026/05/07/pr26144-nepal-imf-staff-completes-governance-and-corruption-diagnostic-mission-to-nepal","Story_Type":"Reports, Data Releases, and Analytical Insights","Jurisdiction":"International","ESG_Relevance":"High","Out1":"The International Monetary Fund governance and corruption diagnostic in Nepal has implications for governance quality and the investment climate, says the IMF.","Out2":"The IMF says the diagnostic will identify macro-critical governance weaknesses and prioritise reforms to strengthen accountability, transparency, and trust in public institutions.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Nepal governance push accelerates","OneLiner":"IMF completes GCD in Nepal; identifies reforms to curb corruption and boost inclusive growth."},{"id":193,"Date":"2026-05-07","Title":"IMF Executive Board Concludes 2026 Article IV Consultation with Antigua and Barbuda","URL":"https://www.imf.org/en/news/articles/2026/05/07/pr26142-antigua-and-barbuda-imf-executive-board-concludes-2026-article-iv-consultation","Story_Type":"Ministerial, Diplomatic, and International Engagements","Jurisdiction":"International","ESG_Relevance":"Medium","Out1":"IMF concludes Antigua review.","Out2":"IMF Executive Board concluded the Article IV consultation with Antigua and Barbuda on May 4, 2026.","Out3":"Directors urged a credible arrears strategy, broader financing options, and resilience-focused investments.","Out4":"The update underlines ongoing fiscal reform needs to support debt sustainability, climate resilience, and financial oversight.","Out5":"","Out6":"","Hook":"Debt risk persists","OneLiner":"IMF urges credible plan to clear arrears and restore debt sustainability amid 2026 risks."},{"id":194,"Date":"2026-05-07","Title":"Austria: Staff Concluding Statement of the 2026 Article IV Mission","URL":"https://www.imf.org/en/news/articles/2026/05/06/mcs-05062026-austria-staff-concluding-statement-of-the-2026-article-iv-mission","Story_Type":"Reports, Data Releases, and Analytical Insights","Jurisdiction":"International","ESG_Relevance":"High","Out1":"The authorities’ deficit target of 3% of GDP by 2028 has implications for Austria’s fiscal space and debt dynamics, says the International Monetary Fund.","Out2":"The IMF says further consolidation after 2028 is needed to put debt on a firm downward path and rebuild fiscal buffers.","Out3":"“The deficit will reach around 3.5 percent of GDP in 2028,” the IMF says.","Out4":"","Out5":"","Out6":"","Hook":"Austria reform path","OneLiner":"IMF urges deeper consolidation to 3% deficit by 2028 and 2% by 2031."},{"id":195,"Date":"2026-05-07","Title":"IMF Staff Reaches Staff-Level Agreement on the Third Review under the Policy Coordination Instrument with Serbia","URL":"https://www.imf.org/en/news/articles/2026/05/06/pr26140-serbia-imf-staff-reaches-staff-level-agreement-on-the-3rd-review-under-the-pci","Story_Type":"Ministerial, Diplomatic, and International Engagements","Jurisdiction":"International","ESG_Relevance":"Medium","Out1":"Serbia PCI review deal.","Out2":"IMF staff and Serbian authorities in Belgrade reached staff-level agreement on the Third Review under the PCI.","Out3":"The authorities commit to a 3.0 percent of GDP fiscal deficit cap for 2026–27 and to withdraw fuel excise reductions near term to safeguard fiscal sustainability.","Out4":"The agreement highlights Serbia's policy push for fiscal transparency, structural reforms, and energy sector adjustments in the face of energy price shocks, with implications for inflation, investment climate, and regional energy cooperation.","Out5":"","Out6":"","Hook":"IMF backs Serbia review","OneLiner":"Staff-level PCI approval signals continued reform; growth to 2.75% in 2026, 4% in 2027."},{"id":196,"Date":"2026-05-06","Title":"IMF Staff Completes the 2026 Article IV and Programs Review Mission to the Democratic Republic of Congo","URL":"https://www.imf.org/en/news/articles/2026/05/06/pr-26139-democratic-republic-of-congo-imf-completes-the-2026-article-iv-and-programs-rev-mission","Story_Type":"Ministerial, Diplomatic, and International Engagements","Jurisdiction":"International","ESG_Relevance":"High","Out1":"DRC IMF Review Update.","Out2":"An IMF team led by Calixte Ahokpossi met DRC authorities in Kinshasa to discuss Article IV and program reviews.","Out3":"They reached a staff-level agreement on the third ECF review and the second RSF review, subject to IMF management and Executive Board approval.","Out4":"The agreement underscores continued emphasis on prudent monetary policy, transparency in public resource use, and targeted reforms to bolster resilience and inclusive growth in a conflict-affected economy.","Out5":"","Out6":"","Hook":"IMF staff-level deal","OneLiner":"DRC growth stays above 5.5%; June 2026 review decision pending."},{"id":197,"Date":"2026-05-06","Title":"Portugal: Staff Concluding Statement of the 2026 Article IV Mission","URL":"https://www.imf.org/en/news/articles/2026/05/06/mcs-05062026-portugal-staff-concluding-statement-of-the-2026-article-iv-mission","Story_Type":"Ministerial, Diplomatic, and International Engagements","Jurisdiction":"International","ESG_Relevance":"High","Out1":"IMF mission update.","Out2":"IMF staff and Portugal's authorities concluded the Article IV mission in Washington, DC on Portugal's economic outlook.","Out3":"The report urges a fiscal path to lower public debt while boosting growth-enhancing public investment and targeted, time-limited support for energy shocks.","Out4":"The conclusions underscore Portugal's need to strengthen fiscal sustainability, housing supply, and financial resilience to support investment and EU-level integration.","Out5":"","Out6":"","Hook":"Reform path ahead","OneLiner":"IMF flags cautious reform agenda for Portugal: debt reduction, targeted energy relief, housing supply fixes."},{"id":198,"Date":"2026-05-04","Title":"Deepening economic security with Japan","URL":"https://www.trademinister.gov.au/minister/don-farrell/media-release/deepening-economic-security-japan","Story_Type":"Ministerial, Diplomatic, and International Engagements","Jurisdiction":"Australian National Scope","ESG_Relevance":"High","Out1":"Australia–Japan economic security pact.","Out2":"Prime Minister Albanese and Prime Minister Takaichi in Canberra signed the Joint Declaration on economic security.","Out3":"They will bolster regional supply chain resilience for energy products, food, and critical minerals, consult on contingencies, and mitigate risks through joint measures.","Out4":"The agreement strengthens Australia's and Japan's positions in regional economic security, supporting resilient investment, safer supply chains, and closer alignment on technology and minerals critical to sustainable growth and regional stability.","Out5":"","Out6":"","Hook":"Japan Australia security pact","OneLiner":"Joint declaration sharpens regional resilience with energy, food, minerals, and critical technologies."},{"id":199,"Date":"2026-05-01","Title":"Additional jet fuel and additional diesel secured","URL":"https://www.trademinister.gov.au/minister/don-farrell/media-release/additional-jet-fuel-and-additional-diesel-secured","Story_Type":"Ministerial, Diplomatic, and International Engagements","Jurisdiction":"Australian National Scope","ESG_Relevance":"Low","Out1":"Australia secures fuel shipments.","Out2":"The Albanese Government announced with ministers Farrell, Bowen and King that shipments from BP, Ampol and Viva Energy will secure fuel.","Out3":"The government has secured more than 450 million litres of diesel and 100 million litres of jet fuel, with shipments to multiple cities under the Strategic Reserve.","Out4":"This strengthens essential fuel supply chains amid global instability, helping maintain aviation, freight and regional mobility while highlighting government-industry collaboration in energy security.","Out5":"","Out6":"","Hook":"Secure fuel shipments","OneLiner":"Australia secures 100m jet and 50m diesel under Strategic Reserve to keep moving."},{"id":200,"Date":"2026-05-04","Title":"Interview with Andrew Clennell, Sky News","URL":"https://www.trademinister.gov.au/minister/don-farrell/transcript/interview-andrew-clennell-sky-news-1","Story_Type":"Ministerial, Diplomatic, and International Engagements","Jurisdiction":"Australian National Scope","ESG_Relevance":"Medium","Out1":"Australia–Japan energy talks.","Out2":"Trade Minister Don Farrell spoke with Sky News' Andrew Clennell in Canberra about energy, defence ties with Japan and critical minerals.","Out3":"He emphasised strengthening Australia’s energy security through continued fuel supplies, expanding defence cooperation, and increasing Japanese investment in Australia’s critical minerals sector.","Out4":"The discussions underscore regional resilience in energy and supply chains amid Middle East tensions, and signal ongoing alignment with a major ally to diversify energy sources, secure critical minerals, and sustain free trade partnerships.","Out5":"","Out6":"","Hook":"Japan energy deals","OneLiner":"Australia secures regional fuel and minerals ties through talks, boosting investment."},{"id":201,"Date":"2026-05-08","Title":"Strengthening the Annual Superannuation Performance Test","URL":"https://ministers.treasury.gov.au/ministers/daniel-mulino-2025/media-releases/strengthening-annual-superannuation-performance-test","Story_Type":"Consultation and Policy Design Opportunities","Jurisdiction":"Australian National Scope","ESG_Relevance":"Medium","Out1":"Strengthening the performance test.","Out2":"The Australian Government will undertake public consultation on targeted options to remove barriers to investment while upholding the testing framework.","Out3":"It will consider whether to expand coverage, modernise the test, balance member protections, and align with sector evolution; submissions close on 19 June 2026.","Out4":"For ESG practitioners and investors, the outcome could influence investment efficiency, capital allocation, and retirement security across Australia’s $4.5 trillion superannuation sector.","Out5":"","Out6":"","Hook":"Strengthening the test","OneLiner":"Public consultation invites views; submissions close 19 June 2026."},{"id":202,"Date":"2026-05-06","Title":"Regulatory Initiatives Grid continues to strengthen transparency and coordination","URL":"https://ministers.treasury.gov.au/ministers/daniel-mulino-2025/media-releases/regulatory-initiatives-grid-continues-strengthen","Story_Type":"Reports, Data Releases, and Analytical Insights","Jurisdiction":"Australian National Scope","ESG_Relevance":"Low","Out1":"The Regulatory Initiatives Grid has implications for streamlined, predictable regulation across the financial system, says the Australian Treasury.","Out2":"The Treasury says the grid improves transparency, coordination and helps businesses plan ahead with confidence.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Regulatory grid tightens","OneLiner":"Australia's RIG updates coordinate 89 initiatives to streamline regulation, aiding business planning and investment."},{"id":203,"Date":"2026-05-06","Title":"The message from Councils: this Budget needs to back Australians where they’re hurting most","URL":"https://alga.com.au/the-message-from-councils-this-budget-needs-to-back-australians-where-theyre-hurting-most/","Story_Type":"Funding and Grant Announcements","Jurisdiction":"Australian National Scope","ESG_Relevance":"High","Out1":"ALGA Budget Funding Push.","Out2":"ALGA has called on the Federal Government to provide targeted funding for housing infrastructure, roads and disaster resilience in the next Budget.","Out3":"ALGA proposes sustained funding: 1.1b/year housing infrastructure, 500m/year community facilities, 600m/year safer roads, 900m/year disaster resilience, 400m/year climate adaptation, and Financial Assistance Grants restored to 1%.","Out4":"If funded, local governments could maintain services and infrastructure, improving community resilience, housing supply, road safety, and climate adaptation capacity, helping communities weather inflation and disasters with greater financial stability.","Out5":"","Out6":"","Hook":"Local funding relief needed","OneLiner":"ALGA seeks $1.1b housing infrastructure funding to shield councils from rising costs and service cuts."},{"id":204,"Date":"2026-05-01","Title":"President Matt Burnett talks fuel supply pressures with ABC Radio","URL":"https://alga.com.au/president-matt-burnett-talks-fuel-supply-pressures-with-abc-radio/","Story_Type":"Compliance, Oversight, and Enforcement Actions","Jurisdiction":"Australian National Scope","ESG_Relevance":"Medium","Out1":"Fuel Cost Recovery Order.","Out2":"The Fair Work Commission issued the Road Transport Contractual Chain Order affecting councils' fuel costs.","Out3":"ALGA says the Commission disregarded its concerns when issuing the Road Transport Contractual Chain Order.","Out4":"Councils must plan budgeting and funding adjustments to manage the fuel cost increases mandated by the order.","Out5":"","Out6":"","Hook":"Fuel cost shock","OneLiner":"ALGA says a regulatory order raises council expenses amid global energy shortage; seeks relief."},{"id":205,"Date":"2026-05-05","Title":"Fairer tax treatment to encourage affordable EVs","URL":"https://ministers.treasury.gov.au/ministers/jim-chalmers-2022/media-releases/fairer-tax-treatment-encourage-affordable-evs","Story_Type":"Legislative and Statutory Developments","Jurisdiction":"Australian National Scope","ESG_Relevance":"High","Out1":"Fairer EV Tax Treatment.","Out2":"The government will extend and progressively phase the EV FBT discount to 25%, with pricing caps, to encourage affordable EVs.","Out3":"Phase 1 keeps the discount until March 2027; Phase 2 (Apr 2027–Apr 2029) applies discount to EVs under $75k and 25% to pricier ones; Phase 3 from Apr 2029 applies 25% to all EVs under the luxury threshold.","Out4":"The policy supports affordable EV growth and ongoing tariff relief while delivering emissions reduction and budget savings, as uptake expands beyond inner cities and market maturity advances.","Out5":"","Out6":"","Hook":"EV tax shift gears","OneLiner":"Australia to phase FBT on EVs, 25% discount for under $75k, saving $1.7b."},{"id":206,"Date":"2026-05-01","Title":"Productivity package to turbocharge construction and businesses across NSW","URL":"https://ministers.treasury.gov.au/ministers/jim-chalmers-2022/media-releases/productivity-package-turbocharge-construction-and","Story_Type":"Infrastructure, Project Approvals, and EPBC Developments","Jurisdiction":"NSW","ESG_Relevance":"Medium","Out1":"The Commonwealth has approved funding to New South Wales to implement changes to commercial planning and zoning rules as part of the Productivity Package.","Out2":"The NSW reforms will speed up approvals from 45 per cent to 75 per cent, modernise zoning to broaden permitted businesses, expand operating hours in industrial and employment zones, and establish dedicated planning authorities.","Out3":"","Out4":"","Out5":"","Out6":"","Hook":"Fast-track planning reforms","OneLiner":"NSW unlocks $67.5m to speed approvals to 75% via streamlined zoning."}];

  "Parliamentary and Political Proceedings": "#D1C4E9",
  "Reports, Data Releases, and Analytical Insights": "#B3E5FC",
  "State and Local Government Programs": "#F8BBD0",
};
function typeColor(st) { return TYPE_COLORS[st] || "#E0E0E0"; }
function darkenColor(hex, factor) {
  const f = factor || 0.65;
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return '#' + [Math.round(r*f),Math.round(g*f),Math.round(b*f)].map(c => c.toString(16).padStart(2,'0')).join('');
}

function initData() {
  // Sort stories by jurisdiction > type > relevance
  const grouped = {};
  for (const s of RAW_DATA) {
    const j = s.Jurisdiction || "Other";
    const st = s.Story_Type || "Other";
    if (!grouped[j]) grouped[j] = {};
    if (!grouped[j][st]) grouped[j][st] = [];
    grouped[j][st].push(s);
  }
  for (const j of Object.keys(grouped)) {
    for (const st of Object.keys(grouped[j])) {
      grouped[j][st].sort((a,b) => (REL_PRIORITY[a.ESG_Relevance]??3) - (REL_PRIORITY[b.ESG_Relevance]??3));
    }
  }
  leftStories = [];
  for (const jur of JURIS_ORDER) {
    if (!grouped[jur]) continue;
    const types = Object.keys(grouped[jur]).sort((a,b) => (TYPE_RANK[a]??999) - (TYPE_RANK[b]??999));
    for (const st of types) {
      for (const s of grouped[jur][st]) leftStories.push(s.id);
    }
    delete grouped[jur];
  }
  for (const jur of Object.keys(grouped).sort()) {
    const types = Object.keys(grouped[jur]).sort((a,b) => (TYPE_RANK[a]??999) - (TYPE_RANK[b]??999));
    for (const st of types) {
      for (const s of grouped[jur][st]) leftStories.push(s.id);
    }
  }
  leftEvents = EVENTS_DATA.map(e => e.id);
  leftJobs = JOBS_DATA.map(j => j.id);
  rightStories = [];
  rightEvents = [];
  rightJobs = [];
}
initData();

/* ====== Helpers ====== */
function esc(s) {
  return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}
function hasLeadingBullet(line) { return /^\s*[\u2022*\-\u2013\u2014]/.test(line || ""); }
function stripBullet(line) { return String(line || "").replace(/^\s*[\u2022*\-\u2013\u2014]\s*/, "").trim(); }
function pHtml(text) { return '<p>' + esc(text) + '</p>'; }
function bulletHtml(text) { return '<p class="bullet"><span>&bull;</span><span>' + esc(text) + '</span></p>'; }
function narrativeHtml(parts) { return '<p>' + parts.filter(Boolean).join(' ') + '</p>'; }

function buildCardBody(s) {
  const outputs = [s.Out1, s.Out2, s.Out3, s.Out4, s.Out5, s.Out6]
    .map(value => String(value || "").trim())
    .filter(Boolean);
  const hook = (s.Hook || "").trim();
  const oneLiner = (s.OneLiner || "").trim();
  if (![...outputs, hook, oneLiner].some(Boolean)) return "";
  let h = "";
  if (outputs.length) {
    const narrative = outputs.map((text, index) => {
      if (outputs.length === 1 && s.URL) return '<a href="' + esc(s.URL) + '" target="_blank">' + esc(text) + '</a>';
      if (index === 0) return '<strong>' + esc(text) + '</strong>';
      if (index === 1 && s.URL) return '<a href="' + esc(s.URL) + '" target="_blank">' + esc(text) + '</a>';
      return esc(text);
    });
    h = narrativeHtml(narrative);
  }
  if (hook || oneLiner) {
    const hookPart = hook ? '<strong>' + esc(hook) + '</strong>' : '';
    const oneLinerPart = oneLiner ? esc(oneLiner) : '';
    h += '<p>' + [hookPart, oneLinerPart].filter(Boolean).join(' ') + '</p>';
  }
  return h;
}

function renderStoryCard(s, panel) {
  const bg = typeColor(s.Story_Type);
  const pillBg = darkenColor(bg, 0.65);
  const relClass = s.ESG_Relevance === 'High' ? 'rel-high' : s.ESG_Relevance === 'Medium' ? 'rel-medium' : 'rel-low';
  return '<div class="card" draggable="true" data-type="story" data-id="' + s.id + '" data-panel="' + panel + '" style="background:' + bg + ';">' +
    '<div class="card-header">' +
    '<span class="story-type-pill" style="background:' + pillBg + ';color:#fff;">' + esc(s.Story_Type) + '</span>' +
    '<span class="relevance-badge ' + relClass + '">' + esc(s.ESG_Relevance) + '</span>' +
    '</div>' +
    '<div class="card-title">' + esc(s.Title) + '</div>' +
    '<div class="card-body">' + buildCardBody(s) + '</div>' +
    '</div>';
}

function renderAuxCard(item, type, panel) {
  const descKey = type === 'event' ? 'Event_Description' : 'Job_Description';
  return '<div class="aux-card" draggable="true" data-type="' + type + '" data-id="' + item.id + '" data-panel="' + panel + '">' +
    '<div class="aux-date">' + esc(item.Date) + '</div>' +
    '<div class="aux-title">' + esc(item.Title) + '</div>' +
    '<div class="aux-url"><a href="' + esc(item.URL) + '" target="_blank">' + esc(item.URL) + '</a></div>' +
    '<div class="aux-desc">' + esc(item[descKey] || '') + '</div>' +
    '</div>';
}

  for (const jur of JURIS_ORDER) {
    if (!grouped[jur] || grouped[jur].length === 0) continue;
    html += '<h2 class="section-header">' + esc(jur) + ' <span class="section-count">(' + grouped[jur].length + ')</span></h2>';
    for (const s of grouped[jur]) {
      html += renderStoryCard(s, 'left');
    }
    delete grouped[jur];
  }
  for (const jur of Object.keys(grouped).sort()) {
    html += '<h2 class="section-header">' + esc(jur) + ' <span class="section-count">(' + grouped[jur].length + ')</span></h2>';
    for (const s of grouped[jur]) {
      html += renderStoryCard(s, 'left');
    }
  }
  
  // Events
  if (leftEvents.length > 0) {
    html += '<h2 class="section-header">Events <span class="section-count">(' + leftEvents.length + ')</span></h2>';
    for (const id of leftEvents) {
      const e = EVENTS_BY_ID.get(id);
      if (e) html += renderAuxCard(e, 'event', 'left');
    }
  }
  
  // Jobs
  if (leftJobs.length > 0) {
    html += '<h2 class="section-header">Jobs <span class="section-count">(' + leftJobs.length + ')</span></h2>';
    for (const id of leftJobs) {
      const j = JOBS_BY_ID.get(id);
      if (j) html += renderAuxCard(j, 'job', 'left');
    }
  }
  
  if (!html) html = '<div class="empty-state">All items have been selected</div>';
  root.innerHTML = html;
  document.getElementById('leftCount').textContent = (leftStories.length + leftEvents.length + leftJobs.length) + ' items';
}

function renderRightPanel() {
  const root = document.getElementById('rightPanel');
  const total = rightStories.length + rightEvents.length + rightJobs.length;
  
  let html = '';
  if (total === 0) {
    html = '<div class="drop-zone" id="dropZone">Drag items here to include</div>';
  } else {
    // Stories grouped by jurisdiction
    const grouped = {};
    for (const id of rightStories) {
      const s = STORY_BY_ID.get(id);
      if (!s) continue;
      const j = s.Jurisdiction || "Other";
      if (!grouped[j]) grouped[j] = [];
      grouped[j].push(s);
    }
    
    let hasStories = false;
    for (const jur of JURIS_ORDER) {
      if (!grouped[jur] || grouped[jur].length === 0) continue;
      hasStories = true;
      html += '<h2 class="section-header">' + esc(jur) + ' <span class="section-count">(' + grouped[jur].length + ')</span></h2>';
      for (const s of grouped[jur]) {
        html += renderStoryCard(s, 'right');
      }
      delete grouped[jur];
    }
    for (const jur of Object.keys(grouped).sort()) {
      hasStories = true;
      html += '<h2 class="section-header">' + esc(jur) + ' <span class="section-count">(' + grouped[jur].length + ')</span></h2>';
      for (const s of grouped[jur]) {
        html += renderStoryCard(s, 'right');
      }
    }
    
    if (rightEvents.length > 0) {
      html += '<h2 class="section-header">Events <span class="section-count">(' + rightEvents.length + ')</span></h2>';
      for (const id of rightEvents) {
        const e = EVENTS_BY_ID.get(id);
        if (e) html += renderAuxCard(e, 'event', 'right');
      }
    }
    
    if (rightJobs.length > 0) {
      html += '<h2 class="section-header">Jobs <span class="section-count">(' + rightJobs.length + ')</span></h2>';
      for (const id of rightJobs) {
        const j = JOBS_BY_ID.get(id);
        if (j) html += renderAuxCard(j, 'job', 'right');
      }
    }
  }
  
  root.innerHTML = html;
  let countText = total + ' items';
  if (total > 0) {
    const parts = [];
    if (rightStories.length > 0) parts.push('Stories: ' + rightStories.length);
    if (rightEvents.length > 0) parts.push('Events: ' + rightEvents.length);
    if (rightJobs.length > 0) parts.push('Jobs: ' + rightJobs.length);
    countText += ' (' + parts.join(', ') + ')';
  }
  document.getElementById('rightCount').textContent = countText;
  document.getElementById('genBtn').disabled = total === 0;
  document.getElementById('clearBtn').disabled = total === 0;
}

function render() {
  renderLeftPanel();
  renderRightPanel();
}

function clearAll() {
  leftStories = leftStories.concat(rightStories);
  leftEvents = leftEvents.concat(rightEvents);
  leftJobs = leftJobs.concat(rightJobs);
  rightStories = [];
  rightEvents = [];
  rightJobs = [];
  render();
}

/* ====== Selection ====== */
function selectCard(el) {
  if (selectedEl) selectedEl.classList.remove('selected');
  selectedEl = el;
  if (el) el.classList.add('selected');
}

document.addEventListener('click', (e) => {
  const card = e.target.closest('.card, .aux-card');
  if (card) {
    selectCard(card);
    e.stopPropagation();
  } else if (!e.target.closest('.ctx-menu')) {
    selectCard(null);
  }
});

/* ====== Drag and Drop ====== */
document.addEventListener('dragstart', (e) => {
  const card = e.target.closest('.card, .aux-card');
  if (!card) return;
  draggedEl = card;
  draggedData = {
    type: card.dataset.type,
    id: parseInt(card.dataset.id),
    panel: card.dataset.panel
  };
  card.classList.add('dragging');
  selectCard(card);
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', JSON.stringify(draggedData));
});

document.addEventListener('dragend', (e) => {
  if (draggedEl) draggedEl.classList.remove('dragging');
  draggedEl = null;
  draggedData = null;
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
  document.querySelectorAll('.drag-active').forEach(el => el.classList.remove('drag-active'));
});

document.addEventListener('dragover', (e) => {
  e.preventDefault();
  const rightPanel = document.getElementById('rightPanel');
  const dropZone = document.getElementById('dropZone');
  
  if (rightPanel.contains(e.target)) {
    e.dataTransfer.dropEffect = 'move';
    if (dropZone) dropZone.classList.add('drag-active');
    
    // Reorder within right panel
    const card = e.target.closest('.card, .aux-card');
    if (card && draggedEl && card !== draggedEl && card.dataset.panel === 'right') {
      document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
      card.classList.add('drag-over');
    }
  } else {
    if (dropZone) dropZone.classList.remove('drag-active');
  }
});

document.addEventListener('dragleave', (e) => {
  const dropZone = document.getElementById('dropZone');
  if (dropZone && !document.getElementById('rightPanel').contains(e.relatedTarget)) {
    dropZone.classList.remove('drag-active');
  }
});

document.addEventListener('drop', (e) => {
  e.preventDefault();
  const rightPanel = document.getElementById('rightPanel');
  const dropZone = document.getElementById('dropZone');
  if (dropZone) dropZone.classList.remove('drag-active');
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
  
  if (!draggedData) return;
  
  // Dropping on right panel = include
  if (rightPanel.contains(e.target)) {
    if (draggedData.panel === 'left') {
      moveToRight(draggedData.type, draggedData.id);
    } else {
      // Reorder within right
      const targetCard = e.target.closest('.card, .aux-card');
      if (targetCard && targetCard !== draggedEl) {
        reorderInRight(draggedData.type, draggedData.id, parseInt(targetCard.dataset.id), targetCard.dataset.type);
      }
    }
  }
  // Dropping on left panel = exclude
  else if (document.getElementById('leftPanel').contains(e.target)) {
    if (draggedData.panel === 'right') {
      moveToLeft(draggedData.type, draggedData.id);
    }
  }
});

/* ====== Move Functions ====== */
function moveToRight(type, id) {
  if (type === 'story') {
    const idx = leftStories.indexOf(id);
    if (idx > -1) { leftStories.splice(idx, 1); rightStories.push(id); }
  } else if (type === 'event') {
    const idx = leftEvents.indexOf(id);
    if (idx > -1) { leftEvents.splice(idx, 1); rightEvents.push(id); }
  } else if (type === 'job') {
    const idx = leftJobs.indexOf(id);
    if (idx > -1) { leftJobs.splice(idx, 1); rightJobs.push(id); }
  }
  render();
}

function moveToLeft(type, id) {
  if (type === 'story') {
    const idx = rightStories.indexOf(id);
    if (idx > -1) { rightStories.splice(idx, 1); leftStories.push(id); }
  } else if (type === 'event') {
    const idx = rightEvents.indexOf(id);
    if (idx > -1) { rightEvents.splice(idx, 1); leftEvents.push(id); }
  } else if (type === 'job') {
    const idx = rightJobs.indexOf(id);
    if (idx > -1) { rightJobs.splice(idx, 1); leftJobs.push(id); }
  }
  render();
}

function reorderInRight(type, id, targetId, targetType) {
  let arr;
  if (type === 'story') arr = rightStories;
  else if (type === 'event') arr = rightEvents;
  else arr = rightJobs;
  
  const fromIdx = arr.indexOf(id);
  if (fromIdx === -1) return;
  
  // For same type, move to target position
  if (type === targetType) {
    const toIdx = arr.indexOf(targetId);
    if (toIdx === -1) return;
    arr.splice(fromIdx, 1);
    arr.splice(toIdx, 0, id);
    render();
  }
}

function moveUp(type, id) {
  let arr;
  if (type === 'story') arr = rightStories;
  else if (type === 'event') arr = rightEvents;
  else arr = rightJobs;
  
  const idx = arr.indexOf(id);
  if (idx > 0) {
    [arr[idx], arr[idx-1]] = [arr[idx-1], arr[idx]];
    render();
    setTimeout(() => {
      const el = document.querySelector('[data-panel="right"][data-type="' + type + '"][data-id="' + id + '"]');
      if (el) selectCard(el);
    }, 10);
  }
}

function moveDown(type, id) {
  let arr;
  if (type === 'story') arr = rightStories;
  else if (type === 'event') arr = rightEvents;
  else arr = rightJobs;
  
  const idx = arr.indexOf(id);
  if (idx < arr.length - 1 && idx > -1) {
    [arr[idx], arr[idx+1]] = [arr[idx+1], arr[idx]];
    render();
    setTimeout(() => {
      const el = document.querySelector('[data-panel="right"][data-type="' + type + '"][data-id="' + id + '"]');
      if (el) selectCard(el);
    }, 10);
  }
}

/* ====== Context Menu ====== */
const ctxMenu = document.getElementById('ctxMenu');
let ctxData = null;

document.addEventListener('contextmenu', (e) => {
  const card = e.target.closest('.card, .aux-card');
  if (!card) { ctxMenu.style.display = 'none'; return; }
  
  e.preventDefault();
  selectCard(card);
  
  ctxData = {
    type: card.dataset.type,
    id: parseInt(card.dataset.id),
    panel: card.dataset.panel
  };
  
  // Show/hide relevant options
  const isLeft = ctxData.panel === 'left';
  document.getElementById('ctxInclude').style.display = isLeft ? 'block' : 'none';
  document.getElementById('ctxExclude').style.display = isLeft ? 'none' : 'block';
  document.getElementById('ctxMoveUp').style.display = isLeft ? 'none' : 'block';
  document.getElementById('ctxMoveDown').style.display = isLeft ? 'none' : 'block';
  
  ctxMenu.style.left = e.clientX + 'px';
  ctxMenu.style.top = e.clientY + 'px';
  ctxMenu.style.display = 'block';
});

document.addEventListener('click', () => { ctxMenu.style.display = 'none'; });

document.getElementById('ctxInclude').addEventListener('click', () => {
  if (ctxData) moveToRight(ctxData.type, ctxData.id);
  ctxMenu.style.display = 'none';
});

document.getElementById('ctxExclude').addEventListener('click', () => {
  if (ctxData) moveToLeft(ctxData.type, ctxData.id);
  ctxMenu.style.display = 'none';
});

document.getElementById('ctxMoveUp').addEventListener('click', () => {
  if (ctxData) moveUp(ctxData.type, ctxData.id);
  ctxMenu.style.display = 'none';
});

document.getElementById('ctxMoveDown').addEventListener('click', () => {
  if (ctxData) moveDown(ctxData.type, ctxData.id);
  ctxMenu.style.display = 'none';
});

/* ====== Keyboard Navigation ====== */
document.addEventListener('keydown', (e) => {
  if (!selectedEl) return;
  
  const type = selectedEl.dataset.type;
  const id = parseInt(selectedEl.dataset.id);
  const panel = selectedEl.dataset.panel;
  
  switch (e.key) {
    case 'ArrowRight':
      if (panel === 'left') {
        moveToRight(type, id);
        setTimeout(() => {
          const el = document.querySelector('[data-panel="right"][data-type="' + type + '"][data-id="' + id + '"]');
          if (el) selectCard(el);
        }, 10);
      }
      e.preventDefault();
      break;
    case 'ArrowLeft':
      if (panel === 'right') {
        moveToLeft(type, id);
        setTimeout(() => {
          const el = document.querySelector('[data-panel="left"][data-type="' + type + '"][data-id="' + id + '"]');
          if (el) selectCard(el);
        }, 10);
      }
      e.preventDefault();
      break;
    case 'ArrowUp':
      if (panel === 'right') {
        moveUp(type, id);
        e.preventDefault();
      }
      break;
    case 'ArrowDown':
      if (panel === 'right') {
        moveDown(type, id);
        e.preventDefault();
      }
      break;
  }
});

/* ====== Markdown Generation ====== */
function buildMdBody(s) {
  const outputs = [s.Out1, s.Out2, s.Out3, s.Out4, s.Out5, s.Out6]
    .map(value => String(value || '').trim())
    .filter(Boolean);
  if (!outputs.length) return '';
  return outputs.map((text, index) => {
    if (outputs.length === 1 && s.URL) return '[' + text + '](' + s.URL + ')';
    if (index === 0) return '**' + text + '**';
    if (index === 1 && s.URL) return '[' + text + '](' + s.URL + ')';
    return text;
  }).join(' ');
}

function generateDoc() {
  const total = rightStories.length + rightEvents.length + rightJobs.length;
  if (total === 0) { alert('No items selected for export.'); return; }
  
  let md = '';
  
  // Stories grouped by jurisdiction
  const grouped = {};
  for (const id of rightStories) {
    const s = STORY_BY_ID.get(id);
    if (!s) continue;
    const j = s.Jurisdiction || "Other";
    if (!grouped[j]) grouped[j] = [];
    grouped[j].push(s);
  }
  
  // === HIGHLIGHTS SECTION (Hook + One Liner at top) ===
  let highlights = '';
  for (const jur of JURIS_ORDER) {
    if (!grouped[jur] || grouped[jur].length === 0) continue;
    let jurHighlights = '';
    for (const s of grouped[jur]) {
      if (s.Hook || s.OneLiner) {
        if (s.Hook) jurHighlights += '**' + s.Hook + '** ';
        if (s.OneLiner) jurHighlights += s.OneLiner;
        jurHighlights += '\n\n';
      }
    }
    if (jurHighlights) {
      highlights += '## ' + (JURIS_SHORT[jur] || jur) + '\n\n' + jurHighlights;
    }
  }
  for (const jur of Object.keys(grouped).sort()) {
    if (JURIS_ORDER.includes(jur)) continue;
    let jurHighlights = '';
    for (const s of grouped[jur]) {
      if (s.Hook || s.OneLiner) {
        if (s.Hook) jurHighlights += '**' + s.Hook + '** ';
        if (s.OneLiner) jurHighlights += s.OneLiner;
        jurHighlights += '\n\n';
      }
    }
    if (jurHighlights) {
      highlights += '## ' + (JURIS_SHORT[jur] || jur) + '\n\n' + jurHighlights;
    }
  }
  if (highlights) {
    md += '# Highlights\n\n' + highlights + '---\n\n';
  }
  
  // === MAIN CONTENT (without Hook + One Liner) ===
  for (const jur of JURIS_ORDER) {
    if (!grouped[jur] || grouped[jur].length === 0) continue;
    md += '# ' + (JURIS_SHORT[jur] || jur) + '\n\n';
    for (const s of grouped[jur]) {
      const body = buildMdBody(s);
      if (body) md += body + '\n\n';
      md += '---\n\n';
    }
    delete grouped[jur];
  }
  for (const jur of Object.keys(grouped).sort()) {
    md += '# ' + (JURIS_SHORT[jur] || jur) + '\n\n';
    for (const s of grouped[jur]) {
      const body = buildMdBody(s);
      if (body) md += body + '\n\n';
      md += '---\n\n';
    }
  }
  
  // Events
  if (rightEvents.length > 0) {
    md += '# Events\n\n';
    for (const id of rightEvents) {
      const ev = EVENTS_BY_ID.get(id);
      if (!ev) continue;
      if (ev.Event_Description) md += ev.Event_Description + '\n\n';
      md += '---\n\n';
    }
  }
  
  // Jobs
  if (rightJobs.length > 0) {
    md += '# Jobs\n\n';
    for (const id of rightJobs) {
      const jb = JOBS_BY_ID.get(id);
      if (!jb) continue;
      if (jb.Job_Description) md += jb.Job_Description + '\n\n';
      md += '---\n\n';
    }
  }
  
  const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
  saveAs(blob, 'selected_stories.md');
}

/* ====== Init ====== */
render();
</script>
